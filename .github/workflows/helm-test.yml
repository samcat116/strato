name: Helm Chart Tests

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "helm/**"
      # The chart embeds a copy of the SpiceDB schema; run on canonical-schema
      # changes too so the drift check can catch a missed sync.
      - "spicedb/schema.zed"
      - ".github/workflows/helm-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "helm/**"
      - "spicedb/schema.zed"
      - ".github/workflows/helm-test.yml"
  workflow_dispatch:

env:
  HELM_VERSION: v3.12.3
  KIND_VERSION: v0.20.0
  KUBERNETES_VERSION: v1.27.3

# Supersede in-progress runs on new pushes to the same ref.
concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Helm Chart Linting
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Lint Helm chart
        run: |
          helm lint helm/strato-control-plane/

      - name: Check SpiceDB schema copies are in sync
        run: |
          # The chart ships a verbatim copy of the authorization schema because
          # Helm cannot read files outside the chart root. Fail on any drift so
          # a schema change can never silently miss Kubernetes installs again.
          diff -u spicedb/schema.zed helm/strato-control-plane/files/spicedb-schema.zed \
            || { echo "❌ helm/strato-control-plane/files/spicedb-schema.zed is out of sync with spicedb/schema.zed — copy the canonical file into the chart"; exit 1; }
          echo "✅ Chart schema matches spicedb/schema.zed"

      - name: Validate chart dependencies
        run: |
          cd helm/strato-control-plane
          helm dependency build

  template-validation:
    runs-on: ubuntu-latest
    name: Template Validation
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build dependencies
        run: |
          cd helm/strato-control-plane
          helm dependency build

      - name: Template with default values
        run: |
          helm template strato-test helm/strato-control-plane/ > /tmp/default-template.yaml
          echo "Default template generated successfully"

      - name: Assert no dev secrets in default render
        run: |
          # A bare install must never ship the historical dev credentials;
          # empty values auto-generate strong ones (credentials-secret.yaml).
          for needle in vapor_password strato-dev-key postgres_password; do
            if grep -q "$needle" /tmp/default-template.yaml; then
              echo "❌ Default render contains dev secret: $needle"
              exit 1
            fi
            if grep -q "$(echo -n "$needle" | base64)" /tmp/default-template.yaml; then
              echo "❌ Default render contains base64-encoded dev secret: $needle"
              exit 1
            fi
          done
          echo "✅ No dev secrets in default render"

      - name: Assert generated credentials are consistent
        run: |
          python3 - <<'EOF'
          import base64, re, sys
          r = open('/tmp/default-template.yaml').read()
          pw = base64.b64decode(re.search(r'db-password: "([^"]+)"', r).group(1)).decode()
          uri = base64.b64decode(re.search(r'datastore-conn-uri: "([^"]+)"', r).group(1)).decode()
          psk = base64.b64decode(re.search(r'spicedb-preshared-key: "([^"]+)"', r).group(1)).decode()
          cfg = base64.b64decode(re.search(r'\n  preshared-key: "([^"]+)"', r).group(1)).decode()
          assert pw in uri, "SpiceDB datastore-conn-uri does not use the generated db password"
          assert psk == cfg, "credentials secret and spicedb config secret disagree on preshared key"
          assert len(pw) >= 32 and len(psk) >= 32, "generated credentials too short"
          print("✅ Generated credentials are internally consistent")
          EOF

      - name: Template with production values
        run: |
          helm template strato-prod helm/strato-control-plane/ \
            --set image.repository=strato-control-plane \
            --set image.tag=latest \
            --set strato.logLevel=info \
            --set postgresql.auth.password=secure-password \
            --set spicedb.presharedKey=secure-spicedb-key \
            --set resources.limits.cpu=2000m \
            --set resources.limits.memory=2Gi \
            --set spicedb.resources.limits.cpu=1000m \
            --set spicedb.resources.limits.memory=1Gi \
            --set networkPolicy.enabled=true \
            --set podDisruptionBudget.enabled=true > /tmp/production-template.yaml
          echo "Production template generated successfully"

      - name: Template with external database
        run: |
          helm template strato-external helm/strato-control-plane/ \
            --set postgresql.enabled=false \
            --set externalDatabase.host=postgres.example.com \
            --set externalDatabase.password=external-db-password > /tmp/external-db-template.yaml
          echo "External database template generated successfully"

      - name: Template with SPIRE enabled
        run: |
          helm template strato-spire helm/strato-control-plane/ \
            --set spire.enabled=true > /tmp/spire-template.yaml
          # Non-default persistence path: this once rendered a duplicate
          # `volumes:` key that clobbered the SPIRE server's config volume.
          helm template strato-spire-eph helm/strato-control-plane/ \
            --set spire.enabled=true \
            --set spire.persistence.enabled=false > /tmp/spire-ephemeral-template.yaml
          echo "SPIRE templates generated successfully"

      - name: Assert SPIRE ships no dev secret and auto-generates a strong one
        run: |
          # A default SPIRE install must never ship the historical hardcoded
          # password; an empty value auto-generates a strong one (spire-secret.yaml).
          # Check the SPIRE secret's value directly rather than substring-matching
          # the whole render: the token "spire_password" legitimately appears as a
          # psql variable name in spire-db-init-job.yaml (the credential itself is
          # injected via env from this secret, never inlined).
          python3 - <<'EOF'
          import base64, re, sys
          r = open('/tmp/spire-template.yaml').read()
          pw = base64.b64decode(re.search(r'database-password: "([^"]+)"', r).group(1)).decode()
          assert pw != "spire_password", "SPIRE secret ships the historical dev password"
          assert len(pw) >= 32, "generated SPIRE database password too short"
          print("✅ SPIRE database password auto-generated and strong")
          EOF

      - name: Template with Gateway API enabled
        run: |
          # Chart-owned Gateway + GatewayClass + all three routes (HTTPRoute and
          # both passthrough TLSRoutes), with cert-manager shim annotations.
          helm template strato-gw helm/strato-control-plane/ \
            --set gateway.enabled=true \
            --set gateway.create=true \
            --set gateway.gatewayClass.create=true \
            --set strato.externalHostname=strato.example.com \
            --set gateway.tls.certManager.enabled=true \
            --set gateway.tls.certManager.issuerRef.name=letsencrypt-dns \
            --set spire.enabled=true \
            --set spire.controlPlane.enableMTLS=true > /tmp/gateway-template.yaml
          # Routes-only render binding to an operator-provided Gateway.
          helm template strato-gw-bind helm/strato-control-plane/ \
            --set gateway.enabled=true \
            --set gateway.name=infra-gateway \
            --set gateway.namespace=envoy-gateway-system \
            --set strato.externalHostname=strato.example.com > /tmp/gateway-bind-template.yaml
          # create=false must NOT render a Gateway object of its own.
          if grep -qE '^kind: Gateway$' /tmp/gateway-bind-template.yaml; then
            echo "❌ gateway.create=false rendered a Gateway resource"
            exit 1
          fi
          for kind in HTTPRoute TLSRoute; do
            grep -q "kind: $kind" /tmp/gateway-template.yaml || { echo "❌ missing $kind in gateway render"; exit 1; }
          done
          echo "✅ Gateway API templates generated successfully"

      - name: Validate generated YAML
        run: |
          # Parse every document of every render and reject duplicate mapping
          # keys (YAML silently takes the last one — a duplicate `volumes:` key
          # once shipped a SPIRE server that could never start). The previous
          # incarnation of this step used safe_load (single-doc, dup-tolerant)
          # and swallowed failures with `|| echo`, so it could never fail.
          for file in /tmp/default-template.yaml /tmp/production-template.yaml /tmp/external-db-template.yaml /tmp/spire-template.yaml /tmp/spire-ephemeral-template.yaml /tmp/gateway-template.yaml /tmp/gateway-bind-template.yaml; do
            python3 - "$file" <<'EOF'
          import sys, yaml

          class StrictLoader(yaml.SafeLoader):
              pass

          def no_duplicates(loader, node, deep=False):
              seen = set()
              for key_node, _ in node.value:
                  key = loader.construct_object(key_node, deep=True)
                  if key in seen:
                      raise ValueError(f"duplicate mapping key {key!r} at line {key_node.start_mark.line + 1}")
                  seen.add(key)
              return yaml.SafeLoader.construct_mapping(loader, node, deep)

          StrictLoader.add_constructor(yaml.resolver.BaseResolver.DEFAULT_MAPPING_TAG, no_duplicates)
          path = sys.argv[1]
          docs = list(yaml.load_all(open(path), Loader=StrictLoader))
          print(f"✅ {path}: {len(docs)} documents, no duplicate keys")
          EOF
          done

      - name: Upload templates as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-templates
          path: /tmp/*-template.yaml

  # NOTE: Integration tests are unreliable in GitHub Actions due to Kind resource constraints
  # They frequently timeout even with minimal nginx deployments. For reliable testing:
  # - Use the lint, security, and template validation jobs above
  # - Run `helm lint` / `helm template` locally against the ci/*.yaml values files
  # - Test in dedicated Kubernetes environments, not CI
  integration-test:
    runs-on: ubuntu-latest
    name: Kubernetes Integration Test (Experimental)
    needs: [lint, template-validation]
    if: false # Disabled due to CI resource constraints
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Kind
        uses: helm/kind-action@v1.8.0
        with:
          version: ${{ env.KIND_VERSION }}
          kubectl_version: ${{ env.KUBERNETES_VERSION }}

      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build dependencies
        run: |
          cd helm/strato-control-plane
          helm dependency build

      - name: Test chart deployment (lightweight)
        run: |
          # Create simplified test values file - disable heavy components
          cat > /tmp/ci-light-values.yaml << 'EOF'
          image:
            repository: nginx
            tag: "1.21"
            pullPolicy: Always

          strato:
            logLevel: debug

          # Disable SpiceDB for faster CI
          spicedb:
            enabled: false

          # Use external database configuration (no actual DB deployment)
          postgresql:
            enabled: false

          externalDatabase:
            host: "fake-db-host"
            password: "fake-password"

          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi

          # Disable all health checks and init containers
          livenessProbe:
            enabled: false
          readinessProbe:
            enabled: false

          initContainers:
            waitForDB:
              enabled: false
            waitForSpiceDB:
              enabled: false

          # Disable migration job
          migration:
            enabled: false
          EOF

          # Install the chart (should be fast without databases)
          echo "Installing chart with lightweight configuration..."
          helm install strato-ci-test helm/strato-control-plane/ \
            -f /tmp/ci-light-values.yaml \
            --wait --timeout=5m

      - name: Verify lightweight deployment
        run: |
          # Check that the main application pod is running
          echo "Checking deployment status..."
          kubectl get pods -o wide
          kubectl get services
          kubectl get secrets
          kubectl get configmaps

          # Verify the main pod is ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=strato-control-plane --timeout=60s

          echo "✅ Chart deployed successfully with lightweight configuration"

      - name: Test chart configuration
        run: |
          # Test that we can retrieve and validate the chart configuration
          echo "Checking chart configuration..."
          helm get values strato-ci-test
          helm get notes strato-ci-test

          # Check that secrets and configmaps were created correctly
          kubectl get secrets -o name | grep strato-ci-test || echo "No chart secrets found (expected with lightweight config)"
          kubectl get configmaps -o name | grep strato-ci-test || echo "No chart configmaps found"

          echo "✅ Chart configuration validated"

      - name: Describe failing pods (if any)
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -o wide

          echo "=== Events ==="
          kubectl get events --sort-by='.metadata.creationTimestamp'

          echo "=== Services ==="
          kubectl get services -o wide

          echo "=== Secrets ==="
          kubectl get secrets

          echo "=== ConfigMaps ==="
          kubectl get configmaps

          echo "=== Helm Status ==="
          helm status strato-ci-test || true

          echo "=== Pod Descriptions ==="
          kubectl get pods -o name | xargs -I {} kubectl describe {} || true

          echo "=== Pod Logs ==="
          kubectl get pods -o name | while read pod; do
            echo "--- Logs for $pod ---"
            kubectl logs $pod --all-containers=true --previous=false || true
          done

          echo "=== Resource Usage ==="
          kubectl top nodes || true
          kubectl top pods || true

      - name: Cleanup
        if: always()
        run: |
          helm uninstall strato-ci-test || true

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build dependencies
        run: |
          cd helm/strato-control-plane
          helm dependency build

      - name: Generate template for security scan
        run: |
          helm template strato-security helm/strato-control-plane/ \
            --set networkPolicy.enabled=true \
            --set podDisruptionBudget.enabled=true > /tmp/security-template.yaml

      - name: Install Checkov
        # Not present on GitHub-hosted runners; install it explicitly.
        run: pipx install checkov

      - name: Run Checkov security scan
        # --soft-fail keeps findings non-blocking; a missing/broken checkov
        # now surfaces instead of being silently masked by `|| true`.
        run: |
          checkov -f /tmp/security-template.yaml \
            --framework kubernetes \
            --output cli \
            --soft-fail

      - name: Check for hardcoded secrets
        run: |
          # Check for potential hardcoded secrets in templates
          # Look for patterns like 'password: "actual-password"' but exclude
          # proper template usage. (The bracket expression previously used
          # \x27, which grep treats as the literal characters \ x 2 7, not an
          # apostrophe.)
          if grep -r "password.*:.*[\"']" helm/strato-control-plane/templates/ | grep -v "secretKeyRef" | grep -v "valueFrom" | grep -v "{{" | grep -v "#"; then
            echo "⚠️  Potential hardcoded secrets found in templates!"
            exit 1
          else
            echo "✅ No hardcoded secrets found in templates"
          fi

      - name: Validate RBAC permissions
        run: |
          # Check if ServiceAccount has minimal permissions
          if helm template test helm/strato-control-plane/ | grep -A 20 -B 5 "kind: ClusterRole\|kind: Role"; then
            echo "⚠️  Found RBAC roles - please review permissions"
          else
            echo "✅ No additional RBAC permissions found"
          fi

  upgrade-test:
    runs-on: ubuntu-latest
    name: Chart Upgrade Test (Experimental)
    needs: [lint, template-validation]
    if: false # Disabled due to CI resource constraints
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up Kind
        uses: helm/kind-action@v1.8.0
        with:
          version: ${{ env.KIND_VERSION }}
          kubectl_version: ${{ env.KUBERNETES_VERSION }}

      - name: Add Bitnami repository
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build dependencies
        run: |
          cd helm/strato-control-plane
          helm dependency build

      - name: Install initial version (lightweight)
        run: |
          # Create lightweight initial test values
          cat > /tmp/upgrade-values-v1.yaml << 'EOF'
          image:
            repository: nginx
            tag: "1.20"

          strato:
            logLevel: info

          # Disable heavy components for faster testing
          spicedb:
            enabled: false

          postgresql:
            enabled: false

          externalDatabase:
            host: "fake-db-host-v1"
            password: "fake-password-v1"

          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi

          livenessProbe:
            enabled: false
          readinessProbe:
            enabled: false

          initContainers:
            waitForDB:
              enabled: false
            waitForSpiceDB:
              enabled: false

          migration:
            enabled: false
          EOF

          helm install strato-upgrade-test helm/strato-control-plane/ \
            -f /tmp/upgrade-values-v1.yaml \
            --wait --timeout=3m

      - name: Upgrade to new version (lightweight)
        run: |
          # Create lightweight upgraded test values
          cat > /tmp/upgrade-values-v2.yaml << 'EOF'
          image:
            repository: nginx
            tag: "1.21"

          strato:
            logLevel: debug

          # Disable heavy components for faster testing
          spicedb:
            enabled: false

          postgresql:
            enabled: false

          externalDatabase:
            host: "fake-db-host-v2"
            password: "fake-password-v2"

          resources:
            requests:
              cpu: 15m
              memory: 24Mi
            limits:
              cpu: 75m
              memory: 96Mi

          livenessProbe:
            enabled: false
          readinessProbe:
            enabled: false

          initContainers:
            waitForDB:
              enabled: false
            waitForSpiceDB:
              enabled: false

          migration:
            enabled: false
          EOF

          echo "Upgrading to new lightweight version..."
          helm upgrade strato-upgrade-test helm/strato-control-plane/ \
            -f /tmp/upgrade-values-v2.yaml \
            --wait --timeout=3m

      - name: Verify upgrade
        run: |
          # Check that pods are running with new configuration
          echo "Checking upgraded deployment..."
          kubectl get pods -o wide

          # Wait for upgraded pod to be ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=strato-control-plane --timeout=60s

          # Check helm history and values
          echo "Checking upgrade history..."
          helm history strato-upgrade-test
          helm get values strato-upgrade-test

          # Verify the image was upgraded
          if kubectl get deployment -o jsonpath='{.items[0].spec.template.spec.containers[0].image}' | grep -q '1.21'; then
            echo "✅ Image successfully upgraded to nginx:1.21"
          else
            echo "❌ Image upgrade failed"
            exit 1
          fi

          echo "✅ Chart upgrade completed successfully"

      - name: Cleanup
        if: always()
        run: |
          helm uninstall strato-upgrade-test || true
