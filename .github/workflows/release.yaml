name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  actions: read

# One release at a time per tag; never cancel a mid-publish release run (a
# half-published manifest set is worse than a queued duplicate).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_CONTROL_PLANE: ${{ github.repository }}-control-plane
  IMAGE_NAME_AGENT: ${{ github.repository }}-agent
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  # Lightweight (changelog + one API call) — runs hosted so the static
  # self-hosted runner is free for the Linux tarball build below.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog between tags
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi

          # Save to file for multiline output
          echo "$CHANGELOG" > changelog.txt

          # Create release notes
          cat > release_notes.md << EOF
          ## Changes

          $CHANGELOG

          ## Docker Images

          - \`ghcr.io/${{ github.repository }}-control-plane:${GITHUB_REF#refs/tags/}\`
          - \`ghcr.io/${{ github.repository }}-frontend:${GITHUB_REF#refs/tags/}\`
          - \`ghcr.io/${{ github.repository }}-agent:${GITHUB_REF#refs/tags/}\`

          ## Installation

          ### Using Docker Compose

          \`\`\`bash
          # Update your docker-compose.yml to use the new version
          docker compose pull
          docker compose up -d
          \`\`\`

          ### Manual Installation

          \`\`\`bash
          # Pull the images
          docker pull ghcr.io/${{ github.repository }}-control-plane:${GITHUB_REF#refs/tags/}
          docker pull ghcr.io/${{ github.repository }}-frontend:${GITHUB_REF#refs/tags/}
          docker pull ghcr.io/${{ github.repository }}-agent:${GITHUB_REF#refs/tags/}
          \`\`\`
          EOF

      # gh replaces the archived actions/create-release@v1. The numeric
      # release id is exported for the binary jobs, which upload assets via
      # the raw REST endpoint (the static self-hosted runner has no gh CLI).
      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          PRERELEASE=""
          case "$TAG" in
            *alpha*|*beta*|*rc*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$TAG" --title "Release $TAG" --notes-file release_notes.md $PRERELEASE
          echo "release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq .id)" >> "$GITHUB_OUTPUT"

  # Compile the release binaries that the container images copy in, mirroring
  # main-build.yaml's prebuilt split: amd64 builds on the swift-runners-strato
  # ARC scale set (its runner image bakes in the Swift 6.3.2 toolchain, so the
  # build runs directly on the pod — no dind, no toolchain install); arm64 runs
  # on the GitHub-hosted ubuntu-24.04-arm runner but INSIDE the swift:6.3.2-noble
  # container (not the runner's newer preinstalled Swift). Both must be 6.3.2:
  # the Dockerfiles copy the Swift runtime .so files into the final images from
  # swift:6.3.2-noble, so a binary linked against a different Swift (the hosted
  # arm64 runner ships 6.3.3) would run against 6.3.2 runtime libs — and Swift on
  # Linux has no stable-ABI guarantee across versions. Pinning the container
  # keeps build and runtime lockstep. This still keeps the heavy Swift compile
  # off the single static self-hosted runner; build-image-digests below just
  # copies these binaries, so the Docker steps stay light on GitHub-hosted
  # runners.
  #
  # No build cache is configured here: releases are infrequent tag pushes where
  # a cold compile is acceptable, and main-build.yaml deliberately keeps the
  # repo under GitHub's 10GB actions/cache budget — a per-release Swift .build
  # cache would evict the caches main builds depend on. (`build-swift-binaries`
  # below still produces the statically-linked release-asset tarballs on the
  # self-hosted runner; those are separate from these jemalloc-linked binaries.)
  build-swift-release:
    name: Build Swift Release (${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'swift-runners-strato' }}
    # arm64 pins the Swift toolchain to the container the Dockerfiles source
    # runtime libs from; amd64's ARC runner image already bakes in 6.3.2, so it
    # runs container-less on the pod (empty string = no job container).
    container: ${{ matrix.arch == 'arm64' && 'swift:6.3.2-noble' || '' }}
    # Backstop for a hung build: the default 360-minute timeout would pin an
    # ARC pool slot (amd64) for six hours. Release builds run cold by design,
    # so allow well over the ~30-minute worst case.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # libjemalloc-dev: the control-plane binary links -ljemalloc.
      # unzip: setup-bun needs it to extract its download.
      # The ARC pod runs as a non-root user with passwordless sudo; guard in
      # case a runner has no sudo binary.
      - name: Install build dependencies
        run: |
          SUDO=""
          command -v sudo >/dev/null && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y libjemalloc-dev unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Build and deploy frontend
        working-directory: control-plane/web
        run: bun run build:deploy

      - name: Build Control Plane Release Binary
        working-directory: control-plane
        run: |
          swift build -c release --product App -Xlinker -ljemalloc
          BIN="$(swift build -c release --show-bin-path)"
          # Create artifact directory structure
          mkdir -p ../artifacts/control-plane/bin
          mkdir -p ../artifacts/control-plane/resources
          # Copy binary
          cp "$BIN/App" ../artifacts/control-plane/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/control-plane/resources/ \; || true
          # Copy Public and Resources directories
          [ -d Public ] && cp -R Public ../artifacts/control-plane/ || true
          [ -d Resources ] && cp -R Resources ../artifacts/control-plane/ || true

      - name: Build Agent Release Binary
        working-directory: agent
        run: |
          swift build -c release --product StratoAgent -Xlinker -ljemalloc
          BIN="$(swift build -c release --show-bin-path)"
          mkdir -p ../artifacts/agent/bin
          mkdir -p ../artifacts/agent/resources
          cp "$BIN/StratoAgent" ../artifacts/agent/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/agent/resources/ \; || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
          retention-days: 1

  # Phase 1 — assemble each image on a GitHub-hosted runner (amd64 on
  # ubuntu-latest, arm64 on ubuntu-24.04-arm) from the prebuilt binaries above,
  # and push each arch by DIGEST ONLY (no tag). The Swift images just copy a
  # binary (nothing compiles in-Docker), so these stay lightweight. Publishing
  # the semver-tagged manifests happens in phase 2, so nothing here is
  # consumable yet: an untagged digest is invisible to taggers until
  # publish-manifests stitches the per-arch digests into a multi-arch manifest
  # list.
  #
  # Phase 1 is two jobs, mirroring main-build.yaml: the Swift images below wait
  # on the release binaries, while the frontend (which consumes no Swift
  # artifacts) builds in its own job immediately, overlapping the Swift
  # compile. The publish barrier still needs both.
  #
  # `provenance: false` suppresses buildx's default SBOM/provenance attestation,
  # which was pushed as an `unknown/unknown` manifest and showed up as a bogus
  # architecture on the GHCR package page.
  build-image-digests:
    name: Build Digest (${{ matrix.image }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    needs: build-swift-release
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: control-plane, arch: amd64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: control-plane, arch: arm64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: agent, arch: amd64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
          - { image: agent, arch: arm64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # No continue-on-error here: with PREBUILT_ARTIFACTS set, the Dockerfile
      # hard-fails on missing artifacts anyway ("no artifacts found"), so
      # tolerating a failed download only moves the error somewhere confusing.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only descriptive OCI labels are attached here; the release tags
      # (type=ref + the three semver patterns) are applied in phase 2 by
      # imagetools, which stamps them onto the merged manifest list.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }}

      # No gha cache for these images: they just copy a prebuilt binary, so
      # their layers are cheap to rebuild and a cache would only add churn
      # against the 10GB repo budget (see main-build.yaml).
      #
      # build-args: both images get PREBUILT_ARTIFACTS and bake the release
      # tag as build identity (STRATO_VERSION/STRATO_GIT_SHA) — surfaced on
      # /health/* by the control-plane, reported in registration and
      # `--version` by the agent.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PREBUILT_ARTIFACTS=${{ matrix.prebuilt }}
            STRATO_VERSION=${{ github.ref_name }}
            STRATO_GIT_SHA=${{ github.sha }}

      # Hand the digest to the publish job via an artifact. The filename is the
      # digest hex (the `sha256:` prefix is stripped — colons are fragile in
      # artifact paths); contents are irrelevant.
      - name: Export digest
        run: |
          mkdir -p /tmp/digest
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digest/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digest/*
          retention-days: 1
          if-no-files-found: error

  # Frontend digests — independent of the Swift binaries; starts immediately.
  # cache-from maps to the registry cache main-build writes (frontend-x64 /
  # frontend-arm64 — main-build names the amd64 arch "x64"). No cache-to: a
  # release builds the same source main already cached, so writing would only
  # overwrite a warm cache with an identical one.
  build-frontend-digest:
    name: Build Digest (frontend, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend

      # The frontend bakes the release tag into the client bundle (the sidebar
      # version label) — same build-identity rationale as the control-plane.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane/web
          file: ./control-plane/web/Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }}-frontend,push-by-digest=true,name-canonical=true,push=true
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}-frontend:buildcache-${{ matrix.arch == 'amd64' && 'x64' || matrix.arch }}
          build-args: |
            STRATO_VERSION=${{ github.ref_name }}
            STRATO_GIT_SHA=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digest
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digest/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-frontend-${{ matrix.arch }}
          path: /tmp/digest/*
          retention-days: 1
          if-no-files-found: error

  # Phase 2 — publish barrier. Needing both phase-1 jobs succeeds only if
  # EVERY leg (all images, both arches) passed, so we never publish a tag for a
  # release whose full image set wasn't built. The multi-arch manifests — and
  # every semver tag — are created here and only here, so the phase-1 digests
  # stay invisible until this runs. Tag creation runs as ordered steps
  # (control-plane → agent → frontend). Each image is re-run through
  # docker/metadata-action to reproduce the same tag set (type=ref plus the
  # three semver patterns) that phase 1 deliberately did NOT apply.
  publish-manifests:
    name: Publish Multi-Arch Manifests
    needs: [build-image-digests, build-frontend-digest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*

      - name: Extract metadata for control plane image
        id: meta-control-plane
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CONTROL_PLANE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract metadata for agent image
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AGENT }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # `imagetools create` builds a fresh manifest list from the per-arch
      # digests and pushes it under every tag metadata-action computed. Ordered
      # control-plane → agent → frontend: a failed step stops the job before the
      # next, and the frontend — which shares a version with the control-plane
      # in the compose deployment — publishes last. The `docker/metadata-action`
      # `tags` output is newline-separated fully-qualified refs; turn each into
      # a `-t` flag.
      - name: Publish control-plane manifest
        env:
          META_TAGS: ${{ steps.meta-control-plane.outputs.tags }}
        run: |
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CONTROL_PLANE }}"
          TAG_ARGS=""
          while IFS= read -r t; do
            [ -n "$t" ] && TAG_ARGS="$TAG_ARGS -t $t"
          done <<< "$META_TAGS"
          DIGESTS=$(for f in /tmp/digests/digest-control-plane-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create $TAG_ARGS $DIGESTS
          docker buildx imagetools inspect "${REF}:${GITHUB_REF#refs/tags/}"

      - name: Publish agent manifest
        env:
          META_TAGS: ${{ steps.meta-agent.outputs.tags }}
        run: |
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AGENT }}"
          TAG_ARGS=""
          while IFS= read -r t; do
            [ -n "$t" ] && TAG_ARGS="$TAG_ARGS -t $t"
          done <<< "$META_TAGS"
          DIGESTS=$(for f in /tmp/digests/digest-agent-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create $TAG_ARGS $DIGESTS
          docker buildx imagetools inspect "${REF}:${GITHUB_REF#refs/tags/}"

      - name: Publish frontend manifest
        env:
          META_TAGS: ${{ steps.meta-frontend.outputs.tags }}
        run: |
          REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}"
          TAG_ARGS=""
          while IFS= read -r t; do
            [ -n "$t" ] && TAG_ARGS="$TAG_ARGS -t $t"
          done <<< "$META_TAGS"
          DIGESTS=$(for f in /tmp/digests/digest-frontend-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create $TAG_ARGS $DIGESTS
          docker buildx imagetools inspect "${REF}:${GITHUB_REF#refs/tags/}"

  build-swift-binaries:
    runs-on: ${{ matrix.os }}
    needs: create-release
    # linux-arm64 pins the Swift toolchain via the swift:6.3.2-noble container
    # (the hosted arm runner's preinstalled Swift is newer); the other legs run
    # container-less (empty string = no job container).
    container: ${{ matrix.container || '' }}
    # Backstop for a hung cold build (default would be 360 minutes).
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - os: self-hosted
            asset_name: strato-linux-x86_64
          # linux-arm64 (issue #431): install.sh derives strato-linux-arm64
          # from uname on aarch64 hosts, so this asset must exist. Built on
          # the GitHub-hosted arm runner like the image-digest jobs, inside
          # the 6.3.2 container for toolchain parity with the x86_64 leg.
          # --static-swift-stdlib makes the container choice irrelevant at
          # runtime, so parity here is about identical language/compiler
          # behavior, not ABI lockstep.
          - os: ubuntu-24.04-arm
            asset_name: strato-linux-arm64
            container: swift:6.3.2-noble
          # macos-latest runners are Apple Silicon (arm64) — this asset was
          # previously mislabeled strato-macos-x86_64. The macOS leg builds
          # with the runner's Xcode toolchain rather than the 6.3.2 pin used
          # everywhere else: that drift is intentional (the pinned 6.3.2
          # toolchain cannot compile the agent's NIOEmbedded dependency on
          # macOS; newer Xcode Swift can), and these standalone binaries link
          # the OS-provided runtime, so there is no lockstep requirement with
          # the swift:6.3.2-noble image runtimes.
          - os: macos-latest
            asset_name: strato-macos-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift (Linux)
        if: matrix.os == 'self-hosted'
        uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.3.2"

      # The asset upload below is raw curl; make sure the container has it
      # (the self-hosted and macOS legs always do).
      - name: Install container dependencies
        if: matrix.container
        run: |
          command -v curl >/dev/null || { apt-get update && apt-get install -y curl; }

      # The tarball binaries run outside any container image, so the image-env
      # STRATO_VERSION/STRATO_GIT_SHA injection can't reach them. Compile the
      # release identity into the agent binary instead by overwriting the
      # checked-in CompiledBuildInfo stub (nil in git → "dev" fallback).
      - name: Bake agent build identity
        run: |
          cat > agent/Sources/StratoAgent/CompiledBuildInfo.swift <<EOF
          // Generated by release.yaml for the release-tarball build; the
          // checked-in stub carries nil values.
          enum CompiledBuildInfo {
              static let version: String? = "${GITHUB_REF_NAME}"
              static let gitSHA: String? = "${GITHUB_SHA}"
          }
          EOF

      - name: Build Swift binaries
        run: |
          # On Linux, statically link the Swift stdlib so the release binaries
          # run on hosts without a Swift toolchain (the install.sh flow drops
          # them onto bare hypervisors). macOS links the OS-provided runtime,
          # where the flag does not apply.
          STATIC=""
          case "${{ matrix.asset_name }}" in
            strato-linux-*) STATIC="--static-swift-stdlib" ;;
          esac

          # Build control plane
          cd control-plane
          swift build -c release $STATIC
          cd ..

          # Build agent
          cd agent
          swift build -c release $STATIC
          cd ..

      - name: Package binaries
        run: |
          mkdir -p release
          cp control-plane/.build/release/App release/strato-control-plane
          cp agent/.build/release/StratoAgent release/strato-agent
          tar czf ${{ matrix.asset_name }}.tar.gz -C release strato-control-plane strato-agent
          # Checksum for install.sh to verify the download.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          fi

      # Raw REST upload rather than `gh release upload`: the static
      # self-hosted runner has no gh CLI, and curl exists everywhere. This
      # also replaces the archived actions/upload-release-asset@v1.
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          for f in "${{ matrix.asset_name }}.tar.gz" "${{ matrix.asset_name }}.tar.gz.sha256"; do
            case "$f" in
              *.sha256) ct="text/plain" ;;
              *) ct="application/gzip" ;;
            esac
            curl -sSf -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: $ct" \
              --data-binary "@$f" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${f}" >/dev/null
            echo "Uploaded $f"
          done

  # Machine-readable pointer to this release's binaries: version, git SHA, and
  # per-platform tarball URL/checksum/size (issue #431). The control plane
  # consumes it — via the stable
  # releases/latest/download/agent-manifest.json URL — to learn the newest
  # agent version and hand each agent a download for its platform; the
  # update flow verifies the sha256 before swapping binaries. Publishing
  # happens only after EVERY tarball leg succeeded, so the manifest never
  # references an asset that failed to upload. Checksums come from the
  # .sha256 sidecars the build legs already computed — no need to re-download
  # the tarballs themselves here.
  publish-agent-manifest:
    runs-on: ubuntu-latest
    needs: build-swift-binaries
    steps:
      - name: Build and upload agent-manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job, so gh gets its repo context from the env.
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="$GITHUB_REF_NAME"

          # Binary tarballs only (strato-<os>-<arch>.tar.gz) — the pattern
          # deliberately excludes the strato-<version>-source.tar.gz archive.
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
            --jq '.assets[]
                  | select(.name | test("^strato-(linux|macos)-[a-z0-9_]+\\.tar\\.gz$"))
                  | [.name, .browser_download_url, (.size | tostring)] | @tsv' \
            > assets.tsv
          [ -s assets.tsv ] || { echo "no strato-<os>-<arch>.tar.gz assets on $TAG" >&2; exit 1; }

          mkdir sidecars
          gh release download "$TAG" --pattern 'strato-*.tar.gz.sha256' --dir sidecars

          entries="[]"
          while IFS=$'\t' read -r name url size; do
            platform="${name#strato-}"; platform="${platform%.tar.gz}"
            os="${platform%%-*}"; arch="${platform#*-}"
            sha256="$(awk '{print $1}' "sidecars/${name}.sha256")"
            [ -n "$sha256" ] || { echo "missing checksum sidecar for $name" >&2; exit 1; }
            entries="$(jq --arg os "$os" --arg arch "$arch" --arg name "$name" \
                          --arg url "$url" --arg sha "$sha256" --argjson size "$size" \
              '. + [{os: $os, arch: $arch, asset: $name, url: $url, sha256: $sha,
                     size: $size, agentBinaryPath: "strato-agent"}]' <<< "$entries")"
          done < assets.tsv

          jq -n --arg version "$TAG" --arg sha "$GITHUB_SHA" --argjson assets "$entries" \
            '{schemaVersion: 1, version: $version, gitSHA: $sha, assets: $assets}' \
            > agent-manifest.json
          cat agent-manifest.json
          # --clobber so a re-run of this job replaces the manifest instead of
          # failing on the existing asset.
          gh release upload "$TAG" agent-manifest.json --clobber

  # Lightweight (git archive + heredocs + uploads) — runs hosted so the static
  # self-hosted runner is free for the Linux tarball build. Everything is
  # staged first and uploaded in a single `gh release upload` at the end.
  upload-source-assets:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The archive filename must match the upload below exactly — an earlier
      # version of this workflow created `strato-1.2.3-source.tar.gz` but tried
      # to upload `strato-v1.2.3-source.tar.gz` (github.ref_name keeps the v).
      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="strato-${VERSION}/" HEAD > "strato-${VERSION}-source.tar.gz"
          git archive --format=zip --prefix="strato-${VERSION}/" HEAD > "strato-${VERSION}-source.zip"

      - name: Create docker-compose release file
        run: |
          cat > docker-compose.release.yml << 'EOF'
          version: '3.8'

          volumes:
            db_data:

          networks:
            strato-network:
              driver: bridge

          services:
            # Nginx reverse proxy - main entry point
            nginx:
              image: nginx:alpine
              ports:
                - "80:80"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf:ro
              depends_on:
                - control-plane
                - frontend
              networks:
                - strato-network

            # Vapor Control Plane (API)
            control-plane:
              image: ghcr.io/${{ github.repository }}-control-plane:${{ github.ref_name }}
              environment:
                DATABASE_HOST: db
                DATABASE_NAME: vapor_database
                DATABASE_USERNAME: vapor_username
                DATABASE_PASSWORD: vapor_password
                SPICEDB_ENDPOINT: http://spicedb:8080
                # Development default — change this before exposing the stack.
                SPICEDB_PRESHARED_KEY: strato-preshared-key-change-me
                WEBAUTHN_RELYING_PARTY_ID: localhost
                WEBAUTHN_RELYING_PARTY_NAME: Strato
                WEBAUTHN_RELYING_PARTY_ORIGIN: http://localhost
                # Public browser origin used to build OIDC redirect URIs. The
                # control plane runs --env production here, where OIDC login
                # fails loudly if this is unset — keep it the browser origin.
                BASE_URL: http://localhost
              depends_on:
                db:
                  condition: service_healthy
                spicedb:
                  condition: service_healthy
                spicedb-schema:
                  condition: service_completed_successfully
              networks:
                - strato-network
              command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]

            # Next.js Frontend
            frontend:
              image: ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}
              environment:
                NODE_ENV: production
                PORT: 3000
              depends_on:
                - control-plane
              networks:
                - strato-network

            # Agents are NOT part of this stack. Each hypervisor host runs its
            # own agent, enrolled with a per-host registration token via
            # `strato-agent join` (or deploy/agent/install.sh). See
            # docs/deployment/agents.md for the Docker/systemd invocation:
            #   docker run -d --name strato-agent --restart unless-stopped \
            #     --user root --device /dev/kvm \
            #     -v /var/lib/strato:/var/lib/strato -v /etc/strato:/etc/strato \
            #     ghcr.io/${{ github.repository }}-agent:${{ github.ref_name }} \
            #     join 'ws://strato.example.com/agent/ws?token=...&name=hv-01'
            # `--user root` is required: the root-owned /var/lib/strato and
            # /etc/strato paths (and the join state-file write check) need root,
            # matching the "run join as root on Linux" guidance in the docs.

            migrate:
              image: ghcr.io/${{ github.repository }}-control-plane:${{ github.ref_name }}
              environment:
                DATABASE_HOST: db
                DATABASE_NAME: vapor_database
                DATABASE_USERNAME: vapor_username
                DATABASE_PASSWORD: vapor_password
                SPICEDB_ENDPOINT: http://spicedb:8080
                SPICEDB_PRESHARED_KEY: strato-preshared-key-change-me
              depends_on:
                db:
                  condition: service_healthy
              networks:
                - strato-network
              command: ["migrate", "--yes"]
              deploy:
                replicas: 0

            db:
              image: postgres:16-alpine
              volumes:
                - db_data:/var/lib/postgresql/data/pgdata
              environment:
                POSTGRES_USER: vapor_username
                POSTGRES_PASSWORD: vapor_password
                POSTGRES_DB: vapor_database
                PGDATA: /var/lib/postgresql/data/strato
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U vapor_username -d vapor_database"]
                interval: 5s
                timeout: 5s
                retries: 5
              ports:
                - "5432:5432"
              networks:
                - strato-network

            # One-shot: bring the SpiceDB datastore schema up to date, then exit.
            spicedb-migrate:
              image: authzed/spicedb:v1.35.3
              command:
                - migrate
                - head
                - --datastore-engine=postgres
                - --datastore-conn-uri=postgres://vapor_username:vapor_password@db:5432/vapor_database?sslmode=disable
              depends_on:
                db:
                  condition: service_healthy
              networks:
                - strato-network
              restart: "no"

            # SpiceDB authorization service (Zanzibar-style, persisted to PostgreSQL).
            # Not published to the host: only the control-plane and schema loader
            # reach it over the internal network, so the preshared key below is
            # never exposed off-host. Change it (and the control-plane's
            # SPICEDB_PRESHARED_KEY) anyway before adding any host port mapping.
            spicedb:
              image: authzed/spicedb:v1.35.3
              command:
                - serve
                - --grpc-preshared-key=strato-preshared-key-change-me
                - --http-enabled
                - --http-addr=:8080
                - --datastore-engine=postgres
                - --datastore-conn-uri=postgres://vapor_username:vapor_password@db:5432/vapor_database?sslmode=disable
              depends_on:
                spicedb-migrate:
                  condition: service_completed_successfully
              healthcheck:
                test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
                interval: 5s
                timeout: 5s
                retries: 5
              networks:
                - strato-network

            # One-shot: load the authorization schema. Safe to re-run on every `up`.
            spicedb-schema:
              image: authzed/zed:latest
              command:
                - schema
                - write
                - /schema/schema.zed
                - --endpoint
                - spicedb:50051
                - --token
                - strato-preshared-key-change-me
                - --insecure
              volumes:
                - ./schema.zed:/schema/schema.zed:ro
              depends_on:
                spicedb:
                  condition: service_healthy
              networks:
                - strato-network
              restart: "no"
          EOF

      - name: Stage SpiceDB schema file
        run: cp spicedb/schema.zed schema.zed

      - name: Create nginx config file
        run: |
          cat > nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              upstream control-plane {
                  server control-plane:8080;
              }

              upstream frontend {
                  server frontend:3000;
              }

              server {
                  listen 80;

                  # WebSocket support
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  # API routes to control plane
                  location /api/ {
                      proxy_pass http://control-plane;
                      proxy_read_timeout 3600s;
                      proxy_send_timeout 3600s;
                  }

                  location /auth/ {
                      proxy_pass http://control-plane;
                  }

                  location /agent/ {
                      proxy_pass http://control-plane;
                      proxy_read_timeout 3600s;
                      proxy_send_timeout 3600s;
                  }

                  location /health/ {
                      proxy_pass http://control-plane;
                  }

                  location /organizations/ {
                      proxy_pass http://control-plane;
                  }

                  # Frontend catch-all
                  location / {
                      proxy_pass http://frontend;
                  }
              }
          }
          EOF

      # Asset names are the file basenames (deploy/agent/install.sh uploads
      # as install.sh, which is what the docs point users at).
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "strato-${VERSION}-source.tar.gz" \
            "strato-${VERSION}-source.zip" \
            nginx.conf \
            docker-compose.release.yml \
            schema.zed \
            deploy/agent/install.sh
