name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_CONTROL_PLANE: ${{ github.repository }}-control-plane
  IMAGE_NAME_AGENT: ${{ github.repository }}-agent
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  create-release:
    runs-on: self-hosted
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog between tags
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          fi

          # Save to file for multiline output
          echo "$CHANGELOG" > changelog.txt

          # Create release notes
          cat > release_notes.md << EOF
          ## Changes

          $CHANGELOG

          ## Docker Images

          - \`ghcr.io/${{ github.repository }}-control-plane:${GITHUB_REF#refs/tags/}\`
          - \`ghcr.io/${{ github.repository }}-frontend:${GITHUB_REF#refs/tags/}\`
          - \`ghcr.io/${{ github.repository }}-agent:${GITHUB_REF#refs/tags/}\`

          ## Installation

          ### Using Docker Compose

          \`\`\`bash
          # Update your docker-compose.yml to use the new version
          docker compose pull
          docker compose up -d
          \`\`\`

          ### Manual Installation

          \`\`\`bash
          # Pull the images
          docker pull ghcr.io/${{ github.repository }}-control-plane:${GITHUB_REF#refs/tags/}
          docker pull ghcr.io/${{ github.repository }}-frontend:${GITHUB_REF#refs/tags/}
          docker pull ghcr.io/${{ github.repository }}-agent:${GITHUB_REF#refs/tags/}
          \`\`\`
          EOF

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  build-and-push-images:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-latest-arm' || 'self-hosted' }}
    needs: create-release
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jemalloc dependencies (arm64)
        if: matrix.platform == 'linux/arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libjemalloc-dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for control plane image
        id: meta-control-plane
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_CONTROL_PLANE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract metadata for agent image
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AGENT }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push control plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-control-plane.outputs.tags }}
          labels: ${{ steps.meta-control-plane.outputs.labels }}
          cache-from: type=gha,key=control-plane-${{ matrix.platform }}
          cache-to: type=gha,mode=max,key=control-plane-${{ matrix.platform }}
          # Bake the release tag as the build identity, surfaced on /health/*
          # (see control-plane/Sources/App/BuildInfo.swift).
          build-args: |
            STRATO_VERSION=${{ github.ref_name }}
            STRATO_GIT_SHA=${{ github.sha }}

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha,key=agent-${{ matrix.platform }}
          cache-to: type=gha,mode=max,key=agent-${{ matrix.platform }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane/web
          file: ./control-plane/web/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,key=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,key=frontend-${{ matrix.platform }}
          # Bake the release tag as the build identity so the UI shows the tag
          # (see control-plane/web/src/lib/version.ts).
          build-args: |
            STRATO_VERSION=${{ github.ref_name }}
            STRATO_GIT_SHA=${{ github.sha }}

  build-swift-binaries:
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: self-hosted
            asset_name: strato-linux-x86_64
          - os: macos-latest
            asset_name: strato-macos-x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Swift (Linux)
        if: matrix.os == 'self-hosted'
        uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.3.2"

      - name: Debug jemalloc
        if: matrix.os == 'self-hosted'
        run: |
          ldconfig -p | grep -i jemalloc || echo "jemalloc missing"
          find /usr -name "libjemalloc*"

      - name: Build Swift binaries
        run: |
          # On Linux, statically link the Swift stdlib so the release binaries
          # run on hosts without a Swift toolchain (the install.sh flow drops
          # them onto bare hypervisors). macOS links the OS-provided runtime,
          # where the flag does not apply.
          STATIC=""
          if [ "${{ matrix.os }}" = "self-hosted" ]; then STATIC="--static-swift-stdlib"; fi

          # Build control plane
          cd control-plane
          swift build -c release $STATIC
          cd ..

          # Build agent
          cd agent
          swift build -c release $STATIC
          cd ..

      - name: Package binaries
        run: |
          mkdir -p release
          cp control-plane/.build/release/App release/strato-control-plane
          cp agent/.build/release/StratoAgent release/strato-agent
          tar czf ${{ matrix.asset_name }}.tar.gz -C release strato-control-plane strato-agent
          # Checksum for install.sh to verify the download.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
          fi

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz
          asset_name: ${{ matrix.asset_name }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Release Asset checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}.tar.gz.sha256
          asset_name: ${{ matrix.asset_name }}.tar.gz.sha256
          asset_content_type: text/plain

  upload-source-assets:
    runs-on: self-hosted
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix=strato-${GITHUB_REF#refs/tags/v}/ HEAD > strato-${GITHUB_REF#refs/tags/v}-source.tar.gz
          git archive --format=zip --prefix=strato-${GITHUB_REF#refs/tags/v}/ HEAD > strato-${GITHUB_REF#refs/tags/v}-source.zip

      - name: Upload source tar.gz
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./strato-${{ github.ref_name }}-source.tar.gz
          asset_name: strato-${{ github.ref_name }}-source.tar.gz
          asset_content_type: application/gzip

      - name: Upload source zip
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./strato-${{ github.ref_name }}-source.zip
          asset_name: strato-${{ github.ref_name }}-source.zip
          asset_content_type: application/zip

      - name: Create docker-compose release file
        run: |
          cat > docker-compose.release.yml << 'EOF'
          version: '3.8'

          volumes:
            db_data:

          networks:
            strato-network:
              driver: bridge

          services:
            # Nginx reverse proxy - main entry point
            nginx:
              image: nginx:alpine
              ports:
                - "80:80"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf:ro
              depends_on:
                - control-plane
                - frontend
              networks:
                - strato-network

            # Vapor Control Plane (API)
            control-plane:
              image: ghcr.io/${{ github.repository }}-control-plane:${{ github.ref_name }}
              environment:
                DATABASE_HOST: db
                DATABASE_NAME: vapor_database
                DATABASE_USERNAME: vapor_username
                DATABASE_PASSWORD: vapor_password
                SPICEDB_ENDPOINT: http://spicedb:8080
                # Development default — change this before exposing the stack.
                SPICEDB_PRESHARED_KEY: strato-preshared-key-change-me
                WEBAUTHN_RELYING_PARTY_ID: localhost
                WEBAUTHN_RELYING_PARTY_NAME: Strato
                WEBAUTHN_RELYING_PARTY_ORIGIN: http://localhost
              depends_on:
                db:
                  condition: service_healthy
                spicedb:
                  condition: service_healthy
                spicedb-schema:
                  condition: service_completed_successfully
              networks:
                - strato-network
              command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]

            # Next.js Frontend
            frontend:
              image: ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}
              environment:
                NODE_ENV: production
                PORT: 3000
              depends_on:
                - control-plane
              networks:
                - strato-network

            # Agents are NOT part of this stack. Each hypervisor host runs its
            # own agent, enrolled with a per-host registration token via
            # `strato-agent join` (or deploy/agent/install.sh). See
            # docs/deployment/agents.md for the Docker/systemd invocation:
            #   docker run -d --name strato-agent --restart unless-stopped \
            #     --user root --device /dev/kvm \
            #     -v /var/lib/strato:/var/lib/strato -v /etc/strato:/etc/strato \
            #     ghcr.io/${{ github.repository }}-agent:${{ github.ref_name }} \
            #     join 'ws://strato.example.com/agent/ws?token=...&name=hv-01'
            # `--user root` is required: the root-owned /var/lib/strato and
            # /etc/strato paths (and the join state-file write check) need root,
            # matching the "run join as root on Linux" guidance in the docs.

            migrate:
              image: ghcr.io/${{ github.repository }}-control-plane:${{ github.ref_name }}
              environment:
                DATABASE_HOST: db
                DATABASE_NAME: vapor_database
                DATABASE_USERNAME: vapor_username
                DATABASE_PASSWORD: vapor_password
                SPICEDB_ENDPOINT: http://spicedb:8080
                SPICEDB_PRESHARED_KEY: strato-preshared-key-change-me
              depends_on:
                db:
                  condition: service_healthy
              networks:
                - strato-network
              command: ["migrate", "--yes"]
              deploy:
                replicas: 0

            db:
              image: postgres:16-alpine
              volumes:
                - db_data:/var/lib/postgresql/data/pgdata
              environment:
                POSTGRES_USER: vapor_username
                POSTGRES_PASSWORD: vapor_password
                POSTGRES_DB: vapor_database
                PGDATA: /var/lib/postgresql/data/strato
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U vapor_username -d vapor_database"]
                interval: 5s
                timeout: 5s
                retries: 5
              ports:
                - "5432:5432"
              networks:
                - strato-network

            # One-shot: bring the SpiceDB datastore schema up to date, then exit.
            spicedb-migrate:
              image: authzed/spicedb:v1.35.3
              command:
                - migrate
                - head
                - --datastore-engine=postgres
                - --datastore-conn-uri=postgres://vapor_username:vapor_password@db:5432/vapor_database?sslmode=disable
              depends_on:
                db:
                  condition: service_healthy
              networks:
                - strato-network
              restart: "no"

            # SpiceDB authorization service (Zanzibar-style, persisted to PostgreSQL).
            # Not published to the host: only the control-plane and schema loader
            # reach it over the internal network, so the preshared key below is
            # never exposed off-host. Change it (and the control-plane's
            # SPICEDB_PRESHARED_KEY) anyway before adding any host port mapping.
            spicedb:
              image: authzed/spicedb:v1.35.3
              command:
                - serve
                - --grpc-preshared-key=strato-preshared-key-change-me
                - --http-enabled
                - --http-addr=:8080
                - --datastore-engine=postgres
                - --datastore-conn-uri=postgres://vapor_username:vapor_password@db:5432/vapor_database?sslmode=disable
              depends_on:
                spicedb-migrate:
                  condition: service_completed_successfully
              healthcheck:
                test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
                interval: 5s
                timeout: 5s
                retries: 5
              networks:
                - strato-network

            # One-shot: load the authorization schema. Safe to re-run on every `up`.
            spicedb-schema:
              image: authzed/zed:latest
              command:
                - schema
                - write
                - /schema/schema.zed
                - --endpoint
                - spicedb:50051
                - --token
                - strato-preshared-key-change-me
                - --insecure
              volumes:
                - ./schema.zed:/schema/schema.zed:ro
              depends_on:
                spicedb:
                  condition: service_healthy
              networks:
                - strato-network
              restart: "no"
          EOF

      - name: Stage SpiceDB schema file
        run: cp spicedb/schema.zed schema.zed

      - name: Create nginx config file
        run: |
          cat > nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              upstream control-plane {
                  server control-plane:8080;
              }

              upstream frontend {
                  server frontend:3000;
              }

              server {
                  listen 80;

                  # WebSocket support
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  # API routes to control plane
                  location /api/ {
                      proxy_pass http://control-plane;
                      proxy_read_timeout 3600s;
                      proxy_send_timeout 3600s;
                  }

                  location /auth/ {
                      proxy_pass http://control-plane;
                  }

                  location /agent/ {
                      proxy_pass http://control-plane;
                      proxy_read_timeout 3600s;
                      proxy_send_timeout 3600s;
                  }

                  location /health/ {
                      proxy_pass http://control-plane;
                  }

                  location /organizations/ {
                      proxy_pass http://control-plane;
                  }

                  # Frontend catch-all
                  location / {
                      proxy_pass http://frontend;
                  }
              }
          }
          EOF

      - name: Upload nginx config file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./nginx.conf
          asset_name: nginx.conf
          asset_content_type: text/plain

      - name: Upload docker-compose release file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./docker-compose.release.yml
          asset_name: docker-compose.release.yml
          asset_content_type: text/yaml

      - name: Upload SpiceDB schema file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./schema.zed
          asset_name: schema.zed
          asset_content_type: text/plain

      - name: Upload agent install script
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./deploy/agent/install.sh
          asset_name: install.sh
          asset_content_type: text/x-shellscript
