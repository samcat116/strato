name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: read # dorny/paths-filter reads changed files via the PR API

# Cancel any in-progress run for the same PR when a new commit is pushed,
# so stale runs don't tie up Swift runner capacity.
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the repo changed so we can skip heavy jobs on
  # e.g. docs-only PRs. Jobs are gated with `if:` (not workflow-level
  # `on.paths`) so a skipped job still reports as a passing check — this
  # keeps them safe to use as required status checks in branch protection.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      cp_backend: ${{ steps.filter.outputs.cp_backend }}
      agent: ${{ steps.filter.outputs.agent }}
      shared: ${{ steps.filter.outputs.shared }}
      cli: ${{ steps.filter.outputs.cli }}
      api_client: ${{ steps.filter.outputs.api_client }}
      firecracker: ${{ steps.filter.outputs.firecracker }}
      workflow: ${{ steps.filter.outputs.workflow }}
      code: ${{ steps.filter.outputs.code }}
      docker_cp: ${{ steps.filter.outputs.docker_cp }}
      docker_agent: ${{ steps.filter.outputs.docker_agent }}
      docker_web: ${{ steps.filter.outputs.docker_web }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `every`: a changed file matches a filter only if it matches ALL of
          # that filter's patterns, which is what makes the `!` exclusions
          # actually take effect. (With the default `some`, a file matching any
          # single positive pattern matches the filter and negations are
          # ignored — so `!control-plane/web/**` and the docs exclusions below
          # would be no-ops.) OR across directories is therefore expressed in
          # each job's `if:` rather than inside a single filter.
          predicate-quantifier: "every"
          filters: |
            web:
              - 'control-plane/web/**'
            cp_backend:
              - 'control-plane/**'
              - '!control-plane/web/**'
            agent:
              - 'agent/**'
            shared:
              - 'shared/**'
            cli:
              - 'cli/**'
            # The generated Swift client tracks the spec, which lives in the
            # control plane — a spec-only change still has to rebuild it.
            api_client:
              - 'clients/swift/**'
            firecracker:
              - 'SwiftFirecracker/**'
            workflow:
              - '.github/workflows/build.yaml'
            docker_cp:
              - 'control-plane/Dockerfile'
            docker_agent:
              - 'agent/Dockerfile'
            docker_web:
              - 'control-plane/web/Dockerfile'
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!LICENSE'

  swift-format:
    name: Swift Format Lint
    needs: changes
    # SwiftFirecracker/ is vendored and deliberately not linted, so
    # firecracker-only changes don't trigger this job.
    if: needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.agent == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.api_client == 'true' || needs.changes.outputs.workflow == 'true'
    # Lightweight formatting check — runs on GitHub-hosted runners to keep the
    # Swift runner pool free for the heavy build+test job. `swift format`
    # ships with the toolchain, so no extra tooling is needed.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.3.2"

      - name: Lint Swift formatting
        # --strict makes any lint finding a non-zero exit. The .swift-format
        # config at the repo root is picked up automatically via --recursive.
        run: |
          swift format lint --strict --recursive --parallel \
            control-plane/Sources control-plane/Tests \
            agent/Sources agent/Tests \
            shared/Sources shared/Tests \
            cli/Sources cli/Tests \
            clients/swift/Sources clients/swift/Tests

  lint-and-build-frontend:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.workflow == 'true'
    # Lightweight Bun job — runs on GitHub-hosted runners to keep the
    # Swift runner pool free for the heavy build+test job.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      # `src/types/openapi.ts` is generated from the spec and checked in, so
      # editors and CI see the same types. Regenerating must be a no-op.
      - name: Check generated API types are current
        working-directory: control-plane/web
        run: |
          bun run generate:api-types
          git diff --exit-code -- src/types/openapi.ts \
            || { echo "::error::src/types/openapi.ts is stale — run 'bun run generate:api-types' in control-plane/web"; exit 1; }

      - name: Run linting
        working-directory: control-plane/web
        run: bun run lint

      - name: Build frontend
        working-directory: control-plane/web
        run: bun run build

  openapi-validate:
    name: OpenAPI Spec Validation
    needs: changes
    if: needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.workflow == 'true'
    # Lightweight validity check of the spec-first OpenAPI document (issue
    # #557). The swift-openapi-generator build plugin is the authoritative
    # validator (it fails the Swift build on an invalid spec); this job gives
    # fast feedback without the multi-minute Swift build. Runs on a
    # GitHub-hosted runner to keep the Swift runner pool free.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Lint OpenAPI document
        run: bunx @redocly/cli@1 lint control-plane/Sources/App/openapi.yaml

  # The Swift test jobs below run concurrently on the ARC scale set — the
  # wall-clock win that used to be impossible when everything shared one job.
  # Each claims its own slot from a persistent pool of warm build trees (see
  # the comment on the claim step) so two jobs never write the same tree.
  #
  # ARC (actions-runner-controller) runner scale set. Scale-set runners
  # match on exactly one label — the installation name — so do not add
  # `self-hosted` or arch labels here.
  #
  # Jobs run directly on the runner pod: the scale set's runner image bakes in
  # the Swift 6.3.2 toolchain (and git, which SwiftPM needs). They used to run
  # in a `container: swift:6.3.2-noble` job container, but that pulled the
  # multi-GB Swift image through dind on every job. vapor/swiftly-action is
  # still not an option on ARC pods ($USER is unset, so it sources
  # /home//.local/.../env.sh) — a toolchain bump means rebuilding the runner
  # image together with the Dockerfiles.
  test:
    name: Build and Test Swift Packages
    needs: changes
    if: needs.changes.outputs.agent == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.cli == 'true' || needs.changes.outputs.api_client == 'true' || needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.firecracker == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: swift-runners-strato
    # Backstop for a hung build/test: the default 360-minute timeout would pin
    # a scarce runner-pool slot for six hours. Warm runs finish in ~15 minutes,
    # cold rebuilds in ~30.
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build state lives in a scratch dir under RUNNER_TOOL_CACHE instead of
      # actions/cache: the GitHub cache never helped here — PR-scoped saves
      # are unreadable by sibling PRs and nothing on main saves the key, so
      # every run paid a ~5 minute 1.4GB upload for a restore that always
      # missed.
      #
      # That scratch dir was never actually warm, though: /home/runner/_work is
      # an emptyDir in the runner pod spec and every job gets a fresh pod, so
      # RUNNER_TOOL_CACHE starts empty. Measured over the runs on 2026-07-21,
      # every single one created all 61 dependency working copies and compiled
      # ~3,500 files — fully cold, always.
      #
      # The build tree now lives on a persistent hostPath instead, claimed by
      # the "Claim build scratch slot" step below and exported as
      # BUILD_SCRATCH_ROOT. A single shared tree would not work — SwiftPM locks
      # a scratch directory exclusively, so concurrent jobs would serialize —
      # so the homelab role provisions a POOL of interchangeable slots and each
      # job flocks one for its duration. The pool is sized above the number of
      # runner pods the scheduler admits, so a job never waits; if every slot
      # is somehow busy the claim degrades to the old pod-local cold path
      # rather than queueing. Never assume BUILD_SCRATCH_ROOT is warm or even
      # shared: it is whichever of those two the claim step resolved to.
      #
      # The SwiftPM shared cache (git mirrors, compiled manifests, binary
      # artifacts) lives on a hostPath — /cache/swiftpm — mounted into every
      # runner pod from the (single-node) runner host, provisioned by the
      # github_runner Ansible role in samcat116/homelab (ghr_swiftpm_cache_*).
      # The "Resolve SwiftPM shared cache path" step below probes that mount and
      # exports SWIFTPM_CACHE_PATH: it uses /cache/swiftpm when it is present and
      # writable, and otherwise falls back to a pod-local (cold) directory. That
      # guard matters because SwiftPM does NOT create a missing cache root on its
      # own — pointing --cache-path at an unwritable /cache/swiftpm fails the
      # build outright ("error: invalid access to /cache/swiftpm"), so the mount
      # being absent must degrade to cold rather than break the run. The two
      # mounts are separate on purpose: the SwiftPM cache is built for
      # concurrent multi-process access and is shared by every pod at once,
      # while a scratch tree takes an exclusive lock and so has to be claimed
      # one job at a time.
      #
      # The dominant cost was never the cache, though. Two runs the same evening
      # did identical cold work: 29870517360 took 5.2 minutes total, 29873252059
      # took 30.7. Every phase scaled together (fetch 71s → 456s,
      # graph-load/plugin-build/planning 57s → 648s, compile 185s → 734s) —
      # a starved pod, not a missing cache. The runner pods had no CPU limit, so
      # the scheduler packed ~7 of them onto 16 cores while each ran an
      # unconstrained parallel build. They now request and cap 4 CPU each, which
      # is why the builds below pass a matching `-j 4`: SwiftPM sizes its own
      # parallelism from the host's core count, not the cgroup quota, so without
      # it a pod spawns 16 compile jobs inside a 4-core budget and thrashes.
      # (`swift test --parallel` has no equivalent knob — swift-testing sizes its
      # executor from activeProcessorCount — but the test phase is DB-bound
      # rather than CPU-bound, so it matters much less.)
      #
      # Each job prunes only the scratch dirs inside the slot it claimed —
      # sibling jobs hold other slots on the same volume, so wiping anything
      # above the claimed slot would delete an in-flight build tree.
      #
      # This prune is load-bearing now that the trees persist: it is what keeps
      # a slot from growing without bound across the many branches that pass
      # through it, and it doubles as the periodic cold rebuild that catches a
      # tree only incremental builds can still link.
      #
      # --force-resolved-versions builds exactly what Package.resolved pins and
      # skips re-resolution. With a cold cache the win is small (it avoids the
      # remote branch checks that the branch-pinned deps — swift-scim and
      # webauthn-swift at main, swift-qemu at main, swift-toml at master — force
      # on every unforced resolve), but it also makes CI build the pinned graph
      # rather than silently re-resolving. NOTE that makes a Package.swift change
      # with an uncommitted Package.resolved a build failure instead of a silent
      # re-resolve — intended, but a behavior change for anyone who forgets.
      # Claims one slot from the "packages" pool and exports BUILD_SCRATCH_ROOT.
      # Separate pool from the control-plane job: the two build disjoint
      # component sets, so sharing a pool would have each of them repeatedly
      # landing on a slot warmed for the other.
      - name: Claim build scratch slot
        run: bash .github/scripts/claim-build-scratch.sh packages

      - name: Prune build scratch dirs if oversized
        run: |
          for scratch in "$BUILD_SCRATCH_ROOT/shared" "$BUILD_SCRATCH_ROOT/agent" "$BUILD_SCRATCH_ROOT/cli" "$BUILD_SCRATCH_ROOT/api-client"; do
            if [ -d "$scratch" ]; then
              size_kb=$(du -sk "$scratch" | cut -f1)
              if [ "$size_kb" -gt $((10 * 1024 * 1024)) ]; then
                echo "$scratch is $((size_kb / 1024 / 1024))GB (>10GB); wiping for a cold rebuild"
                rm -rf "$scratch"
              fi
            fi
          done

      # Probe the shared SwiftPM cache hostPath and export SWIFTPM_CACHE_PATH.
      # SwiftPM will not create a missing cache root itself — an unwritable
      # /cache/swiftpm makes every `swift build` fail with "invalid access" — so
      # when the homelab-provisioned mount is absent we fall back to a pod-local
      # (cold) directory instead. Written to $GITHUB_ENV so the build/test steps
      # below pick it up.
      - name: Resolve SwiftPM shared cache path
        run: |
          shared=/cache/swiftpm
          if mkdir -p "$shared" 2>/dev/null && [ -w "$shared" ]; then
            echo "using shared SwiftPM cache at $shared"
            echo "SWIFTPM_CACHE_PATH=$shared" >> "$GITHUB_ENV"
          else
            fallback="$RUNNER_TOOL_CACHE/swiftpm-cache"
            mkdir -p "$fallback"
            echo "shared cache $shared unavailable; falling back to pod-local $fallback (cold)"
            echo "SWIFTPM_CACHE_PATH=$fallback" >> "$GITHUB_ENV"
          fi

      # Each package's steps are gated on the paths that affect it: the job as a
      # whole also runs for spec-only changes (which rebuild the API client), and
      # those should not pay for a shared/agent build.
      - name: Build Shared Package
        id: build-shared
        if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.agent == 'true' || needs.changes.outputs.firecracker == 'true' || needs.changes.outputs.workflow == 'true' }}
        working-directory: shared
        run: bash "$GITHUB_WORKSPACE/.github/scripts/swift-build.sh" "$BUILD_SCRATCH_ROOT/shared" --build-tests -j 4 --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Test Shared Package
        if: ${{ !cancelled() && steps.build-shared.outcome == 'success' }}
        working-directory: shared
        run: swift test --skip-build --parallel --scratch-path "$BUILD_SCRATCH_ROOT/shared" --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Build Agent
        # Run even if the shared tests failed — agent coverage should
        # always report on PRs that touch it.
        id: build-agent
        if: ${{ !cancelled() && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.agent == 'true' || needs.changes.outputs.firecracker == 'true' || needs.changes.outputs.workflow == 'true') }}
        working-directory: agent
        run: bash "$GITHUB_WORKSPACE/.github/scripts/swift-build.sh" "$BUILD_SCRATCH_ROOT/agent" --build-tests -j 4 --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Test Agent
        if: ${{ !cancelled() && steps.build-agent.outcome == 'success' }}
        working-directory: agent
        run: swift test --skip-build --parallel --scratch-path "$BUILD_SCRATCH_ROOT/agent" --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Build CLI
        # Same always-report policy as the agent: CLI coverage runs even when
        # an earlier package's tests failed.
        id: build-cli
        if: ${{ !cancelled() && (needs.changes.outputs.cli == 'true' || needs.changes.outputs.workflow == 'true') }}
        working-directory: cli
        run: bash "$GITHUB_WORKSPACE/.github/scripts/swift-build.sh" "$BUILD_SCRATCH_ROOT/cli" --build-tests -j 4 --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Test CLI
        if: ${{ !cancelled() && steps.build-cli.outcome == 'success' }}
        working-directory: cli
        run: swift test --skip-build --parallel --scratch-path "$BUILD_SCRATCH_ROOT/cli" --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      # The generated API client (issue #583). Its openapi.yaml is a symlink to
      # the control plane's, so a spec change that breaks generation fails here
      # rather than in a downstream consumer.
      - name: Build Swift API Client
        id: build-api-client
        if: ${{ !cancelled() && (needs.changes.outputs.api_client == 'true' || needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.workflow == 'true') }}
        working-directory: clients/swift
        run: bash "$GITHUB_WORKSPACE/.github/scripts/swift-build.sh" "$BUILD_SCRATCH_ROOT/api-client" --build-tests -j 4 --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      - name: Test Swift API Client
        if: ${{ !cancelled() && steps.build-api-client.outcome == 'success' }}
        working-directory: clients/swift
        run: swift test --skip-build --parallel --scratch-path "$BUILD_SCRATCH_ROOT/api-client" --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      # The flock holder is a detached process, so the lock would also be
      # released when the ephemeral pod exits. Release it explicitly anyway:
      # that invariant belongs to how the runners are deployed, not to this
      # workflow, and a slot leaked to a 24h sleep would cost a pool slot.
      - name: Release build scratch slot
        if: always()
        run: kill "$BUILD_SCRATCH_HOLDER_PID" 2>/dev/null || true

  # Control-plane build + test against Postgres — the engine production uses,
  # validating migrations and Postgres-specific SQL (issue #195). The suite
  # used to also run a second leg on SQLite, but nothing used the SQLite
  # backend (local runs are Postgres too now) and the leg took 4-8 minutes to
  # the Postgres leg's ~1 (file-backed SQLite fsyncs on overlayfs vs a
  # durability-off tmpfs Postgres), so it was removed along with the backend.
  test-control-plane:
    name: Test Control Plane
    needs: changes
    if: needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: swift-runners-strato
    # Backstop for a hung build/test (see the test job above).
    timeout-minutes: 60
    # Postgres is deliberately NOT a `services:` container. Service containers
    # are pulled and started in `Initialize containers`, before checkout — ~90s
    # (42s pull into the empty dind image store, 30s create/start, 15s of
    # health polling) charged up front even though nothing connects until the
    # test step ~20 minutes later. Starting it ourselves in the background
    # right after checkout overlaps all of that with the Swift build.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Own pool, not just an own directory: this job and the packages job build
      # disjoint component sets, so sharing one pool would have each of them
      # repeatedly claiming a slot warmed for the other. See the claim step in
      # the packages job for how slots work.
      - name: Claim build scratch slot
        run: bash .github/scripts/claim-build-scratch.sh control-plane

      # Prune only inside the claimed slot — sibling jobs hold other slots on
      # the same volume, so reaching above it would delete an in-flight tree.
      # The control-plane-postgres dir is orphaned (its job merged into this
      # one); remove it if an older run left one behind in this slot.
      - name: Prune build scratch dir if oversized
        run: |
          rm -rf "$BUILD_SCRATCH_ROOT/control-plane-postgres"
          scratch="$BUILD_SCRATCH_ROOT/control-plane"
          if [ -d "$scratch" ]; then
            size_kb=$(du -sk "$scratch" | cut -f1)
            if [ "$size_kb" -gt $((10 * 1024 * 1024)) ]; then
              echo "$scratch is $((size_kb / 1024 / 1024))GB (>10GB); wiping for a cold rebuild"
              rm -rf "$scratch"
            fi
          fi

      # Kick off the pull+boot and move on: the build below takes ~20 minutes,
      # so by the time "Wait for Postgres" runs the server has long been up.
      # nohup + & detaches it from this step's shell; the runner does not reap
      # background processes between steps. Published on the pod loopback (the
      # dind daemon shares the runner pod's network namespace), matching the
      # DATABASE_HOST/PORT the test step passes.
      #
      # The test databases are schema-only (no seed data), so the in-RAM data
      # dir costs negligible memory against the 8Gi pod while removing the
      # overlay-FS copy cost of each CREATE DATABASE ... TEMPLATE clone.
      - name: Start Postgres
        run: |
          nohup bash -c '
            docker rm -f strato-ci-postgres >/dev/null 2>&1 || true
            docker pull postgres:15
            docker run -d --name strato-ci-postgres \
              -p 5432:5432 \
              --tmpfs /var/lib/postgresql/data:rw \
              -e POSTGRES_DB=strato_test \
              -e POSTGRES_USER=strato \
              -e POSTGRES_PASSWORD=strato_password \
              postgres:15
          ' > "$RUNNER_TEMP/postgres-start.log" 2>&1 &

      # The write-time guardrail check and the role-nesting subsumption proof
      # (#484) skip themselves without a solver, which would leave them
      # silently covering nothing.
      # Into the workspace rather than /usr/local/bin: the ARC runner pod's
      # user has no reliable sudo, and the tests take the path from the
      # environment anyway.
      - name: Install cvc5
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          ./scripts/install-cvc5.sh "$RUNNER_TEMP/bin"
          echo "IAM_SYMCC_SOLVER_PATH=$RUNNER_TEMP/bin/cvc5" >> "$GITHUB_ENV"

      # See the identical step in the `test` job: probe the shared cache mount
      # and fall back to a pod-local (cold) directory when it is absent, so a
      # missing /cache/swiftpm degrades instead of failing the build.
      - name: Resolve SwiftPM shared cache path
        run: |
          shared=/cache/swiftpm
          if mkdir -p "$shared" 2>/dev/null && [ -w "$shared" ]; then
            echo "using shared SwiftPM cache at $shared"
            echo "SWIFTPM_CACHE_PATH=$shared" >> "$GITHUB_ENV"
          else
            fallback="$RUNNER_TOOL_CACHE/swiftpm-cache"
            mkdir -p "$fallback"
            echo "shared cache $shared unavailable; falling back to pod-local $fallback (cold)"
            echo "SWIFTPM_CACHE_PATH=$fallback" >> "$GITHUB_ENV"
          fi

      - name: Build Control Plane
        id: build-cp
        working-directory: control-plane
        run: bash "$GITHUB_WORKSPACE/.github/scripts/swift-build.sh" "$BUILD_SCRATCH_ROOT/control-plane" --build-tests -j 4 --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      # Normally a no-op: the background start above had the whole build to
      # finish. The generous budget only matters when the registry is slow —
      # one pull took 6.5 minutes on 2026-07-21.
      - name: Wait for Postgres
        run: |
          for _ in $(seq 1 300); do
            if docker exec strato-ci-postgres pg_isready -U strato -d strato_test >/dev/null 2>&1; then
              echo "postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become ready; start log:"
          cat "$RUNNER_TEMP/postgres-start.log" || true
          docker logs strato-ci-postgres 2>&1 | tail -50 || true
          exit 1

      - name: Test Control Plane
        working-directory: control-plane
        env:
          # This Postgres is the throwaway container started above and dies with
          # the runner pod, so the harness may disable durability
          # (fsync/synchronous_commit/full_page_writes) for faster clones. Never
          # set this against a persistent cluster — the tuning is cluster-wide.
          STRATO_TEST_DISPOSABLE_POSTGRES: "1"
          # The container publishes 5432 to the runner pod. 127.0.0.1 rather
          # than localhost: docker publishes on IPv4, and localhost can resolve
          # to ::1 first.
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: strato_test
          DATABASE_USERNAME: strato
          DATABASE_PASSWORD: strato_password
        # Fully parallel: each test app runs on a 2-loop event-loop group
        # (1 pooled connection per loop), and per-test database clones are
        # minted through one serialized admin connection — see
        # control-plane/Tests/AppTests/TestUtilities.swift — so the suite
        # stays far under Postgres's default max_connections=100. This
        # used to be forced to --no-parallel and took ~8 minutes.
        run: swift test --skip-build --parallel --xunit-output test-results.xml --scratch-path "$BUILD_SCRATCH_ROOT/control-plane" --cache-path "$SWIFTPM_CACHE_PATH" --force-resolved-versions

      # Surface the exact failing test (and its message) as a JUnit report,
      # since the raw job log is dominated by per-request debug output.
      - name: Upload control-plane test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-test-results
          path: control-plane/test-results*.xml
          if-no-files-found: warn

      # The runner pod (and its dind sidecar) is ephemeral, so this is belt and
      # braces against a reused runner leaving a stale container on :5432.
      - name: Stop Postgres
        if: always()
        run: docker rm -f strato-ci-postgres || true

      # Same reasoning as Stop Postgres: the detached flock holder dies with
      # the pod, but a leaked one would park a pool slot on a 24h sleep.
      - name: Release build scratch slot
        if: always()
        run: kill "$BUILD_SCRATCH_HOLDER_PID" 2>/dev/null || true

  test-agent-macos:
    name: Build & Test Agent (macOS)
    needs: changes
    # macOS coverage for the agent (the self-hosted `test` job builds it on
    # Linux only). This job builds and tests the full agent — exercising the
    # macOS-specific virtualization (HVF) / user-mode networking code — on a
    # macOS runner.
    #
    # The toolchain install + verify below are gating (a broken macOS toolchain
    # setup should fail this job). The actual Build/Test steps are best-effort
    # (continue-on-error at the step level), so their failure surfaces as a
    # visible warning but does not fail the job or block merges.
    #
    # Why best-effort: the macOS agent graph transitively pulls the Darwin-only
    # NIOTransportServices → NIOEmbedded, and that swift-nio code does not
    # compile under the pinned 6.3.2 toolchain on macOS ("inQueueKey is not
    # concurrency-safe because DispatchSpecificKey is not Sendable"). SwiftPM
    # builds NIOEmbedded for any agent target on macOS, so there is currently no
    # green agent build/test here. It compiles cleanly on Swift 6.4, which is
    # not yet published as a standalone swift.org toolchain. Linux never builds
    # NIOEmbedded, so its full agent build/test (added in #284) is unaffected.
    # Drop the step-level continue-on-error once the toolchain pin (or the
    # swift-nio version) moves past this.
    if: needs.changes.outputs.agent == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.firecracker == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU build dependencies
        # QEMUKit (via SwiftQEMU) links glib-2.0 and resolves it through
        # pkg-config; both are needed to compile the StratoAgent executable.
        run: brew install glib pkg-config

      # This cache is branch-scoped, so it lands once per active branch — the
      # same 0.51GB key was resident 7 times over (3.6GB) at one point. That is
      # fine against the public repo's 10GB budget, but it is the first thing to
      # drop if the budget ever gets tight again (this job is gated on
      # agent/shared/firecracker changes, so cold builds here are rare).
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            agent/.build
            shared/.build
          key: macos-agent-swift-${{ hashFiles('agent/Package.resolved', 'shared/Package.resolved') }}
          restore-keys: |
            macos-agent-swift-

      # Install the toolchain by dropping the swift.org release .pkg directly.
      # vapor/swiftly-action's macOS path runs a Linux-only (apt/dnf/yum)
      # dependency installer and aborts; and `swiftly install` itself currently
      # crashes (Abort trap: 6) on the macOS runner. A direct .pkg install
      # avoids both and pins the same toolchain the Linux jobs use. Selecting it
      # via TOOLCHAINS (rather than PATH) lets xcrun resolve the macOS SDK.
      - name: Install Swift 6.3.2 toolchain
        run: |
          set -euxo pipefail
          pkg="$RUNNER_TEMP/swift-6.3.2-osx.pkg"
          curl -fsSL "https://download.swift.org/swift-6.3.2-release/xcode/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-osx.pkg" -o "$pkg"
          sudo installer -pkg "$pkg" -target /
          toolchain="$(ls -d /Library/Developer/Toolchains/swift-6.3.2-RELEASE.xctoolchain 2>/dev/null || ls -dt /Library/Developer/Toolchains/*.xctoolchain | head -1)"
          echo "TOOLCHAINS=$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$toolchain/Info.plist")" >> "$GITHUB_ENV"

      - name: Verify Swift toolchain
        run: swift --version

      # Gating guard against Package.resolved drift on macOS. The manifest is
      # platform-agnostic (Linux-only products are gated with `.when(platforms:)`
      # rather than `#if os(Linux)`), so resolving on macOS must produce the exact
      # same pins as Linux. If this diff is non-empty, someone reintroduced host-
      # conditional dependency declarations and macOS would drop pins (e.g.
      # swift-ovn) from Package.resolved.
      - name: Check Package.resolved does not drift on macOS
        working-directory: agent
        run: |
          swift package resolve
          git diff --exit-code Package.resolved

      - name: Build Agent
        working-directory: agent
        continue-on-error: true
        run: swift build --build-tests

      - name: Test Agent
        working-directory: agent
        continue-on-error: true
        run: swift test --skip-build --parallel

  # Dockerfile changes were previously only exercised on main / at release
  # time, so image breakage surfaced post-merge. These jobs build (never
  # push) the affected image on hosted runners; they are rare because they
  # are gated on the Dockerfile paths themselves. `cache-to` is deliberately
  # omitted everywhere: PR-scoped buildkit caches are unreadable by sibling
  # PRs and would only thrash the 10GB repo cache quota. `cache-from` is only
  # set where main-build actually saves a cache — since it dropped the
  # control-plane/agent gha caches (kept only frontend-*), the two Swift
  # image checks run cold.
  docker-control-plane:
    name: Docker Build Check (Control Plane)
    needs: changes
    if: needs.changes.outputs.docker_cp == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    # No prebuilt artifacts on PRs, so the image compiles Swift from source.
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The Dockerfile unconditionally COPYs ./artifacts; with no prebuilt
      # binaries on PRs it must exist (empty), same as main-build's
      # "Prepare build context" step.
      - name: Prepare build context
        run: mkdir -p ./artifacts

      - name: Build Control Plane Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          push: false
          platforms: linux/amd64

  docker-agent:
    name: Docker Build Check (Agent)
    needs: changes
    if: needs.changes.outputs.docker_agent == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    # No prebuilt artifacts on PRs, so the image compiles Swift from source.
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The Dockerfile unconditionally COPYs ./artifacts; with no prebuilt
      # binaries on PRs it must exist (empty), same as main-build's
      # "Prepare build context" step.
      - name: Prepare build context
        run: mkdir -p ./artifacts

      - name: Build Agent Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: false
          platforms: linux/amd64

  docker-web:
    name: Docker Build Check (Frontend)
    needs: changes
    if: needs.changes.outputs.docker_web == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane/web
          file: ./control-plane/web/Dockerfile
          push: false
          platforms: linux/amd64
          # Anonymous read of the public GHCR cache main-build writes; needs no
          # registry login and works for fork PRs, which can't read gha caches.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-frontend:buildcache-x64
