name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read # dorny/paths-filter reads changed files via the PR API

# Cancel any in-progress run for the same PR when a new commit is pushed,
# so stale runs stop hogging the single self-hosted runner.
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the repo changed so we can skip heavy jobs on
  # e.g. docs-only PRs. Jobs are gated with `if:` (not workflow-level
  # `on.paths`) so a skipped job still reports as a passing check — this
  # keeps them safe to use as required status checks in branch protection.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      cp_backend: ${{ steps.filter.outputs.cp_backend }}
      agent: ${{ steps.filter.outputs.agent }}
      shared: ${{ steps.filter.outputs.shared }}
      firecracker: ${{ steps.filter.outputs.firecracker }}
      workflow: ${{ steps.filter.outputs.workflow }}
      code: ${{ steps.filter.outputs.code }}
      docker_cp: ${{ steps.filter.outputs.docker_cp }}
      docker_agent: ${{ steps.filter.outputs.docker_agent }}
      docker_web: ${{ steps.filter.outputs.docker_web }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # `every`: a changed file matches a filter only if it matches ALL of
          # that filter's patterns, which is what makes the `!` exclusions
          # actually take effect. (With the default `some`, a file matching any
          # single positive pattern matches the filter and negations are
          # ignored — so `!control-plane/web/**` and the docs exclusions below
          # would be no-ops.) OR across directories is therefore expressed in
          # each job's `if:` rather than inside a single filter.
          predicate-quantifier: "every"
          filters: |
            web:
              - 'control-plane/web/**'
            cp_backend:
              - 'control-plane/**'
              - '!control-plane/web/**'
            agent:
              - 'agent/**'
            shared:
              - 'shared/**'
            firecracker:
              - 'SwiftFirecracker/**'
            workflow:
              - '.github/workflows/build.yaml'
            docker_cp:
              - 'control-plane/Dockerfile'
            docker_agent:
              - 'agent/Dockerfile'
            docker_web:
              - 'control-plane/web/Dockerfile'
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!LICENSE'

  lint-and-build-frontend:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.workflow == 'true'
    # Lightweight Bun job — runs on GitHub-hosted runners to keep the
    # self-hosted runner free for the heavy Swift build+test job.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Run linting
        working-directory: control-plane/web
        run: bun run lint

      - name: Build frontend
        working-directory: control-plane/web
        run: bun run build

  test:
    name: Build and Test Swift Packages
    needs: changes
    if: needs.changes.outputs.cp_backend == 'true' || needs.changes.outputs.agent == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.firecracker == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: strato_test
          POSTGRES_USER: strato
          POSTGRES_PASSWORD: strato_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # Bind container port 5432 to an ephemeral host port (read back below
        # via the job.services context) rather than a fixed 5432:5432. On the
        # shared self-hosted runner a fixed mapping collides with anything else
        # already bound to 5432; a dynamic port avoids that.
        ports:
          - 5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build state lives in a persistent scratch dir on the self-hosted
      # runner instead of actions/cache: RUNNER_TOOL_CACHE survives both the
      # end of the job and checkout's `git clean -ffdx` (it is outside the
      # repo), so builds are incremental across runs with zero network cost.
      # The GitHub cache never helped here — PR-scoped saves are unreadable
      # by sibling PRs and nothing on main saved the key, so every run paid
      # a ~5 minute 1.4GB upload for a restore that always missed.
      - name: Prune build scratch dir if oversized
        run: |
          scratch="$RUNNER_TOOL_CACHE/strato-swift-build"
          if [ -d "$scratch" ]; then
            size_kb=$(du -sk "$scratch" | cut -f1)
            if [ "$size_kb" -gt $((25 * 1024 * 1024)) ]; then
              echo "Scratch dir is $((size_kb / 1024 / 1024))GB (>25GB); wiping for a cold rebuild"
              rm -rf "$scratch"
            fi
          fi

      - uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.3.2"

      - name: Build Shared Package
        working-directory: shared
        run: swift build --build-tests --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/shared"

      - name: Test Shared Package
        working-directory: shared
        run: swift test --skip-build --parallel --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/shared"

      - name: Build Control Plane
        working-directory: control-plane
        run: swift build --build-tests --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/control-plane"

      # Two legs, one build: fast engine-independent coverage on SQLite, then
      # the identical suite against the real engine production uses, validating
      # migrations and Postgres-specific SQL (issue #195). Kept as sequential
      # steps in one job rather than a matrix so only a single Postgres service
      # container starts — a matrix would fan out two containers that both try
      # to bind the port on this shared self-hosted runner.
      - name: Test Control Plane (SQLite)
        working-directory: control-plane
        env:
          STRATO_TEST_DATABASE: sqlite
        run: swift test --skip-build --parallel --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/control-plane"

      - name: Test Control Plane (Postgres)
        # Run even if the SQLite leg failed, so both engines always report.
        if: ${{ !cancelled() }}
        working-directory: control-plane
        env:
          STRATO_TEST_DATABASE: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: ${{ job.services.postgres.ports['5432'] }}
          DATABASE_NAME: strato_test
          DATABASE_USERNAME: strato
          DATABASE_PASSWORD: strato_password
        run: swift test --skip-build --parallel --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/control-plane"

      - name: Build Agent
        # Run even if a control-plane leg failed — agent coverage should
        # always report on PRs that touch it.
        id: build-agent
        if: ${{ !cancelled() }}
        working-directory: agent
        run: swift build --build-tests --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/agent"

      - name: Test Agent
        if: ${{ !cancelled() && steps.build-agent.outcome == 'success' }}
        working-directory: agent
        run: swift test --skip-build --parallel --scratch-path "$RUNNER_TOOL_CACHE/strato-swift-build/agent"

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Trivy filesystem scan is light and needs no warm cache — offload it.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # Dockerfile changes were previously only exercised on main / at release
  # time, so image breakage surfaced post-merge. These jobs build (never
  # push) the affected image on hosted runners; they are rare because they
  # are gated on the Dockerfile paths themselves. `cache-to` is deliberately
  # omitted everywhere: PR-scoped buildkit caches are unreadable by sibling
  # PRs and would only thrash the 10GB repo cache quota.
  docker-control-plane:
    name: Docker Build Check (Control Plane)
    needs: changes
    if: needs.changes.outputs.docker_cp == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    # No prebuilt artifacts on PRs, so the image compiles Swift from source.
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The Dockerfile unconditionally COPYs ./artifacts; with no prebuilt
      # binaries on PRs it must exist (empty), same as main-build's
      # "Prepare build context" step.
      - name: Prepare build context
        run: mkdir -p ./artifacts

      - name: Build Control Plane Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          push: false
          platforms: linux/amd64
          # Readable from PRs because main-build saves it from main's scope.
          cache-from: type=gha,key=control-plane-x64

  docker-agent:
    name: Docker Build Check (Agent)
    needs: changes
    if: needs.changes.outputs.docker_agent == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    # Compiles Swift from source; the agent's gha cache is only saved from
    # tag refs, which PRs cannot read, so this leg runs cold.
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Agent Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: false
          platforms: linux/amd64

  docker-web:
    name: Docker Build Check (Frontend)
    needs: changes
    if: needs.changes.outputs.docker_web == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./control-plane/web
          file: ./control-plane/web/Dockerfile
          push: false
          platforms: linux/amd64
