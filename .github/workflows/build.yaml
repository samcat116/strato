name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

# Cancel any in-progress run for the same PR when a new commit is pushed,
# so stale runs stop hogging the single self-hosted runner.
concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which parts of the repo changed so we can skip heavy jobs on
  # e.g. docs-only PRs. Jobs are gated with `if:` (not workflow-level
  # `on.paths`) so a skipped job still reports as a passing check — this
  # keeps them safe to use as required status checks in branch protection.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      swift: ${{ steps.filter.outputs.swift }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'control-plane/web/**'
              - '.github/workflows/build.yaml'
            swift:
              - 'control-plane/**'
              - '!control-plane/web/**'
              - 'agent/**'
              - 'shared/**'
              - '.github/workflows/build.yaml'
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!LICENSE'

  lint-and-build-frontend:
    name: Frontend Lint & Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    # Lightweight Bun job — runs on GitHub-hosted runners to keep the
    # self-hosted runner free for the heavy Swift build+test job.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Run linting
        working-directory: control-plane/web
        run: bun run lint

      - name: Build frontend
        working-directory: control-plane/web
        run: bun run build

  test:
    name: Build and Test Swift Packages
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: strato_test
          POSTGRES_USER: strato
          POSTGRES_PASSWORD: strato_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            control-plane/.build
            shared/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('control-plane/Package.resolved', 'shared/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - uses: vapor/swiftly-action@v0.2
        with:
          toolchain: "6.3.2"

      - name: Build Shared Package
        working-directory: shared
        run: swift build --build-tests

      - name: Build Control Plane
        working-directory: control-plane
        run: swift build --build-tests

      - name: Test Control Plane
        working-directory: control-plane
        run: swift test --skip-build --parallel

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    # Trivy filesystem scan is light and needs no warm cache — offload it.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
