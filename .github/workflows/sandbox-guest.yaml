name: Build Sandbox Guest Image

# Builds the sandbox guest base image (issue #419) — a Firecracker kernel plus
# the static init/guest-agent initramfs — for x86_64 and aarch64, and publishes
# them as release assets with checksums and a machine-readable manifest, the
# same way release.yaml publishes the agent tarballs. Runs on the same `v*` tag
# push as the main release (attaching to that release), and on demand via
# workflow_dispatch (artifacts only, no release upload).
on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "sandbox-guest/**"
      - ".github/workflows/sandbox-guest.yaml"
  workflow_dispatch:

concurrency:
  group: sandbox-guest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Fast gate on every PR touching the guest: lint + unit-test the init crate's
  # portable logic (config merge, vsock protocol) and type-check the Linux
  # syscall paths cross-compiled to musl. No kernel build here.
  test-init:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox-guest/init
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-musl
      - name: Format check
        run: cargo fmt --check
      - name: Unit tests
        run: cargo test --locked
      - name: Clippy (Linux target)
        run: cargo clippy --locked --target x86_64-unknown-linux-musl --all-targets -- -D warnings

  build:
    # Kernel builds are heavy; skip them on PRs (test-init gates those).
    if: github.event_name != 'pull_request'
    # Build each arch natively so no kernel cross-compilation is needed:
    # x86_64 on the standard hosted runner, aarch64 on the hosted arm runner.
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Kernel build toolchain + cpio/xz for the initramfs. Mirrors
      # sandbox-guest/Dockerfile.build; installed directly here since the job
      # already runs on a native-arch runner (no cross toolchain needed).
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libssl-dev libelf-dev \
            cpio xz-utils gzip curl ca-certificates

      - name: Install Rust (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && 'aarch64-unknown-linux-musl' || 'x86_64-unknown-linux-musl' }}

      - name: Build guest image (${{ matrix.arch }})
        run: |
          ./sandbox-guest/build.sh \
            --arch "${{ matrix.arch }}" \
            --out "$PWD/out" \
            --git-sha "${GITHUB_SHA}"

      - name: Package artifacts
        id: package
        run: |
          ARCH="${{ matrix.arch }}"
          ASSET="sandbox-guest-${ARCH}.tar.gz"
          # The tarball is exactly the on-disk guest image layout the agent
          # installs at sandbox_guest_image_path: kernel + initramfs + guest.json.
          tar czf "${ASSET}" -C out \
            "vmlinux-${ARCH}" "initramfs-${ARCH}.cpio.gz" guest.json
          sha256sum "${ASSET}" > "${ASSET}.sha256"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"
          # Surface the version (from guest.json) for the manifest job/log.
          echo "version=$(grep -m1 '\"version\"' out/guest.json | cut -d'"' -f4)" >> "$GITHUB_OUTPUT"

      # workflow_dispatch: keep the artifacts for inspection, no release.
      - name: Upload CI artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-guest-${{ matrix.arch }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256

      # Tag push: attach to the release release.yaml cut for this tag. Wait for
      # it to exist (the two workflows race on the same tag), then upload.
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="$GITHUB_REF_NAME"
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then break; fi
            echo "waiting for release $TAG to exist ($i/30)"; sleep 10
          done
          ASSET="${{ steps.package.outputs.asset }}"
          gh release upload "$TAG" "$ASSET" "$ASSET.sha256" --clobber

  # Machine-readable pointer to this release's guest images: version, git SHA,
  # and per-arch tarball URL/checksum/size. Mirrors publish-agent-manifest in
  # release.yaml. Installers (task install-sandbox-guest, deploy/agent/install.sh)
  # consume it to fetch the tarball for the host arch. Tag pushes only.
  publish-manifest:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Build and upload sandbox-guest-manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="$GITHUB_REF_NAME"

          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
            --jq '.assets[]
                  | select(.name | test("^sandbox-guest-[a-z0-9_]+\\.tar\\.gz$"))
                  | [.name, .browser_download_url, (.size | tostring)] | @tsv' \
            > assets.tsv
          [ -s assets.tsv ] || { echo "no sandbox-guest-<arch>.tar.gz assets on $TAG" >&2; exit 1; }

          mkdir sidecars
          gh release download "$TAG" --pattern 'sandbox-guest-*.tar.gz.sha256' --dir sidecars

          entries="[]"
          while IFS=$'\t' read -r name url size; do
            arch="${name#sandbox-guest-}"; arch="${arch%.tar.gz}"
            sha256="$(awk '{print $1}' "sidecars/${name}.sha256")"
            [ -n "$sha256" ] || { echo "missing checksum sidecar for $name" >&2; exit 1; }
            entries="$(jq --arg arch "$arch" --arg name "$name" --arg url "$url" \
                          --arg sha "$sha256" --argjson size "$size" \
              '. + [{arch: $arch, asset: $name, url: $url, sha256: $sha, size: $size}]' <<< "$entries")"
          done < assets.tsv

          jq -n --arg version "$TAG" --arg sha "$GITHUB_SHA" --argjson assets "$entries" \
            '{schemaVersion: 1, version: $version, gitSHA: $sha, assets: $assets}' \
            > sandbox-guest-manifest.json
          cat sandbox-guest-manifest.json
          gh release upload "$TAG" sandbox-guest-manifest.json --clobber
