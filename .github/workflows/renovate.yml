name: Renovate

on:
  schedule:
    # Nightly at 03:00 America/New_York (07:00 UTC EST / 08:00 UTC EDT).
    # GitHub cron is UTC-only, so this drifts an hour with daylight saving.
    - cron: '0 7 * * *'

  # Allow manual trigger, with a dry-run option for testing config changes.
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run mode (no PRs created)'
        type: choice
        default: 'disabled'
        options:
          - 'disabled'
          - 'extract'
          - 'lookup'
          - 'full'
      logLevel:
        description: 'Log level'
        type: choice
        default: 'info'
        options:
          - 'info'
          - 'debug'

  # Re-run when the config changes so mistakes surface immediately.
  push:
    branches:
      - main
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate.yml'

permissions:
  contents: read

# Never let two Renovate runs overlap on the same repo.
concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@v41
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun || 'disabled' }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
