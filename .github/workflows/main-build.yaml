name: Main Branch Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

# Rapid merges to main can stack builds on the runners, so keep just the
# latest run per ref.
concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swift-release:
    name: Build Swift Release Binaries
    # x64 runs on the ARC (actions-runner-controller) Swift runner scale set;
    # scale-set runners match on the installation name as their only label.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'swift-runners-strato' }}
    # The x64 leg runs directly on the runner pod — the scale set's runner
    # image bakes in the Swift 6.3.2 toolchain, so nothing pulls the multi-GB
    # Swift image through dind per job. The GitHub-hosted arm64 runner has no
    # Swift toolchain, so that leg still builds inside the official Swift
    # image (the string form of `container:`; an empty value means "no job
    # container"). vapor/swiftly-action remains unusable on the ARC pods
    # ($USER is unset).
    container: ${{ matrix.arch == 'arm64' && 'swift:6.3.2-noble' || '' }}
    # Backstop for a hung build: the default 360-minute timeout would pin an
    # ARC pool slot (x64) for six hours. Warm builds take ~12 minutes; a cold
    # arm64 release build is the slow case.
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - arch: x64
          - arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # libjemalloc-dev: the control-plane binary links -ljemalloc.
      # unzip: setup-bun needs it to extract its download.
      # arm64 runs as root inside the Swift container (which has no sudo
      # binary); x64 runs as the runner image's non-root user (passwordless
      # sudo) — hence the guard.
      - name: Install build dependencies
        run: |
          SUDO=""
          command -v sudo >/dev/null && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y libjemalloc-dev unzip

      # Build-cache strategy differs by arch:
      #
      # x64 runs on the swift-runners-strato ARC scale set, whose
      # RUNNER_TOOL_CACHE is a persistent volume — so the release build tree
      # lives there via --scratch-path and stays warm across runs, off the 10GB
      # actions/cache budget entirely. This mirrors build.yaml's Swift test jobs,
      # which abandoned actions/cache because "every run paid a ~5 minute 1.4GB
      # upload for a restore that always missed": the repo's ~11GB of caches
      # (dominated by Docker type=gha blobs) exceeds GitHub's 10GB limit and
      # evicts the 1.6GB release .build between runs, so this stage recompiled
      # cold every single time.
      #
      # arm64 runs on an ephemeral GitHub-hosted runner with no persistent
      # volume, so it stays on actions/cache + the default .build path (which now
      # survives because the Docker cache-to churn below is trimmed).
      - name: Configure release build cache
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            root="$RUNNER_TOOL_CACHE/strato-swift-build-release"
            echo "CP_SCRATCH_ARG=$root/control-plane" >> "$GITHUB_ENV"
            echo "AGENT_SCRATCH_ARG=$root/agent" >> "$GITHUB_ENV"
          else
            echo "CP_SCRATCH_ARG=" >> "$GITHUB_ENV"
            echo "AGENT_SCRATCH_ARG=" >> "$GITHUB_ENV"
          fi

      # The persistent x64 scratch tree never shrinks on its own; wipe it if it
      # balloons so a runaway build dir can't fill the shared volume. No-op on
      # arm64 (the dirs don't exist there).
      - name: Prune release build scratch if oversized
        if: matrix.arch == 'x64'
        run: |
          for scratch in \
            "$RUNNER_TOOL_CACHE/strato-swift-build-release/control-plane" \
            "$RUNNER_TOOL_CACHE/strato-swift-build-release/agent"; do
            if [ -d "$scratch" ]; then
              size_kb=$(du -sk "$scratch" | cut -f1)
              if [ "$size_kb" -gt $((12 * 1024 * 1024)) ]; then
                echo "$scratch is $((size_kb / 1024 / 1024))GB (>12GB); wiping for a cold rebuild"
                rm -rf "$scratch"
              fi
            fi
          done

      # Cache key salt (`v2`): #386 moved the x64 leg out of the swift job
      # container, poisoning the pre-#386 .build ModuleCache; the salt bump
      # sidestepped it. x64 no longer uses this step (see above); arm64 does.
      - name: Cache Swift packages
        if: matrix.arch == 'arm64'
        uses: actions/cache@v4
        with:
          path: |
            control-plane/.build
            agent/.build
            shared/.build
          key: ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-${{ hashFiles('control-plane/Package.resolved', 'agent/Package.resolved', 'shared/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Build and deploy frontend
        working-directory: control-plane/web
        run: bun run build:deploy

      - name: Build Control Plane Release Binary
        working-directory: control-plane
        # On x64 the release build tree lives on the persistent scratch volume;
        # on arm64 CP_SCRATCH_ARG is empty (default .build). POSIX positional
        # params ("set --" / "$@") keep the empty case a no-op and stay valid in
        # the arm64 job container's /bin/sh (dash), which has no bash arrays.
        run: |
          set --
          [ -n "$CP_SCRATCH_ARG" ] && set -- --scratch-path "$CP_SCRATCH_ARG"
          swift build -c release --product App -Xlinker -ljemalloc "$@"
          BIN="$(swift build -c release --show-bin-path "$@")"
          # Create artifact directory structure
          mkdir -p ../artifacts/control-plane/bin
          mkdir -p ../artifacts/control-plane/resources
          # Copy binary
          cp "$BIN/App" ../artifacts/control-plane/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/control-plane/resources/ \; || true
          # Copy Public and Resources directories
          [ -d Public ] && cp -R Public ../artifacts/control-plane/ || true
          [ -d Resources ] && cp -R Resources ../artifacts/control-plane/ || true

      - name: Build Agent Release Binary
        working-directory: agent
        # On x64 the release build tree lives on the persistent scratch volume;
        # on arm64 AGENT_SCRATCH_ARG is empty (default .build). POSIX positional
        # params ("set --" / "$@") keep the empty case a no-op and stay valid in
        # the arm64 job container's /bin/sh (dash), which has no bash arrays.
        run: |
          set --
          [ -n "$AGENT_SCRATCH_ARG" ] && set -- --scratch-path "$AGENT_SCRATCH_ARG"
          swift build -c release --product StratoAgent -Xlinker -ljemalloc "$@"
          BIN="$(swift build -c release --show-bin-path "$@")"
          mkdir -p ../artifacts/agent/bin
          mkdir -p ../artifacts/agent/resources
          cp "$BIN/StratoAgent" ../artifacts/agent/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/agent/resources/ \; || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
          retention-days: 1

  # Phase 1 — build every image on its native runner and push each arch by
  # DIGEST ONLY (no tag). Publishing arch-tagged manifests happens in phase 2,
  # so nothing here is consumable yet: an untagged digest is invisible to
  # `:main` pullers until publish-manifests stitches the per-arch digests into a
  # multi-arch tag. Each arch builds natively (arm64 on ubuntu-24.04-arm, amd64
  # on ubuntu-latest) rather than under QEMU — the Dockerfiles copy a single
  # prebuilt binary from ./artifacts and aren't TARGETARCH-aware, so one
  # emulated multi-platform build can't feed a different binary per platform.
  #
  # Phase 1 is two jobs: the Swift images below wait on the release binaries,
  # while the frontend (which consumes no Swift artifacts) builds in its own
  # job immediately — overlapping it with the ~12-minute Swift build instead of
  # queueing behind it. The publish barrier still needs both.
  #
  # `provenance: false` suppresses buildx's default SBOM/provenance attestation,
  # which was pushed as an `unknown/unknown` manifest and showed up as a bogus
  # architecture on the GHCR package page.
  build-image-digests:
    name: Build Digest (${{ matrix.image }}, ${{ matrix.arch }})
    needs: [build-swift-release]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: control-plane, arch: x64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: control-plane, arch: arm64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: agent, arch: x64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
          - { image: agent, arch: arm64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # No continue-on-error here: with PREBUILT_ARTIFACTS set, the Dockerfile
      # hard-fails on missing artifacts anyway ("no artifacts found"), so
      # tolerating a failed download only moves the error somewhere confusing.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "version=main-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      # No gha cache for these images: they consume prebuilt binaries (nothing
      # compiles in-image), so their layers are cheap to rebuild — yet their
      # mode=max caches were ~5GB of the repo's ~11GB cache, the churn that
      # evicted the Swift release .build every run. The frontend job below is
      # the only image that still caches.
      #
      # Dynamic OCI labels are applied here (the static, per-image descriptive
      # labels live in each Dockerfile); build-push-action merges both onto the
      # pushed manifest.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.arch == 'x64' && 'linux/amd64' || 'linux/arm64' }}
          outputs: type=image,name=${{ steps.meta.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          # Blank lines are ignored, so each arg is gated independently. The
          # control-plane bakes the build identity (STRATO_VERSION on
          # /health/*); the agent has none. Baked once here in the per-arch
          # digest build — the publish phase only stitches manifests by digest
          # and never rebuilds, so the identity must be set now, not at
          # publish time.
          build-args: |
            PREBUILT_ARTIFACTS=${{ matrix.prebuilt }}
            ${{ matrix.image != 'agent' && 'STRATO_VERSION=main' || '' }}
            ${{ matrix.image != 'agent' && format('STRATO_GIT_SHA={0}', github.sha) || '' }}

      # Hand the digest to the publish job via an artifact. The filename is the
      # digest hex (the `sha256:` prefix is stripped — colons are fragile in
      # artifact paths); contents are irrelevant.
      - name: Export digest
        run: |
          mkdir -p /tmp/digest
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digest/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digest/*
          retention-days: 1
          if-no-files-found: error

  # Frontend digests — no dependency on the Swift binaries (the image compiles
  # from source with bun inside its Dockerfile), so this starts immediately
  # instead of idling behind build-swift-release. gha layer caching is kept
  # here and only here: this is the one image where a warm cache skips real
  # compilation.
  build-frontend-digest:
    name: Build Digest (frontend, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
          - arch: arm64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY}-frontend" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "version=main-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      # The frontend bakes the build identity into the client bundle (the
      # sidebar version label) — same rationale as the control-plane above.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: control-plane/web
          file: ./control-plane/web/Dockerfile
          platforms: ${{ matrix.arch == 'x64' && 'linux/amd64' || 'linux/arm64' }}
          outputs: type=image,name=${{ steps.meta.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,key=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,key=frontend-${{ matrix.arch }}
          build-args: |
            STRATO_VERSION=main
            STRATO_GIT_SHA=${{ github.sha }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digest
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digest/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-frontend-${{ matrix.arch }}
          path: /tmp/digest/*
          retention-days: 1
          if-no-files-found: error

  # Phase 2 — publish barrier. Needing both phase-1 jobs succeeds only if
  # EVERY leg (all images, both arches) passed, so we never publish a tag for a
  # commit whose full image set wasn't built. The multi-arch tags are created
  # here and only here, so the phase-1 digests stay invisible until this runs.
  # Tag creation runs as ordered steps (control-plane → agent → frontend): a
  # failed step stops the job before the next, and the frontend — which shares
  # STRATO_VERSION with the control-plane in the compose deployment — is
  # published last, so it only appears once both backend manifests did. Argo CD
  # image-updater tracks `main-<sha>` via a `^main-[0-9a-f]{7,40}$` regexp.
  publish-manifests:
    name: Publish Multi-Arch Manifests
    needs: [build-image-digests, build-frontend-digest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*

      # `imagetools create` builds a fresh manifest list from the per-arch
      # digests and pushes it under both tags. control-plane first, frontend
      # last (see the ordering rationale above).
      - name: Publish control-plane manifest
        run: |
          REF="ghcr.io/${GITHUB_REPOSITORY}-control-plane"
          SHA="${GITHUB_SHA::12}"
          DIGESTS=$(for f in /tmp/digests/digest-control-plane-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create -t "${REF}:main" -t "${REF}:main-${SHA}" $DIGESTS
          docker buildx imagetools inspect "${REF}:main-${SHA}"

      - name: Publish agent manifest
        run: |
          REF="ghcr.io/${GITHUB_REPOSITORY}-agent"
          SHA="${GITHUB_SHA::12}"
          DIGESTS=$(for f in /tmp/digests/digest-agent-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create -t "${REF}:main" -t "${REF}:main-${SHA}" $DIGESTS
          docker buildx imagetools inspect "${REF}:main-${SHA}"

      - name: Publish frontend manifest
        run: |
          REF="ghcr.io/${GITHUB_REPOSITORY}-frontend"
          SHA="${GITHUB_SHA::12}"
          DIGESTS=$(for f in /tmp/digests/digest-frontend-*/*; do printf '%s@sha256:%s ' "$REF" "$(basename "$f")"; done)
          docker buildx imagetools create -t "${REF}:main" -t "${REF}:main-${SHA}" $DIGESTS
          docker buildx imagetools inspect "${REF}:main-${SHA}"
