name: Main Branch Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

# Rapid merges to main can stack builds on the runners (the x64 Docker job
# still runs on the single static self-hosted runner). This build only
# validates (Docker push: false), so keep just the latest.
concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swift-release:
    name: Build Swift Release Binaries
    # x64 runs on the ARC (actions-runner-controller) Swift runner scale set;
    # scale-set runners match on the installation name as their only label.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'swift-runners-strato' }}
    # The x64 leg runs directly on the runner pod — the scale set's runner
    # image bakes in the Swift 6.3.2 toolchain, so nothing pulls the multi-GB
    # Swift image through dind per job. The GitHub-hosted arm64 runner has no
    # Swift toolchain, so that leg still builds inside the official Swift
    # image (the string form of `container:`; an empty value means "no job
    # container"). vapor/swiftly-action remains unusable on the ARC pods
    # ($USER is unset).
    container: ${{ matrix.arch == 'arm64' && 'swift:6.3.2-noble' || '' }}
    strategy:
      matrix:
        include:
          - arch: x64
          - arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # libjemalloc-dev: the control-plane binary links -ljemalloc.
      # unzip: setup-bun needs it to extract its download.
      # arm64 runs as root inside the Swift container (which has no sudo
      # binary); x64 runs as the runner image's non-root user (passwordless
      # sudo) — hence the guard.
      - name: Install build dependencies
        run: |
          SUDO=""
          command -v sudo >/dev/null && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y libjemalloc-dev unzip

      # Cache key salt (`v2`): #386 moved the x64 leg out of the swift job
      # container (checkout at /__w/strato/strato) onto the runner image
      # (checkout at /home/runner/_work/strato/strato). Clang bakes absolute
      # paths into the ModuleCache .pcm files it caches under .build, so the
      # pre-#386 container-era cache is rejected on the new path with
      # "missing required module 'SwiftShims'". Bumping the salt stops us
      # restoring that poisoned cache; the cold rebuild saves a consistent one.
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            control-plane/.build
            agent/.build
            shared/.build
          key: ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-${{ hashFiles('control-plane/Package.resolved', 'agent/Package.resolved', 'shared/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Build and deploy frontend
        working-directory: control-plane/web
        run: bun run build:deploy

      - name: Build Control Plane Release Binary
        working-directory: control-plane
        run: |
          swift build -c release --product App -Xlinker -ljemalloc
          # Create artifact directory structure
          mkdir -p ../artifacts/control-plane/bin
          mkdir -p ../artifacts/control-plane/resources
          # Copy binary
          cp "$(swift build -c release --show-bin-path)/App" ../artifacts/control-plane/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$(swift build -c release --show-bin-path)/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/control-plane/resources/ \; || true
          # Copy Public and Resources directories
          [ -d Public ] && cp -R Public ../artifacts/control-plane/ || true
          [ -d Resources ] && cp -R Resources ../artifacts/control-plane/ || true

      - name: Build Agent Release Binary
        working-directory: agent
        run: |
          swift build -c release --product StratoAgent -Xlinker -ljemalloc
          mkdir -p ../artifacts/agent/bin
          mkdir -p ../artifacts/agent/resources
          cp "$(swift build -c release --show-bin-path)/StratoAgent" ../artifacts/agent/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$(swift build -c release --show-bin-path)/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/agent/resources/ \; || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
          retention-days: 1

  build:
    name: Build Docker Images
    needs: [build-swift-release]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'self-hosted' }}
    strategy:
      matrix:
        include:
          - arch: x64
          - arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
        continue-on-error: true

      - name: Prepare build context
        run: |
          # Create empty artifacts directory if it doesn't exist
          mkdir -p ./artifacts
          if [ -d "artifacts/control-plane" ]; then
            echo "Artifacts found, ready for Docker build"
          else
            echo "No artifacts found, will build from source"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only the amd64 leg publishes: the hosted DOKS test cluster (dev.stratocloud.app)
      # runs amd64 nodes, so arm64 stays validate-only. Images go to GHCR tagged both a
      # moving `main` (humans) and an immutable `main-<sha>` (Argo CD image-updater tracks
      # this via a `^main-[0-9a-f]{7,40}$` allow-tags regexp).
      - name: Log in to GHCR
        if: matrix.arch == 'x64'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: matrix.arch == 'x64'
        id: tags
        run: |
          SHA="${GITHUB_SHA::12}"
          REPO="ghcr.io/${GITHUB_REPOSITORY}"
          {
            echo "cp=${REPO}-control-plane:main,${REPO}-control-plane:main-${SHA}"
            echo "fe=${REPO}-frontend:main,${REPO}-frontend:main-${SHA}"
            echo "agent=${REPO}-agent:main,${REPO}-agent:main-${SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Control Plane Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          push: ${{ matrix.arch == 'x64' }}
          load: ${{ matrix.arch != 'x64' }}
          platforms: ${{ matrix.arch == 'x64' && 'linux/amd64' || 'linux/arm64' }}
          tags: ${{ matrix.arch == 'x64' && steps.tags.outputs.cp || 'strato-control-plane:latest' }}
          cache-from: type=gha,key=control-plane-${{ matrix.arch }}
          cache-to: type=gha,mode=max,key=control-plane-${{ matrix.arch }}
          build-args: |
            PREBUILT_ARTIFACTS=artifacts/control-plane

      # Hypervisor hosts pull this image directly (docs/deployment/agents.md),
      # so it publishes alongside the control plane with the same tagging.
      - name: Build Agent Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: ${{ matrix.arch == 'x64' }}
          load: ${{ matrix.arch != 'x64' }}
          platforms: ${{ matrix.arch == 'x64' && 'linux/amd64' || 'linux/arm64' }}
          tags: ${{ matrix.arch == 'x64' && steps.tags.outputs.agent || 'strato-agent:latest' }}
          cache-from: type=gha,key=agent-${{ matrix.arch }}
          cache-to: type=gha,mode=max,key=agent-${{ matrix.arch }}
          build-args: |
            PREBUILT_ARTIFACTS=artifacts/agent

      # Frontend builds from source inside its Dockerfile (bun), so it needs no
      # prebuilt artifacts. Publish amd64 only, alongside the control plane.
      - name: Build and push Frontend Docker Image
        if: matrix.arch == 'x64'
        uses: docker/build-push-action@v5
        with:
          context: control-plane/web
          file: ./control-plane/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.fe }}
          cache-from: type=gha,key=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,key=frontend-${{ matrix.arch }}
