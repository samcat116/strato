name: Main Branch Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

# Rapid merges to main can stack builds on the runners, so keep just the
# latest run per ref.
concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swift-release:
    name: Build Swift Release Binaries
    # x64 runs on the ARC (actions-runner-controller) Swift runner scale set;
    # scale-set runners match on the installation name as their only label.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'swift-runners-strato' }}
    # The x64 leg runs directly on the runner pod — the scale set's runner
    # image bakes in the Swift 6.3.2 toolchain, so nothing pulls the multi-GB
    # Swift image through dind per job. The GitHub-hosted arm64 runner has no
    # Swift toolchain, so that leg still builds inside the official Swift
    # image (the string form of `container:`; an empty value means "no job
    # container"). vapor/swiftly-action remains unusable on the ARC pods
    # ($USER is unset).
    container: ${{ matrix.arch == 'arm64' && 'swift:6.3.2-noble' || '' }}
    strategy:
      matrix:
        include:
          - arch: x64
          - arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # libjemalloc-dev: the control-plane binary links -ljemalloc.
      # unzip: setup-bun needs it to extract its download.
      # arm64 runs as root inside the Swift container (which has no sudo
      # binary); x64 runs as the runner image's non-root user (passwordless
      # sudo) — hence the guard.
      - name: Install build dependencies
        run: |
          SUDO=""
          command -v sudo >/dev/null && SUDO=sudo
          $SUDO apt-get update
          $SUDO apt-get install -y libjemalloc-dev unzip

      # Build-cache strategy differs by arch:
      #
      # x64 runs on the swift-runners-strato ARC scale set, whose
      # RUNNER_TOOL_CACHE is a persistent volume — so the release build tree
      # lives there via --scratch-path and stays warm across runs, off the 10GB
      # actions/cache budget entirely. This mirrors build.yaml's Swift test jobs,
      # which abandoned actions/cache because "every run paid a ~5 minute 1.4GB
      # upload for a restore that always missed": the repo's ~11GB of caches
      # (dominated by Docker type=gha blobs) exceeds GitHub's 10GB limit and
      # evicts the 1.6GB release .build between runs, so this stage recompiled
      # cold every single time.
      #
      # arm64 runs on an ephemeral GitHub-hosted runner with no persistent
      # volume, so it stays on actions/cache + the default .build path (which now
      # survives because the Docker cache-to churn below is trimmed).
      - name: Configure release build cache
        run: |
          if [ "${{ matrix.arch }}" = "x64" ]; then
            root="$RUNNER_TOOL_CACHE/strato-swift-build-release"
            echo "CP_SCRATCH_ARG=$root/control-plane" >> "$GITHUB_ENV"
            echo "AGENT_SCRATCH_ARG=$root/agent" >> "$GITHUB_ENV"
          else
            echo "CP_SCRATCH_ARG=" >> "$GITHUB_ENV"
            echo "AGENT_SCRATCH_ARG=" >> "$GITHUB_ENV"
          fi

      # The persistent x64 scratch tree never shrinks on its own; wipe it if it
      # balloons so a runaway build dir can't fill the shared volume. No-op on
      # arm64 (the dirs don't exist there).
      - name: Prune release build scratch if oversized
        if: matrix.arch == 'x64'
        run: |
          for scratch in \
            "$RUNNER_TOOL_CACHE/strato-swift-build-release/control-plane" \
            "$RUNNER_TOOL_CACHE/strato-swift-build-release/agent"; do
            if [ -d "$scratch" ]; then
              size_kb=$(du -sk "$scratch" | cut -f1)
              if [ "$size_kb" -gt $((12 * 1024 * 1024)) ]; then
                echo "$scratch is $((size_kb / 1024 / 1024))GB (>12GB); wiping for a cold rebuild"
                rm -rf "$scratch"
              fi
            fi
          done

      # Cache key salt (`v2`): #386 moved the x64 leg out of the swift job
      # container, poisoning the pre-#386 .build ModuleCache; the salt bump
      # sidestepped it. x64 no longer uses this step (see above); arm64 does.
      - name: Cache Swift packages
        if: matrix.arch == 'arm64'
        uses: actions/cache@v4
        with:
          path: |
            control-plane/.build
            agent/.build
            shared/.build
          key: ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-${{ hashFiles('control-plane/Package.resolved', 'agent/Package.resolved', 'shared/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-swift-release-v2-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: control-plane/web
        run: bun install --frozen-lockfile

      - name: Build and deploy frontend
        working-directory: control-plane/web
        run: bun run build:deploy

      - name: Build Control Plane Release Binary
        working-directory: control-plane
        # On x64 the release build tree lives on the persistent scratch volume;
        # on arm64 CP_SCRATCH_ARG is empty (default .build). POSIX positional
        # params ("set --" / "$@") keep the empty case a no-op and stay valid in
        # the arm64 job container's /bin/sh (dash), which has no bash arrays.
        run: |
          set --
          [ -n "$CP_SCRATCH_ARG" ] && set -- --scratch-path "$CP_SCRATCH_ARG"
          swift build -c release --product App -Xlinker -ljemalloc "$@"
          BIN="$(swift build -c release --show-bin-path "$@")"
          # Create artifact directory structure
          mkdir -p ../artifacts/control-plane/bin
          mkdir -p ../artifacts/control-plane/resources
          # Copy binary
          cp "$BIN/App" ../artifacts/control-plane/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/control-plane/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/control-plane/resources/ \; || true
          # Copy Public and Resources directories
          [ -d Public ] && cp -R Public ../artifacts/control-plane/ || true
          [ -d Resources ] && cp -R Resources ../artifacts/control-plane/ || true

      - name: Build Agent Release Binary
        working-directory: agent
        # On x64 the release build tree lives on the persistent scratch volume;
        # on arm64 AGENT_SCRATCH_ARG is empty (default .build). POSIX positional
        # params ("set --" / "$@") keep the empty case a no-op and stay valid in
        # the arm64 job container's /bin/sh (dash), which has no bash arrays.
        run: |
          set --
          [ -n "$AGENT_SCRATCH_ARG" ] && set -- --scratch-path "$AGENT_SCRATCH_ARG"
          swift build -c release --product StratoAgent -Xlinker -ljemalloc "$@"
          BIN="$(swift build -c release --show-bin-path "$@")"
          mkdir -p ../artifacts/agent/bin
          mkdir -p ../artifacts/agent/resources
          cp "$BIN/StratoAgent" ../artifacts/agent/bin/
          # Copy swift-backtrace (try multiple possible locations)
          if [ -f "/usr/lib/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/lib/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          elif [ -f "/usr/libexec/swift/linux/swift-backtrace-static" ]; then
            cp "/usr/libexec/swift/linux/swift-backtrace-static" ../artifacts/agent/bin/
          else
            echo "Warning: swift-backtrace-static not found, skipping"
          fi
          # Copy resources
          find -L "$BIN/" -regex '.*\.resources$' -exec cp -Ra {} ../artifacts/agent/resources/ \; || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
          retention-days: 1

  # Phase 1 — build every image on every arch in parallel, but DO NOT publish.
  # This replaced one job that built all three images serially on the single
  # static self-hosted runner (~28 min of serial Docker work on the critical
  # path). x64 legs export a mode=max gha cache (also read by build.yaml's PR
  # Docker checks and by the publish phase below); arm64 legs are validate-only
  # (build + load) since the DOKS test cluster (dev.stratocloud.app) is amd64.
  build-images:
    name: Build Image (${{ matrix.image }}, ${{ matrix.arch }})
    needs: [build-swift-release]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: control-plane, arch: x64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: control-plane, arch: arm64, context: ., file: ./control-plane/Dockerfile, prebuilt: artifacts/control-plane }
          - { image: agent, arch: x64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
          - { image: agent, arch: arm64, context: ., file: ./agent/Dockerfile, prebuilt: artifacts/agent }
          - { image: frontend, arch: x64, context: control-plane/web, file: ./control-plane/web/Dockerfile, prebuilt: "" }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Only the Swift images consume prebuilt binaries; the frontend builds
      # from source (bun) inside its Dockerfile.
      - name: Download build artifacts
        if: matrix.prebuilt != ''
        uses: actions/download-artifact@v4
        with:
          name: swift-binaries-${{ matrix.arch }}
          path: artifacts/
        continue-on-error: true

      - name: Prepare build context
        run: mkdir -p ./artifacts

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker gha caching is kept ONLY for the frontend, which compiles from
      # source (bun) and genuinely benefits. The control-plane and agent images
      # consume prebuilt binaries (nothing compiles in-image), so their layers
      # are cheap to rebuild — yet their mode=max caches were ~5GB of the repo's
      # ~11GB cache, the churn that evicted the Swift release .build every run.
      # Dropping them frees the budget so the caches that matter survive.
      - name: Build Image (validate, no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: ${{ matrix.arch == 'arm64' }}
          platforms: ${{ matrix.arch == 'x64' && 'linux/amd64' || 'linux/arm64' }}
          tags: strato-${{ matrix.image }}:ci
          cache-from: ${{ matrix.image == 'frontend' && 'type=gha,key=frontend-x64' || '' }}
          cache-to: ${{ matrix.image == 'frontend' && 'type=gha,mode=max,key=frontend-x64' || '' }}
          # Blank lines are ignored, so each arg is gated independently. The
          # control-plane and frontend bake the build identity (STRATO_VERSION on
          # /health/*, and the sidebar version label respectively); the agent has
          # none. Keeping these identical to the publish step keeps the gha cache
          # warm for the frontend.
          build-args: |
            ${{ matrix.prebuilt != '' && format('PREBUILT_ARTIFACTS={0}', matrix.prebuilt) || '' }}
            ${{ matrix.image != 'agent' && 'STRATO_VERSION=main' || '' }}
            ${{ matrix.image != 'agent' && format('STRATO_GIT_SHA={0}', github.sha) || '' }}

  # Phase 2 — publish barrier. `needs: [build-images]` succeeds only if EVERY
  # build-images leg (all images, both arches) passed, so we never start pushing
  # for a commit whose full image set wasn't built. Registry pushes of three
  # separate images can't be truly atomic, so the pushes run as ordered steps in
  # one job (not a parallel matrix): a failed/cancelled push fails the job before
  # the next step, and the frontend — which shares STRATO_VERSION with the
  # control-plane in the compose deployment — is pushed last, so it only
  # publishes after both backend images pushed. This matches the guarantee of
  # the prior serial x64 job. Each step rebuilds amd64 from the phase-1 gha cache
  # (a cache hit — it just re-exports and pushes). Argo CD image-updater tracks
  # `main-<sha>` via a `^main-[0-9a-f]{7,40}$` allow-tags regexp.
  publish-images:
    name: Publish Images
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # The prebuilt COPY layer keys on the artifact bytes, so the publish job
      # must supply the same x64 artifacts as phase 1 for the cache to hit.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: swift-binaries-x64
          path: artifacts/
        continue-on-error: true

      - name: Prepare build context
        run: mkdir -p ./artifacts

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA="${GITHUB_SHA::12}"
          REPO="ghcr.io/${GITHUB_REPOSITORY}"
          {
            echo "cp=${REPO}-control-plane:main,${REPO}-control-plane:main-${SHA}"
            echo "agent=${REPO}-agent:main,${REPO}-agent:main-${SHA}"
            echo "fe=${REPO}-frontend:main,${REPO}-frontend:main-${SHA}"
          } >> "$GITHUB_OUTPUT"

      # Ordered pushes: control-plane → agent → frontend. A failed step stops
      # the job, so frontend never publishes unless both backend images did.
      # The prebuilt Swift images no longer keep a gha cache (see build-images),
      # so these rebuild the cheap prebuilt layers (apt + copy binary) directly.
      - name: Push Control Plane Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./control-plane/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.cp }}
          build-args: |
            PREBUILT_ARTIFACTS=artifacts/control-plane
            STRATO_VERSION=main
            STRATO_GIT_SHA=${{ github.sha }}

      - name: Push Agent Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.agent }}
          build-args: |
            PREBUILT_ARTIFACTS=artifacts/agent

      - name: Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: control-plane/web
          file: ./control-plane/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.fe }}
          cache-from: type=gha,key=frontend-x64
          build-args: |
            STRATO_VERSION=main
            STRATO_GIT_SHA=${{ github.sha }}
