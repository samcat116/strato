components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        An API key minted via `POST /api/api-keys`, sent as
        `Authorization: Bearer <key>`.
    cookieAuth:
      type: apiKey
      in: cookie
      name: vapor-session
      description: The session cookie set after a WebAuthn/passkey login.

  parameters:
    VMID:
      name: vmID
      in: path
      required: true
      description: The virtual machine's id.
      schema:
        type: string
        format: uuid
    SandboxID:
      name: sandboxID
      in: path
      required: true
      description: The sandbox's id.
      schema:
        type: string
        format: uuid
    SandboxSnapshotID:
      name: snapshotID
      in: path
      required: true
      description: The sandbox snapshot's id.
      schema:
        type: string
        format: uuid
    OperationID:
      name: operationID
      in: path
      required: true
      description: The operation's id.
      schema:
        type: string
        format: uuid
    ProjectID:
      name: projectID
      in: path
      required: true
      description: The project's id.
      schema:
        type: string
        format: uuid
    ImageID:
      name: imageID
      in: path
      required: true
      description: The image's id.
      schema:
        type: string
        format: uuid
    VolumeID:
      name: volumeId
      in: path
      required: true
      description: The volume's id.
      schema:
        type: string
        format: uuid
    VolumeSnapshotID:
      name: snapshotId
      in: path
      required: true
      description: The volume snapshot's id.
      schema:
        type: string
        format: uuid
    NetworkID:
      name: networkId
      in: path
      required: true
      description: The network's id.
      schema:
        type: string
        format: uuid
    PoolID:
      name: poolId
      in: path
      required: true
      description: The floating IP pool's id.
      schema:
        type: string
        format: uuid
    FloatingIPID:
      name: floatingIpId
      in: path
      required: true
      description: The floating IP's id.
      schema:
        type: string
        format: uuid
    OrganizationIdQuery:
      name: organization_id
      in: query
      required: false
      description: Scope results to one organization.
      schema:
        type: string
        format: uuid
    ProjectIdQuery:
      name: project_id
      in: query
      required: false
      description: Scope results to one project.
      schema:
        type: string
        format: uuid
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1–100).
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    NoContent:
      description: Success with no response body.
    BadRequest:
      description: The request was malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The caller is authenticated but not authorized.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The resource does not exist or is not visible.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The request conflicts with current state (e.g. a pending operation).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: The uploaded body exceeded the size limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AcceptedOperation:
      description: The mutation was accepted; poll the returned operation to completion.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ResourceOperation"

  schemas:
    Error:
      type: object
      description: The standard error envelope.
      required: [error, reason]
      properties:
        error:
          type: boolean
          description: Always true on an error response.
        reason:
          type: string
          description: A human-readable explanation.

    HealthStatus:
      type: object
      description: A health/readiness/liveness report.
      required: [status]
      properties:
        status:
          type: string
      additionalProperties: true

    ResourceOperation:
      type: object
      description: >-
        A durable record of one asynchronous resource lifecycle mutation. Poll
        it until `status` is terminal.
      required: [vmId, resourceKind, resourceId, kind, status]
      properties:
        id:
          type: string
          format: uuid
        vmId:
          type: string
          format: uuid
          description: >-
            Legacy field equal to `resourceId`; retained for existing clients.
            New clients should read `resourceKind`/`resourceId`.
        resourceKind:
          $ref: "#/components/schemas/OperationResourceKind"
        resourceId:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/OperationKind"
        status:
          $ref: "#/components/schemas/OperationStatus"
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    OperationResourceKind:
      type: string
      description: Which kind of resource an operation acts on.
      enum: [virtual_machine, sandbox]
    OperationKind:
      type: string
      description: The lifecycle mutation an operation performs.
      enum:
        - create
        - boot
        - shutdown
        - reboot
        - pause
        - resume
        - delete
        - snapshot
        - snapshot_delete
        - restore
    OperationStatus:
      type: string
      description: The state of an operation. `pending` is the only non-terminal value.
      enum: [pending, succeeded, failed]

    HypervisorType:
      type: string
      enum: [qemu, firecracker]
    CPUArchitecture:
      type: string
      enum: [x86_64, arm64]

