        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/SSFStreamID"
    get:
      operationId: getSSFStream
      summary: Get a Shared Signals stream
      tags: [Shared Signals]
      responses:
        "200":
          description: The stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSFStream"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateSSFStream
      summary: Update a Shared Signals stream
      description: >-
        Requires organization admin. Omitted fields are left unchanged. The
        transmitter URL and delivery method are immutable.
      tags: [Shared Signals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSSFStreamRequest"
      responses:
        "200":
          description: The updated stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSFStream"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteSSFStream
      summary: Delete a Shared Signals stream
      description: >-
        Requires organization admin. Best-effort deletes the stream at the
        transmitter before removing the local record.
      tags: [Shared Signals]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/ssf-streams/{streamID}/register:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/SSFStreamID"
    post:
      operationId: registerSSFStream
      summary: Register a stream at the transmitter
      description: >-
        Requires organization admin. Creates the stream at the transmitter. For
        push streams the response carries the inbound bearer token — it is
        stored hashed and shown only once.
      tags: [Shared Signals]
      responses:
        "200":
          description: The registered stream plus, for push streams, the one-time push token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterSSFStreamResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/organizations/{organizationID}/ssf-streams/{streamID}/verify:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/SSFStreamID"
    post:
      operationId: verifySSFStream
      summary: Request a verification event
      description: >-
        Requires organization admin. Asks the transmitter to emit a
        verification SET; arrival is observed asynchronously via `verifiedAt`.
      tags: [Shared Signals]
      responses:
        "202": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/ssf-streams/{streamID}/status:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/SSFStreamID"
    get:
      operationId: getSSFStreamStatus
      summary: Get transmitter-side stream status
      description: Requires organization membership. Proxied live from the transmitter.
      tags: [Shared Signals]
      responses:
        "200":
          description: The transmitter's view of the stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSFStreamStatus"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/ssf-streams/{streamID}/poll:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/SSFStreamID"
    post:
      operationId: pollSSFStream
      summary: Drain a poll-delivery stream now
      description: >-
        Requires organization admin. Performs an immediate RFC 8936 poll and
        reports how many security events were processed.
      tags: [Shared Signals]
      responses:
        "200":
          description: The poll result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSFPollResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /ssf/events/{streamID}:
    parameters:
      - $ref: "#/components/parameters/SSFStreamID"
    post:
      operationId: receiveSSFPushEvent
      summary: Receive a pushed security event token
      description: >-
        RFC 8935 push delivery. Exempt from session authentication: the
        transmitter authenticates with the per-stream bearer token minted at
        registration, and the body must be a bare SET JWT with
        `Content-Type: application/secevent+jwt` (max 1 MiB). Errors use the
        RFC 8935 `err`/`description` envelope rather than the standard Strato
        error body.
      tags: [Shared Signals]
      security:
        - ssfPushBearerAuth: []
      requestBody:
        required: true
        content:
          application/secevent+jwt:
            schema:
              type: string
              description: A compact-serialization JWT security event token.
      responses:
        "202":
          description: The security event token was accepted and processed.
        "400":
          description: The token, content type or body was invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SETErrorResponse"
        "401":
          description: The per-stream bearer token was missing or wrong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SETErrorResponse"
        "404":
          description: Unknown stream, or the stream does not accept push delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SETErrorResponse"
  /api/organizations/{organizationID}/webhooks:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
    get:
      operationId: listWebhooks
      summary: List an organization's webhook subscriptions
      description: Requires organization membership.
      tags: [Webhooks]
      responses:
        "200":
          description: The organization's webhook subscriptions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookSubscription"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createWebhook
      summary: Create a webhook subscription
      description: >-
        Requires organization admin. The target URL is validated against the
        SSRF guard. The response carries the generated signing secret — it is
        stored encrypted and this is the only time it is shown.
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: The created subscription plus its one-time signing secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookWithSecret"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/organizations/{organizationID}/webhooks/{webhookID}:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/WebhookID"
    get:
      operationId: getWebhook
      summary: Get a webhook subscription
      tags: [Webhooks]
      responses:
        "200":
          description: The subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateWebhook
      summary: Update a webhook subscription
      description: >-
        Requires organization admin. Omitted fields are left unchanged.
        Re-activating a subscription clears its failure bookkeeping (and any
        auto-disable reason).
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: The updated subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscription"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteWebhook
      summary: Delete a webhook subscription
      description: Requires organization admin. Also removes its delivery history.
      tags: [Webhooks]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/webhooks/{webhookID}/rotate-secret:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/WebhookID"
    post:
      operationId: rotateWebhookSecret
      summary: Rotate a webhook's signing secret
      description: >-
        Requires organization admin. Replaces the signing secret immediately;
        the response is the only time the new secret is shown.
      tags: [Webhooks]
      responses:
        "200":
          description: The subscription plus its new one-time signing secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookWithSecret"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/webhooks/{webhookID}/test:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/WebhookID"
    post:
      operationId: sendWebhookTestEvent
      summary: Enqueue a test event
      description: >-
        Requires organization admin. Enqueues a `webhook.test` delivery for
        this subscription (bypassing its event-type selection); the delivery
        sweep posts it like any other event.
      tags: [Webhooks]
      responses:
        "200":
          description: The enqueued test delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDelivery"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/organizations/{organizationID}/webhooks/{webhookID}/deliveries:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/WebhookID"
      - name: limit
        in: query
        required: false
        description: Maximum deliveries to return (1–200, default 50).
        schema: { type: integer }
    get:
      operationId: listWebhookDeliveries
      summary: List a webhook's recent deliveries
      description: >-
        Requires organization admin — delivery payloads carry operational
        detail from any project in the organization. Newest first. Terminal
        deliveries are pruned after the history retention window.
      tags: [Webhooks]
      responses:
        "200":
          description: The subscription's recent deliveries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookDelivery"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/organizations/{organizationID}/webhooks/{webhookID}/deliveries/{deliveryID}/redeliver:
    parameters:
      - name: organizationID
        in: path
        required: true
        description: The organization's id.
        schema: { type: string, format: uuid }
      - $ref: "#/components/parameters/WebhookID"
      - $ref: "#/components/parameters/WebhookDeliveryID"
    post:
      operationId: redeliverWebhookDelivery
      summary: Re-enqueue a delivery
      description: >-
        Requires organization admin. Resets a terminal (succeeded or dead)
        delivery to pending with a fresh attempt budget; the delivery sweep
        posts it again.
      tags: [Webhooks]
      responses:
        "200":
          description: The re-enqueued delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDelivery"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/logs:
    parameters:
      - $ref: "#/components/parameters/VMID"
      - $ref: "#/components/parameters/LogLimitQuery"
      - $ref: "#/components/parameters/LogDirectionQuery"
      - $ref: "#/components/parameters/LogStartQuery"
      - $ref: "#/components/parameters/LogEndQuery"
    get:
      operationId: listVMLogs
      summary: Query a VM's console logs
      description: >-
        Serial-console output shipped by the agent and stored in Loki. Returns
        an empty array when the deployment has no Loki endpoint configured.
      tags: [Logs]
      responses:
        "200":
          description: The matching log entries, newest first unless `direction=forward`.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/LogBackendUnavailable" }
  /api/sandboxes/{sandboxID}/logs:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/LogLimitQuery"
      - $ref: "#/components/parameters/LogDirectionQuery"
      - $ref: "#/components/parameters/LogStartQuery"
      - $ref: "#/components/parameters/LogEndQuery"
    get:
      operationId: listSandboxLogs
      summary: Query a sandbox's workload logs
      description: >-
        Sandbox workload stdout/stderr shipped by the agent and stored in Loki.
        Returns an empty array when the deployment has no Loki endpoint
        configured.
      tags: [Logs]
      responses:
        "200":
          description: The matching log entries, newest first unless `direction=forward`.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/LogBackendUnavailable" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        An API key minted via `POST /api/api-keys`, sent as
        `Authorization: Bearer <key>`.
    cookieAuth:
      type: apiKey
      in: cookie
      name: vapor-session
      description: The session cookie set after a WebAuthn/passkey login.
    scimBearerAuth:
      type: http
      scheme: bearer
      description: >-
        An organization-scoped SCIM provisioning token (`scim_`-prefixed),
        minted via `POST /organizations/{organizationID}/settings/scim-tokens`
        and sent as `Authorization: Bearer scim_...`. The SCIM data plane under
        `/organizations/{organizationID}/scim/v2` is exempt from session
        authentication and accepts only this scheme; the token must belong to
        the organization in the path and be active and unexpired.
    ssfPushBearerAuth:
      type: http
      scheme: bearer
      description: >-
        The per-stream inbound push token returned once by
        `POST /api/organizations/{organizationID}/ssf-streams/{streamID}/register`.
        Used only by the transmitter on `POST /ssf/events/{streamID}`, which is
        exempt from session authentication.

  parameters:
    VMID:
      name: vmID
      in: path
      required: true
      description: The virtual machine's id.
      schema:
        type: string
        format: uuid
    SandboxID:
      name: sandboxID
      in: path
      required: true
      description: The sandbox's id.
      schema:
        type: string
        format: uuid
    SandboxSnapshotID:
      name: snapshotID
      in: path
      required: true
      description: The sandbox snapshot's id.
      schema:
        type: string
        format: uuid
    OperationID:
      name: operationID
      in: path
      required: true
      description: The operation's id.
      schema:
        type: string
        format: uuid
    ProjectID:
      name: projectID
      in: path
      required: true
      description: The project's id.
      schema:
        type: string
        format: uuid
    ServiceAccountID:
      name: serviceAccountID
      in: path
      required: true
      description: The service account's id.
      schema:
        type: string
        format: uuid
    WorkloadRegistrationID:
      name: registrationID
      in: path
      required: true
      description: The workload registration's id.
      schema:
        type: string
        format: uuid
    ImageID:
      name: imageID
      in: path
      required: true
      description: The image's id.
      schema:
        type: string
        format: uuid
    VolumeID:
      name: volumeId
      in: path
      required: true
      description: The volume's id.
      schema:
        type: string
        format: uuid
    VolumeSnapshotID:
      name: snapshotId
      in: path
      required: true
      description: The volume snapshot's id.
      schema:
        type: string
        format: uuid
    NetworkID:
      name: networkId
      in: path
      required: true
      description: The network's id.
      schema:
        type: string
        format: uuid
    PoolID:
      name: poolId
      in: path
      required: true
      description: The floating IP pool's id.
      schema:
        type: string
        format: uuid
    FloatingIPID:
      name: floatingIpId
      in: path
      required: true
      description: The floating IP's id.
      schema:
        type: string
        format: uuid
    SecurityGroupID:
      name: securityGroupId
      in: path
      required: true
      description: The security group's id.
      schema:
        type: string
        format: uuid
    SecurityGroupRuleID:
      name: ruleId
      in: path
      required: true
      description: The security group rule's id.
      schema:
        type: string
        format: uuid
    OrganizationIdQuery:
      name: organization_id
      in: query
      required: false
      description: Scope results to one organization.
      schema:
        type: string
        format: uuid
    ProjectIdQuery:
      name: project_id
      in: query
      required: false
      description: Scope results to one project.
      schema:
        type: string
        format: uuid
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return (1–100).
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    UserIDPath:
      name: userID
      in: path
      required: true
      description: The user's id.
      schema:
        type: string
        format: uuid
    PasskeyCredentialID:
      name: credentialID
      in: path
      required: true
      description: The passkey credential's id.
      schema:
        type: string
        format: uuid
    APIKeyID:
      name: apiKeyID
      in: path
      required: true
      description: The API key's id.
      schema:
        type: string
        format: uuid
    AccountClaimTokenPath:
      name: token
      in: path
      required: true
      description: The one-time passkey-claim token from an invitation link.
      schema:
        type: string
    DeviceUserCode:
      name: userCode
      in: path
      required: true
      description: The short user code displayed by the CLI (case- and separator-insensitive).
      schema:
        type: string
    CLISessionID:
      name: sessionID
      in: path
      required: true
      description: The CLI session's id.
      schema:
        type: string
        format: uuid
    OrganizationID:
      name: organizationID
      in: path
      required: true
      description: The organization's id.
      schema:
        type: string
        format: uuid
    FolderID:
      name: ouID
      in: path
      required: true
      description: The folder's id (an organizational unit on the wire).
      schema:
        type: string
        format: uuid
    GroupID:
      name: groupID
      in: path
      required: true
      description: The group's id.
      schema:
        type: string
        format: uuid
    MemberUserID:
      name: userID
      in: path
      required: true
      description: The member user's id.
      schema:
        type: string
        format: uuid
    HierarchyEntityType:
      name: entityType
      in: path
      required: true
      description: The kind of hierarchy entity to resolve.
      schema:
        type: string
        enum: [organization, ou, project, vm]
    HierarchyEntityID:
      name: entityID
      in: path
      required: true
      description: The hierarchy entity's id.
      schema:
        type: string
        format: uuid
    HierarchySearchQuery:
      name: q
      in: query
      required: true
      description: The search term matched against entity names and paths.
      schema:
        type: string
    HierarchyEntityTypeQuery:
      name: type
      in: query
      required: false
      description: Restrict results to one kind of hierarchy entity.
      schema:
        type: string
        enum: [organization, ou, project, vm]
    ProjectEnvironmentName:
      name: environment
      in: path
      required: true
      description: The deployment environment's name.
      schema:
        type: string
    RegistryCredentialID:
      name: credentialID
      in: path
      required: true
      description: The registry pull secret's id.
      schema:
        type: string
        format: uuid
    QuotaID:
      name: quotaID
      in: path
      required: true
      description: The resource quota's id.
      schema:
        type: string
        format: uuid
    QuotaLevelQuery:
      name: level
      in: query
      required: false
      description: >-
        Restrict results to quotas attached at one level of the hierarchy. An
        unrecognized value behaves like omitting the parameter.
      schema:
        type: string
        enum: [organization, organizational_unit, project]
    AgentID:
      name: agentId
      in: path
      required: true
      description: The agent's id.
      schema:
        type: string
        format: uuid
    SiteID:
      name: siteId
      in: path
      required: true
      description: The site's id.
      schema:
        type: string
        format: uuid
    EnrollmentID:
      name: enrollmentId
      in: path
      required: true
      description: The agent enrollment's id.
      schema:
        type: string
        format: uuid
    SkipSpireDeprovisionQuery:
      name: skipSpireDeprovision
      in: query
      required: false
      description: >-
        Proceed even though the SPIRE server API is not configured and the
        SPIRE entries cannot be revoked from here. Only for deployments that
        manage SPIRE entries out of band.
      schema:
        type: boolean
    GuardrailID:
      name: guardrailID
      in: path
      required: true
      description: The guardrail's id.
      schema:
        type: string
        format: uuid
    GuardrailNodeTypeQuery:
      name: nodeType
      in: query
      required: true
      description: The type of the tree node whose guardrails are being listed.
      schema:
        $ref: "#/components/schemas/IAMNodeType"
    GuardrailNodeIdQuery:
      name: nodeId
      in: query
      required: true
      description: The id of the tree node whose guardrails are being listed.
      schema:
        type: string
        format: uuid
    GuardrailEffectiveQuery:
      name: effective
      in: query
      required: false
      description: >-
        When true, return every enabled guardrail in force at the node —
        its own plus everything inherited from ancestors — with the ancestor
        chain. When false or absent, only the guardrails attached directly.
      schema:
        type: boolean
        default: false
    RoleID:
      name: roleID
      in: path
      required: true
      description: The role definition's id.
      schema:
        type: string
        format: uuid
    RoleOwnerTypeQuery:
      name: ownerType
      in: query
      required: true
      description: Which kind of owner defines the roles being listed.
      schema:
        $ref: "#/components/schemas/IAMRoleOwnerType"
    RoleOwnerIdQuery:
      name: ownerId
      in: query
      required: true
      description: The id of the organization or project defining the roles.
      schema:
        type: string
        format: uuid
    PolicyID:
      name: policyID
      in: path
      required: true
      description: The authored policy's id.
      schema:
        type: string
        format: uuid
    PolicyOwnerTypeQuery:
      name: ownerType
      in: query
      required: true
      description: >-
        Which kind of owner defines the policies being listed. Authored
        policies are owned by an organization or project only.
      schema:
        $ref: "#/components/schemas/IAMRoleOwnerType"
    PolicyOwnerIdQuery:
      name: ownerId
      in: query
      required: true
      description: The id of the organization or project defining the policies.
      schema:
        type: string
        format: uuid
    RoleBindableNodeTypeQuery:
      name: nodeType
      in: query
      required: true
      description: The type of the tree node a role would be bound on.
      schema:
        $ref: "#/components/schemas/IAMNodeType"
    RoleBindableNodeIdQuery:
      name: nodeId
      in: query
      required: true
      description: The id of the tree node a role would be bound on.
      schema:
        type: string
        format: uuid
    DecisionLogMismatchesOnlyQuery:
      name: mismatchesOnly
      in: query
      required: false
      description: Return only entries where the two engines disagreed.
      schema:
        type: boolean
        default: false
    DecisionLogLimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of decision-log entries to return (1–500).
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 500
    DecisionLogBeforeQuery:
      name: before
      in: query
      required: false
      description: >-
        Cursor: return only entries created strictly before this ISO8601
        timestamp. Pass back the `createdAt` of the oldest row of the previous
        page.
      schema:
        type: string
        format: date-time
    DecisionLogSinceHoursQuery:
      name: sinceHours
      in: query
      required: false
      description: How many hours back to aggregate over (1–2160, i.e. up to 90 days).
      schema:
        type: integer
        default: 24
        minimum: 1
        maximum: 2160
    DecisionSummaryLimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of summary buckets to return (1–1000).
      schema:
        type: integer
        default: 200
        minimum: 1
        maximum: 1000
    AuditEventTypeQuery:
      name: eventType
      in: query
      required: false
      description: Return only events of this type.
      schema:
        type: string
    AuditUserIdQuery:
      name: userID
      in: query
      required: false
      description: Return only events attributed to this user.
      schema:
        type: string
        format: uuid
    AuditOrganizationIdQuery:
      name: organizationID
      in: query
      required: false
      description: Return only events scoped to this organization.
      schema:
        type: string
        format: uuid
    AuditAdminOnlyQuery:
      name: adminOnly
      in: query
      required: false
      description: Return only events served via the system-admin bypass.
      schema:
        type: boolean
    AuditFromQuery:
      name: from
      in: query
      required: false
      description: >-
        Lower bound on `createdAt`. ISO8601 (with or without fractional
        seconds) or epoch seconds; an unparseable value is treated as
        unbounded rather than matching nothing.
      schema:
        type: string
    AuditToQuery:
      name: to
      in: query
      required: false
      description: >-
        Upper bound on `createdAt`. ISO8601 (with or without fractional
        seconds) or epoch seconds; an unparseable value is treated as
        unbounded rather than matching nothing.
      schema:
        type: string
    AuditLimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of audit events to return (1–500).
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 500
    AuditOffsetQuery:
      name: offset
      in: query
      required: false
      description: Number of audit events to skip.
      schema:
        type: integer
        default: 0
        minimum: 0
    OIDCProviderID:
      name: providerID
      in: path
      required: true
      description: The OIDC provider's id.
      schema:
        type: string
        format: uuid
    SCIMTokenID:
      name: tokenID
      in: path
      required: true
      description: The SCIM token's id.
      schema:
        type: string
        format: uuid
    SCIMUserID:
      name: scimUserID
      in: path
      required: true
      description: The SCIM user resource's id (the Strato user id).
      schema:
        type: string
    SCIMGroupID:
      name: scimGroupID
      in: path
      required: true
      description: The SCIM group resource's id (the Strato group id).
      schema:
        type: string
    SSFStreamID:
      name: streamID
      in: path
      required: true
      description: The Shared Signals stream's id.
      schema:
        type: string
        format: uuid
    WebhookID:
      name: webhookID
      in: path
      required: true
      description: The webhook subscription's id.
      schema:
        type: string
        format: uuid
    WebhookDeliveryID:
      name: deliveryID
      in: path
      required: true
      description: The webhook delivery's id.
      schema:
        type: string
        format: uuid
    SCIMFilterQuery:
      name: filter
      in: query
      required: false
      description: An RFC 7644 §3.4.2.2 filter expression.
      schema:
        type: string
    SCIMStartIndexQuery:
      name: startIndex
      in: query
      required: false
      description: 1-based index of the first result (RFC 7644 §3.4.2.4).
      schema:
        type: integer
        default: 1
        minimum: 1
    SCIMCountQuery:
      name: count
      in: query
      required: false
      description: Page size; the server caps results at 1000.
      schema:
        type: integer
        default: 100
        minimum: 0
        maximum: 1000
    SCIMSortByQuery:
      name: sortBy
      in: query
      required: false
      description: Attribute path to sort by.
      schema:
        type: string
    SCIMSortOrderQuery:
      name: sortOrder
      in: query
      required: false
      description: Sort direction.
      schema:
        type: string
        default: ascending
        enum: [ascending, descending]
    SCIMAttributesQuery:
      name: attributes
      in: query
      required: false
      description: Comma-separated attribute paths to include.
      schema:
        type: string
    SCIMExcludedAttributesQuery:
      name: excludedAttributes
      in: query
      required: false
      description: Comma-separated attribute paths to omit.
      schema:
        type: string
    LogLimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of log entries to return. Values above 1000 are capped.
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
    LogDirectionQuery:
      name: direction
      in: query
      required: false
      description: Whether to read from the start or the end of the time range.
      schema:
        type: string
        default: backward
        enum: [forward, backward]
    LogStartQuery:
      name: start
      in: query
      required: false
      description: Start of the time range, as a Unix timestamp in seconds.
      schema:
        type: number
        format: double
    LogEndQuery:
      name: end
      in: query
      required: false
      description: End of the time range, as a Unix timestamp in seconds.
      schema:
        type: number
        format: double

  responses:
    NoContent:
      description: Success with no response body.
    BadRequest:
      description: The request was malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The caller is authenticated but not authorized.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GuardrailCheckUnavailable:
      description: >-
        The write-time guardrail check could not run, so the policy write was
        not accepted. Deliberately fail-closed: a grant is never accepted
        unchecked because the analyzer was unavailable. Existing access is
        unaffected and guardrails remain enforced on every request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The resource does not exist or is not visible.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The request conflicts with current state (e.g. a pending operation).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: The uploaded body exceeded the size limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AcceptedOperation:
      description: The mutation was accepted; poll the returned operation to completion.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ResourceOperation"
    LogBackendUnavailable:
      description: The log backend (Loki) could not be queried.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: The standard error envelope.
      required: [error, reason]
      properties:
        error:
          type: boolean
          description: Always true on an error response.
        reason:
          type: string
          description: A human-readable explanation.

    HealthStatus:
      type: object
      description: A health/readiness/liveness report.
      required: [status]
      properties:
        status:
          type: string
      additionalProperties: true

    ResourceOperation:
      type: object
      description: >-
        A durable record of one asynchronous resource lifecycle mutation. Poll
        it until `status` is terminal.
      required: [vmId, resourceKind, resourceId, kind, status]
      properties:
        id:
          type: string
          format: uuid
        vmId:
          type: string
          format: uuid
          description: >-
            Legacy field equal to `resourceId`; retained for existing clients.
            New clients should read `resourceKind`/`resourceId`.
        resourceKind:
          $ref: "#/components/schemas/OperationResourceKind"
        resourceId:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/OperationKind"
        status:
          $ref: "#/components/schemas/OperationStatus"
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    OperationResourceKind:
      type: string
      description: Which kind of resource an operation acts on.
      enum: [virtual_machine, sandbox]
    OperationKind:
      type: string
      description: The lifecycle mutation an operation performs.
      enum:
        - create
        - boot
        - shutdown
        - reboot
        - pause
        - resume
        - delete
        - resize
        - snapshot
        - snapshot_delete
        - restore
        - snapshot_export
    OperationStatus:
      type: string
      description: The state of an operation. `pending` is the only non-terminal value.
      enum: [pending, succeeded, failed]

    HypervisorType:
      type: string
      enum: [qemu, firecracker]
    CPUArchitecture:
      type: string
      enum: [x86_64, arm64]

    CreateVMRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        imageId:
          type: string
          format: uuid
          description: Required in practice; the source image to boot from.
        projectId:
          type: string
          format: uuid
        environment:
          type: string
        cpu:
          type: integer
        memory:
          type: integer
          format: int64
          description: Memory in bytes.
        disk:
          type: integer
          format: int64
          description: Disk in bytes.
        maxCpu:
          type: integer
          description: >-
            Ceiling for online vCPU growth (issue #568). Defaults to `cpu` (no
            headroom); fixed for the life of a running hypervisor process.
        maxMemory:
          type: integer
          format: int64
          description: >-
            Ceiling for online memory growth in bytes. Defaults to `memory`.
        cmdline:
          type: string
        networkId:
          type: string
          format: uuid
          description: Mutually exclusive with `networkName`.
        networkName:
          type: string
        sshPublicKey:
          type: string
        userData:
          type: string
          description: cloud-init user data.
        hypervisorType:
          $ref: "#/components/schemas/HypervisorType"
        secureBoot:
          type: boolean
          default: false
          description: >-
            Boot the guest with UEFI Secure Boot. Requires a QEMU VM placed on
            an agent new enough to realize the machine profile; rejected for
            firecracker, which boots a kernel directly with no UEFI.
        tpm:
          type: boolean
          default: false
          description: >-
            Give the guest an emulated TPM 2.0. Only agents advertising
            `tpmCapable` (swtpm installed) are eligible; rejected for
            firecracker. Windows 11 and Server 2025 require this together with
            `secureBoot`.
        securityGroupIds:
          type: array
          items:
            type: string
            format: uuid
          description: >-
            Security groups for the VM's NIC (same project, at most 5).
            Omitted or empty means the project's default group — every NIC
            belongs to at least one group.
    UpdateVMRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        cpu:
          type: integer
          description: >-
            Target boot vCPU count. On a running VM it must not exceed `maxCpu`.
        memory:
          type: integer
          format: int64
          description: >-
            Target memory in bytes. On a running VM it must not exceed `maxMemory`.
    VMDetail:
      type: object
      required:
        - name
        - description
        - image
        - status
        - cpu
        - maxCpu
        - memory
        - maxMemory
        - memoryFormatted
        - disk
        - diskFormatted
        - networkInterfaces
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        image:
          type: string
        imageId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/VMStatus"
        hypervisorId:
          type: string
        cpu:
          type: integer
        maxCpu:
          type: integer
        memory:
          type: integer
          format: int64
        memoryFormatted:
          type: string
        maxMemory:
          type: integer
          format: int64
          description: Ceiling for online memory growth; equals `memory` without headroom.
        disk:
          type: integer
          format: int64
        diskFormatted:
          type: string
        networkInterfaces:
          type: array
          items:
            $ref: "#/components/schemas/NetworkInterface"
        secureBoot:
          type: boolean
          description: Whether the guest boots with UEFI Secure Boot.
        tpmEnabled:
          type: boolean
          description: Whether the guest has an emulated TPM 2.0.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VMStatus:
      type: string
      description: The observed VM state (tolerant decoding; unknown values map to Unknown).
      enum:
        - Created
        - Running
        - Shutdown
        - Paused
        - Starting
        - Stopping
        - Error
        - Unknown
    NetworkInterface:
      type: object
      required: [network, macAddress, addresses, deviceName, orderIndex]
      properties:
        id:
          type: string
          format: uuid
        network:
          type: string
        macAddress:
          type: string
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/InterfaceAddress"
        mtu:
          type: integer
        deviceName:
          type: string
          description: Stable device name (e.g. net0).
        orderIndex:
          type: integer
    InterfaceAddress:
      type: object
      required: [family, address, prefixLength]
      properties:
        family:
          type: string
          enum: [ipv4, ipv6]
        address:
          type: string
        prefixLength:
          type: integer
        gateway:
          type: string

    CreateSandboxRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image:
          type: string
          description: OCI image reference.
        restoreFrom:
          type: string
          format: uuid
          description: Snapshot id to fork from; mutually exclusive with image/cpus/memory.
        projectId:
          type: string
          format: uuid
        environment:
          type: string
        cpus:
          type: integer
        memory:
          type: integer
          format: int64
          description: Guest memory in bytes.
        entrypoint:
          type: array
          items:
            type: string
        cmd:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        workingDir:
          type: string
        ttlSeconds:
          type: integer
    UpdateSandboxRequest:
      type: object
      properties:
        name:
          type: string
        ttlSeconds:
          type: integer
    SandboxDetail:
      type: object
      required:
        - name
        - environment
        - image
        - cpus
        - memory
        - env
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        projectId:
          type: string
          format: uuid
        environment:
          type: string
        image:
          type: string
        imageDigest:
          type: string
        cpus:
          type: integer
        memory:
          type: integer
          format: int64
        entrypoint:
          type: array
          items:
            type: string
        cmd:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        workingDir:
          type: string
        ttlSeconds:
          type: integer
        expiresAt:
          type: string
          format: date-time
        hypervisorId:
          type: string
        restoredFromSnapshotId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SandboxStatus"
        exitCode:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SandboxStatus:
      type: string
      enum: [Stopped, Running, Exited, Starting, Stopping, Error, Unknown]

    CreateSandboxSnapshotRequest:
      type: object
      properties:
        name:
          type: string
        stop:
          type: boolean
          description: When true, checkpoint and stop; defaults to false.
    SandboxSnapshot:
      type: object
      required: [name, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sandboxId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SandboxSnapshotStatus"
        size:
          type: integer
          format: int64
        agentId:
          type: string
        firecrackerVersion:
          type: string
        architecture:
          type: string
        guestControlProtocolVersion:
          type: integer
        forkLayoutVersion:
          type: integer
        cpuTemplate:
          type: string
        exportedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
        createdById:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    SandboxSnapshotStatus:
      type: string
      enum: [creating, ready, deleting, error]
    SandboxSnapshotArtifactKind:
      type: string
      description: A component of an exported sandbox snapshot.
      enum: [memory, vmstate, rootfs, config]

    CreateImageRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        sourceURL:
          type: string
        architecture:
          $ref: "#/components/schemas/CPUArchitecture"
        checksum:
          type: string
          description: 64-hex SHA-256.
        defaultCpu:
          type: integer
        defaultMemory:
          type: integer
          format: int64
        defaultDisk:
          type: integer
          format: int64
        defaultCmdline:
          type: string
    UpdateImageRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        architecture:
          $ref: "#/components/schemas/CPUArchitecture"
        defaultCpu:
          type: integer
        defaultMemory:
          type: integer
          format: int64
        defaultDisk:
          type: integer
          format: int64
        defaultCmdline:
          type: string
    ImageUploadForm:
      type: object
      description: Multipart upload of image bytes plus optional metadata fields.
      required: [file]
      properties:
        file:
          type: string
          format: binary
        name:
          type: string
        description:
          type: string
        architecture:
          type: string
        format:
          type: string
        defaultCpu:
          type: integer
        defaultMemory:
          type: integer
          format: int64
        defaultDisk:
          type: integer
          format: int64
        defaultCmdline:
          type: string
    ArtifactUploadForm:
      type: object
      description: Multipart upload of one typed artifact.
      required: [file]
      properties:
        file:
          type: string
          format: binary
        kind:
          type: string
          description: Artifact kind; required here unless supplied as the `kind` query parameter.
    ArtifactFetchRequest:
      type: object
      required: [kind, sourceURL]
      properties:
        kind:
          type: string
          description: Artifact kind (see ArtifactKind).
        sourceURL:
          type: string
    Image:
      type: object
      required:
        - name
        - description
        - filename
        - size
        - sizeFormatted
        - format
        - architecture
        - status
        - artifacts
        - compatibleHypervisors
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
          format: uuid
        filename:
          type: string
        size:
          type: integer
          format: int64
        sizeFormatted:
          type: string
        format:
          $ref: "#/components/schemas/ImageFormat"
        architecture:
          $ref: "#/components/schemas/CPUArchitecture"
        checksum:
          type: string
        status:
          $ref: "#/components/schemas/ImageStatus"
        sourceURL:
          type: string
        downloadProgress:
          type: integer
        errorMessage:
          type: string
        defaultCpu:
          type: integer
        defaultMemory:
          type: integer
          format: int64
        defaultDisk:
          type: integer
          format: int64
        defaultCmdline:
          type: string
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ImageArtifact"
        compatibleHypervisors:
          type: array
          items:
            $ref: "#/components/schemas/HypervisorType"
        uploadedById:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ImageArtifact:
      type: object
      required: [kind, architecture, filename, size, checksum, status]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/ArtifactKind"
        format:
          $ref: "#/components/schemas/ImageFormat"
        architecture:
          $ref: "#/components/schemas/CPUArchitecture"
        filename:
          type: string
        size:
          type: integer
          format: int64
