openapi: 3.0.3
info:
  title: Strato Control Plane API
  version: 1.0.0
  license:
    name: FSL-1.1-MIT
    url: https://github.com/samcat116/strato/blob/main/LICENSE
  description: |
    The Strato control plane owns the JSON API, database, scheduler, and
    authorization for the Strato private cloud platform. This document is the
    spec-first source of truth for that API (swift-openapi-generator, issue
    #557).

    ## Authentication

    Every operation requires authentication unless it declares `security: []`.
    Two schemes are accepted interchangeably:

    - `bearerAuth` — an API key (`Authorization: Bearer <key>`) minted via
      `POST /api/api-keys`. Keys carry scopes (`read`, `write`) enforced per
      request.
    - `cookieAuth` — the `vapor-session` cookie set after a WebAuthn/passkey
      login.

    Per-object access is additionally enforced by the control plane's Cedar
    policy evaluator; a caller who is authenticated but not authorized
    receives `403`.

    ## Asynchronous mutations

    VM and sandbox lifecycle mutations (create/start/stop/restart/delete, VM
    pause/resume, sandbox snapshot/restore) are **asynchronous**. They persist a
    desired-state change plus a `ResourceOperation` row in one transaction and
    return `202 Accepted` with that operation. Clients poll
    `GET /api/operations/{operationID}` (or the per-resource operations list)
    until `status` is terminal (`succeeded` or `failed`). A second mutation on a
    resource that already has a pending operation is rejected with `409`.

    Image and volume mutations are synchronous at the API layer: they return the
    resource immediately (often in a transitional `status` such as `pending` or
    `creating`) and converge in the background.

    ## Errors

    Errors use Vapor's standard envelope: a JSON object with a boolean `error`
    flag and a human-readable `reason` (see the `Error` schema).

    ## Out of scope

    WebSocket endpoints are intentionally **not** modeled as OpenAPI
    operations. They are documented here as prose:

    - `GET /agent/ws` — agent reconciliation channel (SPIFFE mTLS).
    - `GET /api/vms/{vmID}/console` — VM serial console (WebSocket).
    - `POST /api/sandboxes/{sandboxID}/exec` + `GET
      /api/sandboxes/{sandboxID}/exec/{sessionID}/attach` — sandbox exec
      (WebSocket attach).

    Everything else the control plane serves is described here. A route-drift
    test (`AppTests/OpenAPISpecDriftTests`) boots the app and enforces both
    directions — no registered route may go undocumented, and no operation may
    describe a route that does not exist.

    ## The SCIM data plane

    The SCIM 2.0 surface under `/organizations/{organizationID}/scim/v2` is
    registered in Vapor as a catch-all and dispatched internally by
    SwiftSCIM's request processor. This document describes the concrete
    resource endpoints that processor actually serves (`/Users`, `/Groups`,
    `/ServiceProviderConfig`, `/ResourceTypes`, `/Schemas`) rather than the
    catch-all, so generated clients can call them; the drift test understands
    the catch-all registration and matches these operations against it.

    SCIM requests authenticate with an org-scoped `scim_` bearer token
    (`scimBearerAuth`), never a user session, and use the RFC 7644 error
    format rather than the platform `Error` envelope.
servers:
  - url: /
    description: Same origin as the control plane

tags:
  - name: Health
    description: Liveness and readiness probes.
  - name: Documentation
    description: The served OpenAPI document and its viewer.
  - name: Virtual Machines
    description: VM lifecycle. Mutations are asynchronous (202 + operation).
  - name: Operations
    description: Poll the status of asynchronous resource operations.
  - name: Sandboxes
    description: OCI-image Firecracker microVMs. Mutations are asynchronous.
  - name: Sandbox Snapshots
    description: Sandbox checkpoint/restore.
  - name: Images
    description: VM/sandbox base images and their per-hypervisor artifacts.
  - name: Volumes
    description: Persistent block volumes and their snapshots.
  - name: Networks
    description: Logical (SDN) networks.
  - name: Floating IPs
    description: External address pools and VM NIC attachments.
  - name: Logs
    description: Loki-backed VM console and sandbox workload log queries.
  - name: Users
    description: User accounts and their passkey credentials.
  - name: Authentication
    description: WebAuthn/passkey login, account claim, and OAuth device flow.
  - name: API Keys
    description: Programmatic credentials with read/write scopes.
  - name: Organizations
    description: Top-level tenants and their memberships.
  - name: Folders
    description: >-
      Nested containers between an organization and its projects. Named
      `OrganizationalUnit` (`ous`) on the wire; the wire rename lands with the
      Cedar cutover.
  - name: Groups
    description: Named sets of users, optionally SCIM-provisioned, used to grant access.
  - name: Projects
    description: Project CRUD, members, group grants, and registry pull secrets.
  - name: Quotas
    description: Resource quotas attached at organization, folder, or project level.
  - name: Agents
    description: Hypervisor node registration, enrollment, and fleet actions.
  - name: Sites
    description: Physical or logical groupings of agents.
  - name: Workload Identity
    description: SPIFFE/SPIRE registration entries, trust bundles, and federation.
  - name: Service Accounts
    description: >-
      Machine principals (issue #491): project-scoped service accounts and the
      workload registry mapping SPIFFE identities to registered principals.
  - name: IAM
    description: >-
      Permission checks, guardrails, and decision logs. Some field names
      (`spicedbPermission`, `spicedbDecision`) are historical, kept from the
      pre-Cedar migration for API compatibility.
  - name: Audit
    description: Audit event history.
  - name: OIDC
    description: Per-organization OIDC identity providers and the login flow.
  - name: SCIM
    description: SCIM 2.0 user/group provisioning and its org-scoped tokens.
  - name: Shared Signals
    description: >-
      Shared Signals Framework (SSF) streams and the RFC 8935 push-delivery
      receiver.
  - name: Webhooks
    description: >-
      User-managed webhook subscriptions to typed platform events, with
      signed, outbox-backed delivery and per-subscription delivery history.

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  /health:
    get:
      operationId: health
      summary: Health check
      description: Overall control-plane health, including build identity.
      tags: [Health]
      security: []
      responses:
        "200":
          description: The service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/ready:
    get:
      operationId: readiness
      summary: Readiness probe
      description: Whether the service is ready to accept traffic (dependencies reachable).
      tags: [Health]
      security: []
      responses:
        "200":
          description: The service is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: The service is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health/live:
    get:
      operationId: liveness
      summary: Liveness probe
      description: Whether the process is alive.
      tags: [Health]
      security: []
      responses:
        "200":
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/openapi.yaml:
    get:
      operationId: openapiDocument
      summary: This OpenAPI document
      description: Serves this specification as YAML.
      tags: [Documentation]
      security: []
      responses:
        "200":
          description: The OpenAPI document.
          content:
            application/yaml:
              schema:
                type: string
  /api/docs:
    get:
      operationId: apiDocsViewer
      summary: API documentation viewer
      description: An HTML page that renders this specification with Swagger UI.
      tags: [Documentation]
      security: []
      responses:
        "200":
          description: The documentation viewer page.
          content:
            text/html:
              schema:
                type: string

  /api/vms:
    get:
      operationId: listVMs
      summary: List virtual machines
      description: Returns VMs the caller can read, optionally scoped to one organization.
      tags: [Virtual Machines]
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
      responses:
        "200":
          description: The visible virtual machines.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VMDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createVM
      summary: Create a virtual machine
      description: Records the VM and a pending `create` operation, returning the operation to poll.
      tags: [Virtual Machines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVMRequest"
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}:
    parameters:
      - $ref: "#/components/parameters/VMID"
    get:
      operationId: getVM
      summary: Get a virtual machine
      tags: [Virtual Machines]
      responses:
        "200":
          description: The virtual machine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateVM
      summary: Update a virtual machine
      description: >-
        Updates `name`/`description`, and `cpu`/`memory` (issue #568). A sizing
        change to a *running* VM is applied online within the `maxCpu`/`maxMemory`
        ceilings it was started with and answers `202` with a `resize` operation;
        a sizing change to a stopped VM (which may also raise those ceilings, since
        the next boot re-spawns the VM) and a metadata-only update answer `200`.
      tags: [Virtual Machines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVMRequest"
      responses:
        "200":
          description: The updated virtual machine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMDetail"
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422":
          description: >-
            The requested size exceeds the ceilings the running VM was started
            with, or its agent is too old to resize online; restart the VM to apply it.
    delete:
      operationId: deleteVM
      summary: Delete a virtual machine
      description: Sets desired state to absent and returns a pending `delete` operation.
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/start:
    parameters:
      - $ref: "#/components/parameters/VMID"
    post:
      operationId: startVM
      summary: Start a virtual machine
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/stop:
    parameters:
      - $ref: "#/components/parameters/VMID"
    post:
      operationId: stopVM
      summary: Stop a virtual machine
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/restart:
    parameters:
      - $ref: "#/components/parameters/VMID"
    post:
      operationId: restartVM
      summary: Restart a virtual machine
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/pause:
    parameters:
      - $ref: "#/components/parameters/VMID"
    post:
      operationId: pauseVM
      summary: Pause a virtual machine
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/resume:
    parameters:
      - $ref: "#/components/parameters/VMID"
    post:
      operationId: resumeVM
      summary: Resume a paused virtual machine
      tags: [Virtual Machines]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/vms/{vmID}/status:
    parameters:
      - $ref: "#/components/parameters/VMID"
    get:
      operationId: getVMStatus
      summary: Get a virtual machine's observed status
      description: Returns the last observed state from the database (no agent round-trip).
      tags: [Virtual Machines]
      responses:
        "200":
          description: The virtual machine.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VMDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/vms/{vmID}/operations:
    parameters:
      - $ref: "#/components/parameters/VMID"
      - $ref: "#/components/parameters/LimitQuery"
    get:
      operationId: listVMOperations
      summary: List a virtual machine's operations
      description: Newest first.
      tags: [Virtual Machines]
      responses:
        "200":
          description: The virtual machine's operations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceOperation"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/operations/{operationID}:
    parameters:
      - $ref: "#/components/parameters/OperationID"
    get:
      operationId: getOperation
      summary: Get an operation
      description: Poll this until `status` is terminal (`succeeded` or `failed`).
      tags: [Operations]
      responses:
        "200":
          description: The operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceOperation"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/sandboxes:
    get:
      operationId: listSandboxes
      summary: List sandboxes
      tags: [Sandboxes]
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
      responses:
        "200":
          description: The visible sandboxes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SandboxDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createSandbox
      summary: Create a sandbox
      tags: [Sandboxes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSandboxRequest"
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    get:
      operationId: getSandbox
      summary: Get a sandbox
      tags: [Sandboxes]
      responses:
        "200":
          description: The sandbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateSandbox
      summary: Update a sandbox
      description: Only `name` and `ttlSeconds` are mutable.
      tags: [Sandboxes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSandboxRequest"
      responses:
        "200":
          description: The updated sandbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteSandbox
      summary: Delete a sandbox
      tags: [Sandboxes]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/start:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    post:
      operationId: startSandbox
      summary: Start a sandbox
      tags: [Sandboxes]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/stop:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    post:
      operationId: stopSandbox
      summary: Stop a sandbox
      tags: [Sandboxes]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/restart:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    post:
      operationId: restartSandbox
      summary: Restart a sandbox
      tags: [Sandboxes]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/status:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    get:
      operationId: getSandboxStatus
      summary: Get a sandbox's observed status
      tags: [Sandboxes]
      responses:
        "200":
          description: The sandbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxDetail"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/sandboxes/{sandboxID}/operations:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/LimitQuery"
    get:
      operationId: listSandboxOperations
      summary: List a sandbox's operations
      tags: [Sandboxes]
      responses:
        "200":
          description: The sandbox's operations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceOperation"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/sandboxes/{sandboxID}/snapshots:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
    get:
      operationId: listSandboxSnapshots
      summary: List a sandbox's snapshots
      tags: [Sandbox Snapshots]
      responses:
        "200":
          description: The sandbox's snapshots.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SandboxSnapshot"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createSandboxSnapshot
      summary: Create a sandbox snapshot
      description: The request body is optional; an empty body snapshots without stopping.
      tags: [Sandbox Snapshots]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSandboxSnapshotRequest"
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/snapshots/{snapshotID}:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/SandboxSnapshotID"
    delete:
      operationId: deleteSandboxSnapshot
      summary: Delete a sandbox snapshot
      tags: [Sandbox Snapshots]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/snapshots/{snapshotID}/restore:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/SandboxSnapshotID"
    post:
      operationId: restoreSandboxSnapshot
      summary: Restore a sandbox from a snapshot
      tags: [Sandbox Snapshots]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/snapshots/{snapshotID}/export:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/SandboxSnapshotID"
    post:
      operationId: exportSandboxSnapshot
      summary: Export a sandbox snapshot to project storage
      description: >-
        Copies the snapshot's artifacts into durable project storage so it can
        be moved between agents (snapshot mobility). Asynchronous — poll the
        returned operation.
      tags: [Sandbox Snapshots]
      responses:
        "202": { $ref: "#/components/responses/AcceptedOperation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/sandboxes/{sandboxID}/snapshots/{snapshotID}/artifacts/{artifactKind}:
    parameters:
      - $ref: "#/components/parameters/SandboxID"
      - $ref: "#/components/parameters/SandboxSnapshotID"
      - name: artifactKind
        in: path
        required: true
        description: Which snapshot artifact to transfer.
        schema:
          $ref: "#/components/schemas/SandboxSnapshotArtifactKind"
    get:
      operationId: downloadSnapshotArtifact
      summary: Download a snapshot artifact
      description: >-
        Streams the raw artifact bytes for an exported snapshot. Used by agents
        importing a snapshot onto another host; authenticated by a forwarded
        SPIFFE SVID client certificate over mTLS (the handler verifies the cert
        before serving bytes).
      tags: [Sandbox Snapshots]
      responses:
        "200":
          description: The artifact bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: uploadSnapshotArtifact
      summary: Upload a snapshot artifact
      description: >-
        Streams the raw artifact bytes for an exported snapshot (used by agents
        exporting a snapshot); authenticated by a forwarded SPIFFE SVID client
        certificate over mTLS.
      tags: [Sandbox Snapshots]
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: The artifact was stored.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

