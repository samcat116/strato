    parameters:
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ImageID"
    post:
      operationId: uploadImageArtifact
      summary: Upload an image artifact
      description: Streams a `multipart/form-data` file (capped at 4 GiB) as a typed artifact.
      tags: [Images]
      parameters:
        - name: kind
          in: query
          required: false
          description: Artifact kind. Required unless supplied as a `kind` form field.
          schema:
            $ref: "#/components/schemas/ArtifactKind"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ArtifactUploadForm"
      responses:
        "200":
          description: The image with the new artifact.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
