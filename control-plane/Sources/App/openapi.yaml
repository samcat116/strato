        "204": { $ref: "#/components/responses/NoContent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/projects/{projectID}/images/{imageID}/download:
    parameters:
      - $ref: "#/components/parameters/ProjectID"
      - $ref: "#/components/parameters/ImageID"
      - name: artifact
        in: query
        required: false
        description: Which artifact to download. Omit for the legacy whole-image disk.
        schema:
          $ref: "#/components/schemas/ArtifactKind"
    get:
      operationId: downloadImage
      summary: Download image (or artifact) bytes
      description: |
        Streams raw bytes. Authenticated either by a user session or, for
        agents, a forwarded SPIFFE SVID client certificate over mTLS.
      tags: [Images]
      responses:
        "200":
          description: The image bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
