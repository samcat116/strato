      type: string
      description: Traffic direction relative to the VM.
      enum: [ingress, egress]
    SecurityGroupRuleEthertype:
      type: string
      description: Address family the rule matches.
      enum: [ipv4, ipv6]
    SecurityGroupRule:
      type: object
      required: [id, direction, ethertype]
      properties:
        id:
          type: string
          format: uuid
        direction:
          $ref: "#/components/schemas/SecurityGroupRuleDirection"
        ethertype:
          $ref: "#/components/schemas/SecurityGroupRuleEthertype"
        protocolName:
          type: string
          description: tcp, udp, or icmp; absent matches any protocol.
          enum: [tcp, udp, icmp]
        portRangeMin:
          type: integer
          description: >-
            tcp/udp: first destination port of the range. icmp: the ICMP type.
        portRangeMax:
          type: integer
          description: >-
            tcp/udp: last destination port of the range. icmp: the ICMP code.
        remoteCIDR:
          type: string
          description: CIDR peer; mutually exclusive with remoteGroupId.
        remoteGroupId:
          type: string
          format: uuid
          description: >-
            Security-group peer — matches the referenced group's current
            member addresses.
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    SecurityGroup:
      type: object
      required: [id, name, projectId, isDefault, rules, attachmentCount]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
          format: uuid
        isDefault:
          type: boolean
          description: >-
            The project's auto-created fallback group: undeletable and
            un-renamable, though its rules are editable.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/SecurityGroupRule"
        attachmentCount:
          type: integer
          description: How many VM NICs currently attach this group.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSecurityGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
          format: uuid
          description: Defaults to the caller's default project when omitted.
    UpdateSecurityGroupRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
    CreateSecurityGroupRuleRequest:
      type: object
      required: [direction, ethertype]
      properties:
        direction:
          $ref: "#/components/schemas/SecurityGroupRuleDirection"
        ethertype:
          $ref: "#/components/schemas/SecurityGroupRuleEthertype"
        protocolName:
          type: string
          enum: [tcp, udp, icmp]
        portRangeMin:
          type: integer
        portRangeMax:
          type: integer
        remoteCIDR:
          type: string
        remoteGroupId:
          type: string
          format: uuid
        description:
          type: string
    AttachSecurityGroupRequest:
      type: object
      required: [vmId]
      properties:
        vmId:
          type: string
          format: uuid
        interfaceId:
          type: string
          format: uuid
          description: The VM NIC; defaults to the VM's first interface.
    UserPublic:
      type: object
      description: The publicly readable projection of a user account.
      required: [username, email, displayName, isSystemAdmin, source]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
        currentOrganizationId:
          type: string
          format: uuid
          description: The organization the user is currently acting in, if any.
        isSystemAdmin:
          type: boolean
        source:
          $ref: "#/components/schemas/UserSource"

    UserSource:
      type: string
      description: >-
        How the account came into existence: created in Strato, provisioned by
        SCIM, or just-in-time provisioned on first OIDC login.
      enum: [local, scim, oidc]

    SelfRegisterUserRequest:
      type: object
      description: Self-registration payload for `POST /api/users/register`.
      required: [username, email, displayName]
      properties:
        username:
          type: string
        email:
          type: string
        displayName:
          type: string

    AdminCreateUserRequest:
      type: object
      description: Admin invitation payload. `role` only applies when `organizationId` is set.
      required: [username, email, displayName]
      properties:
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        isSystemAdmin:
          type: boolean
          default: false
        organizationId:
          type: string
          format: uuid
          description: Optional organization to provision the invitee into up front.
        role:
          type: string
          description: Organization role for `organizationId`.
          enum: [admin, member]
          default: member

    AdminCreateUserResponse:
      type: object
      description: >-
        The created account plus its one-time claim invitation. The token is
        shown exactly once so the admin can hand the link to the invitee.
      required: [user, claimToken, claimUrl]
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        claimToken:
          type: string
        claimUrl:
          type: string
        claimExpiresAt:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      description: Partial update; omitted fields are left unchanged.
      properties:
        username:
          type: string
        displayName:
          type: string
        email:
          type: string

    SessionResponse:
      type: object
      description: The user behind the current session.
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"

    LogoutResponse:
      type: object
      description: >-
        Logout result. `sloUrl` is the IdP's RP-initiated logout URL when the
        session was OIDC-established and the provider supports it.
      properties:
        sloUrl:
          type: string

    ClaimInfoResponse:
      type: object
      description: Describes a passkey-claim invitation without revealing an error for unusable tokens.
      required: [username, displayName, valid, alreadyClaimed, expired]
      properties:
        username:
          type: string
        displayName:
          type: string
        valid:
          type: boolean
        alreadyClaimed:
          type: boolean
        expired:
          type: boolean

    ClaimBeginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: The one-time claim token from the invitation link.

    ClaimFinishRequest:
      type: object
      required: [token, challenge, response]
      properties:
        token:
          type: string
        challenge:
          type: string
          description: The base64url challenge returned by `/auth/claim/begin`.
        response:
          $ref: "#/components/schemas/WebAuthnRegistrationCredential"
        transports:
          type: array
          description: >-
            The authenticator's `getTransports()` values, stored and echoed back
            in later `allowCredentials`/`excludeCredentials` lists. Unrecognized
            values are discarded.
          items:
            type: string

    PasskeyRegistrationBeginRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string

    PasskeyRegistrationBeginResponse:
      type: object
      description: Wraps the WebAuthn `PublicKeyCredentialCreationOptions` for `navigator.credentials.create()`.
      required: [options]
      properties:
        options:
          $ref: "#/components/schemas/WebAuthnCredentialCreationOptions"

    PasskeyRegistrationFinishRequest:
      type: object
      required: [challenge, response]
      properties:
        challenge:
          type: string
          description: The base64url challenge returned by the matching begin call.
        response:
          $ref: "#/components/schemas/WebAuthnRegistrationCredential"
        transports:
          type: array
          description: >-
            The authenticator's `getTransports()` values, stored and echoed back
            in later `allowCredentials`/`excludeCredentials` lists. Unrecognized
            values are discarded.
          items:
            type: string

    PasskeyRegistrationFinishResponse:
      type: object
      description: The enrolled credential; a session cookie is set alongside it.
      required: [credentialID, success]
      properties:
        credentialID:
          type: string
          description: Base64-encoded credential id.
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/UserPublic"

    PasskeyAuthenticationBeginRequest:
      type: object
      description: Omit `username` for a discoverable-credential (usernameless) ceremony.
      properties:
        username:
          type: string

    PasskeyAuthenticationBeginResponse:
      type: object
      description: Wraps the WebAuthn `PublicKeyCredentialRequestOptions` for `navigator.credentials.get()`.
      required: [options]
      properties:
        options:
          $ref: "#/components/schemas/WebAuthnCredentialRequestOptions"

    PasskeyAuthenticationFinishRequest:
      type: object
      required: [challenge, response]
      properties:
        challenge:
          type: string
        response:
          $ref: "#/components/schemas/WebAuthnAuthenticationCredential"

    PasskeyAuthenticationFinishResponse:
      type: object
      required: [user, success]
      properties:
        user:
          $ref: "#/components/schemas/UserPublic"
        success:
          type: boolean

    WebAuthnCredentialCreationOptions:
      type: object
      description: >-
        A WebAuthn `PublicKeyCredentialCreationOptions` structure (relying party,
        user entity, challenge, algorithms, `excludeCredentials`), passed through
        to the browser verbatim.
      additionalProperties: true

    WebAuthnCredentialRequestOptions:
      type: object
      description: >-
        A WebAuthn `PublicKeyCredentialRequestOptions` structure (challenge,
        relying-party id, allow-list), passed through to the browser verbatim.
      additionalProperties: true

    WebAuthnRegistrationCredential:
      type: object
      description: >-
        The authenticator's registration response — the browser's
        `PublicKeyCredential` from `navigator.credentials.create()`, serialized
        with base64url fields.
      additionalProperties: true

    WebAuthnAuthenticationCredential:
      type: object
      description: >-
        The authenticator's assertion — the browser's `PublicKeyCredential` from
        `navigator.credentials.get()`, serialized with base64url fields.
      additionalProperties: true

    PasskeySummary:
      type: object
      description: An enrolled passkey credential, as shown in account settings.
      required: [deviceType, transports, backedUp]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: User-supplied label; null when the client renders a default.
        deviceType:
          type: string
          description: >-
            `multi_device` for a syncable passkey, `single_device` for one bound
            to the authenticator that created it. Refreshed on every sign-in.
        transports:
          type: array
          items:
            type: string
        backedUp:
          type: boolean
          description: >-
            True when the credential is currently backed up to a cloud keychain.
            Refreshed from the authenticator on every sign-in.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    AddPasskeyFinishRequest:
      type: object
      description: Finish payload for the authenticated add-a-passkey ceremony.
      required: [challenge, response]
      properties:
        challenge:
          type: string
        response:
          $ref: "#/components/schemas/WebAuthnRegistrationCredential"
        name:
          type: string
          description: Optional label for the new passkey (max 64 characters).
        transports:
          type: array
          description: >-
            The authenticator's `getTransports()` values, stored and echoed back
            in later `allowCredentials`/`excludeCredentials` lists. Unrecognized
            values are discarded.
          items:
            type: string

    RenamePasskeyRequest:
      type: object
      description: An empty or omitted name clears the label.
      properties:
        name:
          type: string

    APIKeySummary:
      type: object
      description: An API key without its secret.
      required: [name, keyPrefix, scopes, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
          description: The first 12 characters of the key followed by an ellipsis.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/APIKeyScope"
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    APIKeyScope:
      type: string
      description: >-
        Permission scope on an API key, ordered least-to-most privileged:
        `admin` implies `write` implies `read`.
      enum: [read, write, admin]

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          description: Defaults to `["read", "write"]`.
          items:
            $ref: "#/components/schemas/APIKeyScope"
        expiresInDays:
          type: integer
          description: Optional lifetime in days (1–365). Omit for a non-expiring key.
          minimum: 1
          maximum: 365

    CreateAPIKeyResponse:
      type: object
      description: The created key. `key` is the full secret and is returned only here.
      required: [name, key, keyPrefix, scopes]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        key:
          type: string
          description: The full API key — shown once and never retrievable again.
        keyPrefix:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/APIKeyScope"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    UpdateAPIKeyRequest:
      type: object
      description: Partial update; omitted fields are left unchanged.
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/APIKeyScope"
        isActive:
          type: boolean

    DeviceAuthorizationRequest:
      type: object
      description: RFC 8628 §3.1 device authorization request.
      properties:
        client_name:
          type: string
          description: Human-readable client label shown on the approval page. Defaults to "Strato CLI".
        scope:
          type: string
          description: Space-delimited scopes. Defaults to "read write".

    DeviceAuthorizationResponse:
      type: object
      description: RFC 8628 §3.2 device authorization response (OAuth snake_case field names).
      required: [device_code, user_code, verification_uri, verification_uri_complete, expires_in, interval]
      properties:
        device_code:
          type: string
        user_code:
          type: string
        verification_uri:
          type: string
        verification_uri_complete:
          type: string
        expires_in:
          type: integer
        interval:
          type: integer
          description: Minimum seconds between polls of `/oauth/token`.

    OAuthTokenRequest:
      type: object
      description: RFC 6749 §4 / RFC 8628 §3.4 token request.
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum: ["urn:ietf:params:oauth:grant-type:device_code", refresh_token]
        device_code:
          type: string
          description: Required for the device-code grant.
        refresh_token:
          type: string
          description: Required for the refresh-token grant.

    OAuthTokenResponse:
      type: object
      description: RFC 6749 §5.1 token response.
      required: [access_token, token_type, expires_in, refresh_token, scope]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
        scope:
          type: string
          description: Space-delimited granted scopes.

    OAuthRevokeRequest:
      type: object
      description: RFC 7009 revocation request.
      required: [token]
      properties:
        token:
          type: string
          description: An access or refresh token.

    OAuthErrorResponse:
      type: object
      description: >-
        RFC 6749 §5.2 / RFC 8628 §3.5 error body. Distinct from the platform
        `Error` envelope: the `/oauth/*` endpoints return this shape so the
        polling CLI can dispatch on the machine-readable `error` code.
      required: [error]
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_grant
            - invalid_scope
            - unsupported_grant_type
            - authorization_pending
            - slow_down
            - access_denied
            - expired_token
        error_description:
          type: string

    PendingDeviceAuthorization:
      type: object
      description: A device authorization awaiting approval, shown on the `/activate` page.
      required: [userCode, clientName, scopes, expiresAt]
      properties:
        userCode:
          type: string
        clientName:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/APIKeyScope"
        requestIP:
          type: string
          description: The client IP that started the device flow.
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    CLISessionSummary:
      type: object
      description: An active CLI session minted through the device grant.
      required: [clientName, scopes, accessTokenPrefix, refreshTokenExpiresAt]
      properties:
        id:
          type: string
          format: uuid
        clientName:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/APIKeyScope"
        accessTokenPrefix:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        lastUsedIP:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
    OrganizationDetail:
      type: object
      description: An organization, optionally annotated with the caller's role in it.
      required: [name, description]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        userRole:
          type: string
          nullable: true
          description: The caller's role in this organization, or null when the caller is not a member.

    CreateOrganizationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Globally unique organization name.
        description:
          type: string
          description: Optional; defaults to an empty string when omitted.

    UpdateOrganizationRequest:
      type: object
      description: Omitted fields are left unchanged.
      properties:
        name:
          type: string
        description:
          type: string

    OrganizationMember:
      type: object
      required: [username, displayName, email, role]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          type: string
        joinedAt:
          type: string
          format: date-time

    AddOrganizationMemberRequest:
      type: object
      required: [userEmail, role]
      properties:
        userEmail:
          type: string
          description: Email address of an existing user to add.
        role:
          type: string
          description: The organization role to grant (`admin` grants an admin role binding).

    UpdateOrganizationMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string

    FolderDetail:
      type: object
      description: A folder (an `OrganizationalUnit` on the wire) within an organization's hierarchy.
      required: [name, description, organizationId, path, depth]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        organizationId:
          type: string
          format: uuid
        parentOuId:
          type: string
          format: uuid
          nullable: true
        path:
          type: string
          description: Materialized ancestor path.
        depth:
          type: integer
          description: Nesting depth; 0 for a top-level folder.
        createdAt:
          type: string
          format: date-time
        childOuCount:
          type: integer
          nullable: true
        projectCount:
          type: integer
          nullable: true

    CreateFolderRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        parentOuId:
          type: string
          format: uuid
          nullable: true
          description: Parent folder; omit for a top-level folder. Ignored by the child-folder endpoint.

    UpdateFolderRequest:
      type: object
      description: Omitted fields are left unchanged.
      properties:
        name:
          type: string
        description:
          type: string

    MoveFolderRequest:
      type: object
      properties:
        newParentOuId:
          type: string
          format: uuid
          nullable: true
          description: The new parent folder, or null to move the folder to the top level.

    FolderTreeNode:
      type: object
      description: A folder and its descendants.
      required: [name, description, path, depth, projectCount, children]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        path:
          type: string
        depth:
          type: integer
        projectCount:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/FolderTreeNode"

    GroupDetail:
      type: object
      required: [name, description, organizationId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        organizationId:
          type: string
          format: uuid
        memberCount:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateGroupRequest:
      type: object
      description: Omitted fields are left unchanged.
      properties:
        name:
          type: string
        description:
          type: string

    GroupMember:
      type: object
      required: [username, displayName, email]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        joinedAt:
          type: string
          format: date-time

    GroupMembershipChangeRequest:
      type: object
      required: [userIds]
      properties:
        userIds:
          type: array
          items:
            type: string
            format: uuid

    OrganizationHierarchy:
      type: object
      required: [organization, stats]
      properties:
        organization:
          $ref: "#/components/schemas/HierarchyOrganizationNode"
        stats:
          $ref: "#/components/schemas/HierarchyStats"

    HierarchyOrganizationNode:
      type: object
      required: [id, name, description, organizationalUnits, projects, quotas]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        organizationalUnits:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyFolderNode"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyProjectNode"
        quotas:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyQuota"

    HierarchyFolderNode:
      type: object
      description: A folder node in the hierarchy tree.
      required: [id, name, description, path, depth, childOUs, projects, quotas]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        path:
          type: string
        depth:
          type: integer
        childOUs:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyFolderNode"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyProjectNode"
        quotas:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyQuota"

    HierarchyProjectNode:
      type: object
      required: [id, name, description, path, environments, defaultEnvironment, vms, quotas]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        path:
          type: string
        environments:
          type: array
          items:
            type: string
        defaultEnvironment:
          type: string
        vms:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyVMSummary"
        quotas:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyQuota"

    HierarchyVMSummary:
      type: object
      required: [id, name, environment, status, cpu, memoryGB, diskGB]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        environment:
          type: string
        status:
          type: string
        cpu:
          type: integer
        memoryGB:
          type: number
          format: double
        diskGB:
          type: number
          format: double

    HierarchyVM:
      type: object
      description: A VM as returned by the organization resource listing (memory and disk in bytes).
      required: [id, name, description, environment, status, cpu, memory, disk, projectId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        environment:
          type: string
        status:
          type: string
        cpu:
          type: integer
        memory:
          type: integer
          format: int64
        disk:
          type: integer
          format: int64
        projectId:
          type: string
          format: uuid

    HierarchyProject:
      type: object
      description: A project as returned by the organization resource listing.
      required: [name, description, path, defaultEnvironment, environments]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
        path:
          type: string
        defaultEnvironment:
          type: string
        environments:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        vmCount:
          type: integer
          nullable: true
        quotas:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/HierarchyQuota"

    HierarchyQuota:
      type: object
      description: A resource quota attached to an organization, folder, or project.
      required: [name, entityType, entityId, isEnabled, limits, usage, utilization]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        entityType:
          type: string
          enum: [organization, ou, project, unknown]
        entityId:
          type: string
          format: uuid
        environment:
          type: string
          nullable: true
        isEnabled:
          type: boolean
        limits:
          type: object
          required: [maxVCPUs, maxMemoryGB, maxStorageGB, maxVMs, maxSandboxes, maxNetworks]
          properties:
            maxVCPUs:
              type: integer
            maxMemoryGB:
              type: number
              format: double
            maxStorageGB:
              type: number
              format: double
            maxVMs:
              type: integer
            maxSandboxes:
              type: integer
            maxNetworks:
              type: integer
        usage:
          type: object
          required: [reservedVCPUs, reservedMemoryGB, reservedStorageGB, vmCount, sandboxCount, networkCount]
          properties:
            reservedVCPUs:
              type: integer
            reservedMemoryGB:
              type: number
              format: double
            reservedStorageGB:
              type: number
              format: double
            vmCount:
              type: integer
            sandboxCount:
              type: integer
            networkCount:
              type: integer
        utilization:
          type: object
          required: [cpuPercent, memoryPercent, storagePercent, vmPercent, sandboxPercent]
          properties:
            cpuPercent:
              type: number
              format: double
            memoryPercent:
              type: number
              format: double
            storagePercent:
              type: number
              format: double
            vmPercent:
              type: number
              format: double
            sandboxPercent:
              type: number
              format: double
        createdAt:
          type: string
          format: date-time

    HierarchyResourceUsage:
      type: object
      description: Aggregate resource consumption across a hierarchy node.
      required: [totalVCPUs, totalMemoryGB, totalStorageGB, totalVMs]
      properties:
        totalVCPUs:
          type: integer
        totalMemoryGB:
          type: number
          format: double
        totalStorageGB:
          type: number
          format: double
        totalVMs:
          type: integer

    HierarchyStats:
      type: object
      required: [totalOUs, totalProjects, totalVMs, totalQuotas, maxDepth, resourceUtilization]
      properties:
        totalOUs:
          type: integer
        totalProjects:
          type: integer
        totalVMs:
          type: integer
        totalQuotas:
          type: integer
        maxDepth:
          type: integer
        resourceUtilization:
          $ref: "#/components/schemas/HierarchyResourceUsage"

    OrganizationResources:
      type: object
      required: [organizationId, organizationName, organizationalUnits, projects, vms, quotas, summary]
      properties:
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        organizationalUnits:
          type: array
          items:
            $ref: "#/components/schemas/FolderDetail"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyProject"
        vms:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyVM"
        quotas:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyQuota"
        summary:
          $ref: "#/components/schemas/OrganizationResourceCounts"

    OrganizationResourceCounts:
      type: object
      required: [totalOUs, totalProjects, totalVMs, totalQuotas, vmsByEnvironment, vmsByStatus, vmsByProject]
      properties:
        totalOUs:
          type: integer
        totalProjects:
          type: integer
        totalVMs:
          type: integer
        totalQuotas:
          type: integer
        vmsByEnvironment:
          type: object
          additionalProperties:
            type: integer
        vmsByStatus:
          type: object
          additionalProperties:
            type: integer
        vmsByProject:
          type: object
          description: VM counts keyed by project name.
          additionalProperties:
            type: integer

    OrganizationResourceSummary:
      type: object
      required: [organizationId, organizationName, resourceUsage, quotaCompliance, hierarchyStats]
      properties:
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        resourceUsage:
          $ref: "#/components/schemas/HierarchyResourceUsage"
        quotaCompliance:
          type: array
          items:
            $ref: "#/components/schemas/QuotaComplianceInfo"
        hierarchyStats:
          $ref: "#/components/schemas/HierarchyStats"

    QuotaComplianceInfo:
      type: object
      required: [quotaId, quotaName, scope, cpuCompliance, memoryCompliance, vmCompliance, isEnabled]
      properties:
        quotaId:
          type: string
          format: uuid
        quotaName:
          type: string
        scope:
          type: string
        environment:
          type: string
          nullable: true
        cpuCompliance:
          $ref: "#/components/schemas/QuotaComplianceDetail"
        memoryCompliance:
          $ref: "#/components/schemas/QuotaComplianceDetail"
        vmCompliance:
          $ref: "#/components/schemas/QuotaComplianceDetail"
        isEnabled:
          type: boolean

    QuotaComplianceDetail:
      type: object
      required: [used, limit, percentage]
      properties:
        used:
          type: integer
        limit:
          type: integer
        percentage:
          type: number
          format: double

    HierarchySearchResults:
      type: object
      required: [query, results, totalResults]
      properties:
        query:
          type: string
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: The organization searched, or null for a global search.
        results:
          type: array
          items:
            $ref: "#/components/schemas/HierarchySearchResult"
        totalResults:
          type: integer

    HierarchySearchResult:
      type: object
      required: [id, name, type, path, description]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        path:
          type: string
        description:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        parentType:
          type: string
          nullable: true

    EntityPath:
      type: object
      required: [entityId, entityType, organizationId, pathComponents]
      properties:
        entityId:
          type: string
          format: uuid
        entityType:
          type: string
        organizationId:
          type: string
          format: uuid
        pathComponents:
          type: array
          description: Ordered ancestors, outermost first.
          items:
            $ref: "#/components/schemas/EntityPathComponent"

    EntityPathComponent:
      type: object
      required: [id, name, type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string

    MergeOrganizationsRequest:
      type: object
      required: [sourceOrganizationId, conflictResolution, preserveQuotas, mergeUsers]
      properties:
        sourceOrganizationId:
          type: string
          format: uuid
          description: The organization to merge into the one named in the path.
        conflictResolution:
          type: object
          required: [ouNameConflicts, projectNameConflicts, quotaConflicts, namingStrategy]
          properties:
            ouNameConflicts:
              type: string
              enum: [rename, merge, abort]
            projectNameConflicts:
              type: string
              enum: [rename, merge, abort]
            quotaConflicts:
              type: string
              enum: [sum, max, keep_target, abort]
            namingStrategy:
              type: string
              enum: [prefix_source, suffix_source, manual]
            prefix:
              type: string
              nullable: true
            suffix:
              type: string
              nullable: true
        preserveQuotas:
          type: boolean
        mergeUsers:
          type: boolean
        newName:
          type: string
          nullable: true
          description: Optional new name for the target organization after the merge.

    MergeOrganizationsResult:
      type: object
      required: [success, targetOrganizationId, mergedResourceCounts, conflicts, warnings, summary]
      properties:
        success:
          type: boolean
        targetOrganizationId:
          type: string
          format: uuid
        mergedResourceCounts:
          type: object
          required: [organizationalUnits, projects, vms, quotas, users]
          properties:
            organizationalUnits:
              type: integer
            projects:
              type: integer
            vms:
              type: integer
            quotas:
              type: integer
            users:
              type: integer
        conflicts:
          type: array
          items:
            type: object
            required: [type, sourceName, targetName, resolution]
            properties:
              type:
                type: string
                description: The conflicting entity kind (`ou_name`, `project_name`, `quota_name`).
              sourceName:
                type: string
              targetName:
                type: string
              resolution:
                type: string
              newName:
                type: string
                nullable: true
        warnings:
          type: array
          items:
            type: string
        summary:
          type: string

    BulkTransferRequest:
      type: object
      required: [transfers, validateOnly]
      properties:
        transfers:
          type: array
          items:
            type: object
            required: [resourceType, resourceId, destinationType, destinationId]
            properties:
              resourceType:
                type: string
                enum: [ou, project, vm]
              resourceId:
                type: string
                format: uuid
              destinationType:
                type: string
                enum: [organization, ou, project]
              destinationId:
                type: string
                format: uuid
              newName:
                type: string
                nullable: true
        validateOnly:
          type: boolean
          description: Validate the transfers without applying them.

    BulkTransferResult:
      type: object
      required: [success, transferredCount, failedTransfers, warnings, summary]
      properties:
        success:
          type: boolean
        transferredCount:
          type: integer
        failedTransfers:
          type: array
          items:
            type: object
            required: [resourceId, resourceType, reason]
            properties:
              resourceId:
                type: string
                format: uuid
              resourceType:
                type: string
              reason:
                type: string
              suggestion:
                type: string
                nullable: true
        warnings:
          type: array
          items:
            type: string
        summary:
          type: string

    HierarchyValidationReport:
      type: object
      required: [isValid, issues, summary]
      properties:
        isValid:
          type: boolean
        issues:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyIssue"
        summary:
          type: object
          required: [totalIssues, criticalIssues, warningIssues, infoIssues]
          properties:
            totalIssues:
              type: integer
            criticalIssues:
              type: integer
            warningIssues:
              type: integer
            infoIssues:
              type: integer

    HierarchyIssue:
      type: object
      required: [id, type, severity, entityType, entityId, entityName, description, autoRepairable]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [circular_reference, broken_path, orphaned_resource, quota_violation]
        severity:
          type: string
          enum: [critical, warning, info]
        entityType:
          type: string
          enum: [ou, project, vm, quota]
        entityId:
          type: string
          format: uuid
        entityName:
          type: string
        description:
          type: string
        suggestedFix:
          type: string
          nullable: true
        autoRepairable:
          type: boolean

    HierarchyRepairRequest:
      type: object
      required: [repairAll, repairOptions]
      properties:
        repairAll:
          type: boolean
        specificIssues:
          type: array
          nullable: true
          description: Issue ids to repair when `repairAll` is false.
          items:
            type: string
            format: uuid
        repairOptions:
          type: object
          required: [fixCircularReferences, rebuildPaths, removeOrphanedResources, adjustQuotas, createMissingDefaults]
          properties:
            fixCircularReferences:
              type: boolean
            rebuildPaths:
              type: boolean
            removeOrphanedResources:
              type: boolean
            adjustQuotas:
              type: boolean
            createMissingDefaults:
              type: boolean

    HierarchyRepairReport:
      type: object
      required: [success, repairedIssues, remainingIssues, summary]
      properties:
        success:
          type: boolean
        repairedIssues:
          type: array
          items:
            type: object
            required: [issueId, issueType, action, details]
            properties:
              issueId:
                type: string
                format: uuid
              issueType:
                type: string
              action:
                type: string
              details:
                type: string
        remainingIssues:
          type: array
          items:
            $ref: "#/components/schemas/HierarchyIssue"
        summary:
          type: string
    ProjectSummary:
      type: object
      description: >-
        A project in the organization hierarchy. Exactly one of
        `organizationId` / `organizationalUnitId` is set, naming the immediate
        parent.
      required: [id, name, description, path, defaultEnvironment, environments]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Set when the project hangs directly off an organization.
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
          description: Set when the project hangs off a folder (organizational unit).
        path:
          type: string
          description: Materialized hierarchy path.
        defaultEnvironment:
          type: string
        environments:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        vmCount:
          type: integer
          nullable: true

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/ProjectSummary"
        - type: object
          description: A project, optionally with its attached resource quotas.
          properties:
            quotas:
              type: array
              nullable: true
              description: Present on single-project reads; omitted from list responses.
              items:
                $ref: "#/components/schemas/ResourceQuota"

    CreateProjectRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Must be omitted when creating directly in an organization; the
            folder-scoped endpoint takes the folder from the path.
        defaultEnvironment:
          type: string
          description: Defaults to `development`; must appear in `environments`.
        environments:
          type: array
          description: Defaults to the standard environment set.
          items:
            type: string

    UpdateProjectRequest:
      type: object
      description: Every field is optional; omitted fields are left unchanged.
      properties:
        name:
          type: string
        description:
          type: string
        defaultEnvironment:
          type: string
        environments:
          type: array
          items:
            type: string

    TransferProjectRequest:
      type: object
      description: >-
        The destination. Supply `organizationalUnitId` to move into a folder, or
        `organizationId` to move directly under an organization.
      properties:
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true

    ProjectEnvironmentRequest:
      type: object
      required: [environment]
      properties:
        environment:
          type: string

    ProjectStats:
      type: object
      required: [totalVMs, vmsByEnvironment, resourceUsage]
      properties:
        totalVMs:
          type: integer
        vmsByEnvironment:
          type: object
          additionalProperties:
            type: integer
        resourceUsage:
          $ref: "#/components/schemas/ProjectResourceUsage"

    ProjectResourceUsage:
      type: object
      description: Aggregate resources consumed by the project's VMs.
      required: [totalVCPUs, totalMemoryGB, totalStorageGB, totalVMs]
      properties:
        totalVCPUs:
          type: integer
        totalMemoryGB:
          type: number
          format: double
        totalStorageGB:
          type: number
          format: double
        totalVMs:
          type: integer

    ProjectPath:
      type: object
      required: [projectId, path, components]
      properties:
        projectId:
          type: string
          format: uuid
        path:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/ProjectPathComponent"

    ProjectPathComponent:
      type: object
      description: One named ancestor (or the project itself) in the hierarchy path.
      required: [id, name, type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [organization, organizational_unit, project]

    ProjectMembers:
      type: object
      description: A project's user role grants and group role grants.
      required: [users, groups]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/ProjectMember"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ProjectGroupGrant"

    ProjectMember:
      type: object
      required: [username, displayName, email, role, external]
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
        joinedAt:
          type: string
          format: date-time
        external:
          type: boolean
          description: >-
            The user is not a member of the project's organization — a
            cross-org grant, which UIs should render prominently.

    ProjectGroupGrant:
      type: object
      required: [name, role, external]
      properties:
        groupId:
          type: string
          format: uuid
        name:
          type: string
        role:
          $ref: "#/components/schemas/ProjectRole"
        grantedAt:
          type: string
          format: date-time
        external:
          type: boolean
          description: >-
            The group belongs to another organization — a cross-org grant,
            which UIs should render prominently.

    ProjectRole:
      type: string
      description: A role grant on a project.
      enum: [admin, member, viewer]

    GrantProjectMemberRequest:
      type: object
      description: Identify the user by `userID` or `userEmail`; supply exactly one.
      required: [role]
      properties:
        userEmail:
          type: string
        userID:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ProjectRole"

    UpdateProjectMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/ProjectRole"

    GrantProjectGroupRequest:
      type: object
      required: [groupID, role]
      properties:
        groupID:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ProjectRole"

    SeededRoleName:
      type: string
      description: A seeded IAM role. Each role implies the ones below it.
      enum: [viewer, operator, editor, admin]

    ServiceAccount:
      type: object
      description: >-
        A project-scoped machine principal (issue #491). Workloads
        authenticate as it via registered SPIFFE identities; its access is
        exactly its role bindings.
      required: [id, name, description, projectId, projectRoles]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        projectId:
          type: string
          format: uuid
        projectRoles:
          type: array
          description: >-
            The seeded roles the account holds on its project (normally zero
            or one). Custom-role bindings are omitted here; the who-can API
            reports them.
          items:
            $ref: "#/components/schemas/SeededRoleName"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateServiceAccountRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Unique within the project. 1-128 characters.
        description:
          type: string

    UpdateServiceAccountRequest:
      type: object
      properties:
        description:
          type: string

    SetSeededRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/SeededRoleName"

    WorkloadRegistration:
      type: object
      description: >-
        One workload-registry row: a SPIFFE identity and the principal it
        names. The SPIFFE ID is a lookup key only — nothing is ever parsed
        out of an SVID.
      required: [id, spiffeId, kind]
      properties:
        id:
          type: string
          format: uuid
        spiffeId:
          type: string
          description: The full SPIFFE URI, unique across the registry.
        kind:
          type: string
          enum: [agent, service_account, workload]
        agentName:
          type: string
          description: For `agent` registrations, the agent's name.
        serviceAccountId:
          type: string
          format: uuid
          description: For `service_account` registrations, the account.
        organizationId:
          type: string
          format: uuid
          description: >-
            For `workload` registrations, the organization the registration
            is scoped to (administrative scoping only — it grants nothing).
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateServiceAccountRegistrationRequest:
      type: object
      required: [spiffeId]
      properties:
        spiffeId:
          type: string
          description: A SPIFFE URI (`spiffe://<trust-domain>/<path>`).

    CreateWorkloadRegistrationRequest:
      type: object
      required: [spiffeId, organizationId]
      properties:
        spiffeId:
          type: string
          description: A SPIFFE URI (`spiffe://<trust-domain>/<path>`).
        organizationId:
          type: string
          format: uuid
        displayName:
          type: string

    RegistryPullSecret:
      type: object
      description: >-
        A project's credential for a private OCI registry. The secret value is
        write-only and never appears in a response.
      required: [registry, username]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        registry:
          type: string
          description: Normalized registry host, e.g. `ghcr.io`.
        username:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRegistryPullSecretRequest:
      type: object
      required: [registry, username, secret]
      properties:
        registry:
          type: string
          description: Registry host, e.g. `ghcr.io`. Normalized before storage.
        username:
          type: string
        secret:
          type: string
          description: Write-only; encrypted at rest.

    UpdateRegistryPullSecretRequest:
      type: object
      description: Omitted fields keep their stored value.
      properties:
        username:
          type: string
        secret:
          type: string
          description: Write-only replacement secret.

    ResourceQuota:
      type: object
      description: >-
        A resource limit attached at one level of the hierarchy. `entityType` /
        `entityId` name the scope; `environment` narrows a project quota to one
        deployment environment.
      required: [name, entityType, entityId, isEnabled, limits, usage, utilization]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        entityType:
          type: string
          description: >-
            The scope the quota attaches to. `unknown` indicates a scopeless
            (corrupt) row, which only system admins may read or mutate.
          enum: [organization, ou, project, unknown]
        entityId:
          type: string
          format: uuid
        environment:
          type: string
          nullable: true
        isEnabled:
          type: boolean
        limits:
          $ref: "#/components/schemas/ResourceQuotaLimits"
        usage:
          $ref: "#/components/schemas/ResourceQuotaUsage"
        utilization:
          $ref: "#/components/schemas/ResourceQuotaUtilization"
        createdAt:
          type: string
          format: date-time

    ResourceQuotaLimits:
      type: object
      required: [maxVCPUs, maxMemoryGB, maxStorageGB, maxVMs, maxSandboxes, maxNetworks]
      properties:
        maxVCPUs:
          type: integer
        maxMemoryGB:
          type: number
          format: double
        maxStorageGB:
          type: number
          format: double
        maxVMs:
          type: integer
        maxSandboxes:
          type: integer
        maxNetworks:
          type: integer

    ResourceQuotaUsage:
      type: object
      description: Reservations the control plane holds against the quota.
      required: [reservedVCPUs, reservedMemoryGB, reservedStorageGB, vmCount, sandboxCount, networkCount]
      properties:
        reservedVCPUs:
          type: integer
        reservedMemoryGB:
          type: number
          format: double
        reservedStorageGB:
          type: number
          format: double
        vmCount:
          type: integer
        sandboxCount:
          type: integer
        networkCount:
          type: integer

    ResourceQuotaUtilization:
      type: object
      description: Reserved amounts as a percentage of each limit.
      required: [cpuPercent, memoryPercent, storagePercent, vmPercent, sandboxPercent]
      properties:
        cpuPercent:
          type: number
          format: double
        memoryPercent:
          type: number
          format: double
        storagePercent:
          type: number
          format: double
        vmPercent:
          type: number
          format: double
        sandboxPercent:
          type: number
          format: double

    CreateResourceQuotaRequest:
      type: object
      required: [name, maxVCPUs, maxMemoryGB, maxStorageGB, maxVMs]
      properties:
        name:
          type: string
        maxVCPUs:
          type: integer
        maxMemoryGB:
          type: number
          format: double
        maxStorageGB:
          type: number
          format: double
        maxVMs:
          type: integer
        maxSandboxes:
          type: integer
          description: Defaults to `maxVMs` when omitted.
        maxNetworks:
          type: integer
          description: Defaults to 10.
        environment:
          type: string
          description: >-
            Project quotas only — narrows the quota to one of the project's
            deployment environments.
        isEnabled:
          type: boolean
          description: Defaults to true.

    UpdateResourceQuotaRequest:
      type: object
      description: >-
        Every field is optional. A limit below the current reservation or count
        is rejected.
      properties:
        name:
          type: string
        maxVCPUs:
          type: integer
        maxMemoryGB:
          type: number
          format: double
        maxStorageGB:
          type: number
          format: double
        maxVMs:
          type: integer
        maxSandboxes:
          type: integer
        maxNetworks:
          type: integer
        isEnabled:
          type: boolean

    QuotaUsage:
      type: object
      description: >-
        A quota's limits alongside both its bookkeeping reservations and usage
        recomputed from the VMs currently in scope.
      required: [quotaId, quotaName, limits, reserved, actual, utilization, vmsByEnvironment, vmsByStatus, isEnabled]
      properties:
        quotaId:
          type: string
          format: uuid
        quotaName:
          type: string
        limits:
          $ref: "#/components/schemas/ResourceQuotaLimits"
        reserved:
          $ref: "#/components/schemas/QuotaUsageCounts"
        actual:
          $ref: "#/components/schemas/QuotaUsageCounts"
        utilization:
          $ref: "#/components/schemas/ResourceQuotaUtilization"
        vmsByEnvironment:
          type: object
          additionalProperties:
            type: integer
        vmsByStatus:
          type: object
          additionalProperties:
            type: integer
        isEnabled:
          type: boolean
        environment:
          type: string
          nullable: true

    QuotaUsageCounts:
      type: object
      required: [vcpus, memoryGB, storageGB, vms, sandboxes, networks]
      properties:
        vcpus:
          type: integer
        memoryGB:
          type: number
          format: double
        storageGB:
          type: number
          format: double
        vms:
          type: integer
        sandboxes:
          type: integer
        networks:
          type: integer
    AgentDetail:
      type: object
      description: A registered hypervisor node.
      required:
        - id
        - name
        - hostname
        - version
        - capabilities
        - status
        - resources
        - hypervisors
        - sandboxCapable
        - tpmCapable
        - isOnline
        - updateAvailable
        - autoUpdate
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Unique agent name; also its SPIFFE identity's path segment.
        hostname:
          type: string
        version:
          type: string
          description: The agent build currently running on the node.
        capabilities:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/AgentStatus"
        resources:
          $ref: "#/components/schemas/AgentResources"
        architecture:
          $ref: "#/components/schemas/AgentCPUArchitecture"
        operatingSystem:
          $ref: "#/components/schemas/AgentOperatingSystem"
        hypervisors:
          type: array
          items:
            $ref: "#/components/schemas/AgentHypervisorSupport"
        networkCapability:
          $ref: "#/components/schemas/AgentNetworkCapability"
        sandboxCapable:
          type: boolean
        tpmCapable:
          type: boolean
          description: >-
            Whether this node can back a guest TPM 2.0 (it advertised a usable
            swtpm at its last registration). VMs requesting `tpm` only place on
            such nodes.
        hostInfo:
          $ref: "#/components/schemas/AgentHostInfo"
        siteId:
          type: string
          format: uuid
          nullable: true
          description: The site (OVN deployment) this agent belongs to, if any.
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
          description: Folder scope; mutually exclusive with `organizationId`.
        lastHeartbeat:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        isOnline:
          type: boolean
        targetVersion:
          type: string
          nullable: true
          description: >-
            The version this deployment expects agents to run; null when no
            meaningful target is configured (dev builds).
        updateAvailable:
          type: boolean
        autoUpdate:
          type: boolean
          description: Whether the agent is enrolled in declarative auto-update.
        updateDesiredVersion:
          type: string
          nullable: true
          description: >-
            The version the fleet rollout has assigned this agent while it
            converges; null once converged or never assigned.
        updateAttemptedAt:
          type: string
          format: date-time
          nullable: true
        updateBlockedReason:
          type: string
          nullable: true
          description: The agent's self-reported reason for not converging yet.
        updateFailureReason:
          type: string
          nullable: true
          description: Terminal failure that halted the rollout at this agent.

    AgentStatus:
      type: string
      description: Connection state of an agent, derived from its last heartbeat.
      enum: [online, offline, connecting, error]

    AgentResources:
      type: object
      description: Capacity reported by the agent host.
      required:
        - totalCPU
        - availableCPU
        - totalMemory
        - availableMemory
        - totalDisk
        - availableDisk
      properties:
        totalCPU:
          type: integer
          description: Total vCPUs on the host.
        availableCPU:
          type: integer
        totalMemory:
          type: integer
          format: int64
          description: Bytes.
        availableMemory:
          type: integer
          format: int64
        totalDisk:
          type: integer
          format: int64
          description: Bytes.
        availableDisk:
          type: integer
          format: int64

    AgentCPUArchitecture:
      type: string
      description: CPU architecture of a hypervisor host.
      enum: [x86_64, arm64]

    AgentOperatingSystem:
      type: string
      description: Operating system of a hypervisor host.
      enum: [linux, macos]

    AgentNetworkCapability:
      type: string
      description: >-
        Networking capability of an agent host. `overlay` is OVN/OVS (inter-VM
        traffic, isolation, inbound); `user_mode` is SLIRP outbound NAT only.
      enum: [overlay, user_mode]

    AgentHypervisorType:
      type: string
      description: A hypervisor backend an agent can run VMs on.
      enum: [qemu, firecracker]

    AgentHypervisorSupport:
      type: object
      description: One hypervisor on an agent host, as probed at agent startup.
      required: [type, available, accelerated, capabilities]
      properties:
        type:
          $ref: "#/components/schemas/AgentHypervisorType"
        available:
          type: boolean
          description: Whether the hypervisor is usable on this host right now.
        accelerated:
          type: boolean
          description: Whether hardware acceleration (KVM/HVF) backs this hypervisor.
        unavailabilityReason:
          type: string
          nullable: true
        capabilities:
          $ref: "#/components/schemas/AgentHypervisorCapabilities"
        version:
          type: string
          nullable: true
          description: >-
            The hypervisor binary's probed version; null for agents predating
            version probing or when the probe failed.

    AgentHypervisorCapabilities:
      type: object
      description: Feature support of one hypervisor backend.
      required:
        - type
        - supportsPause
        - supportsLiveMigration
        - supportsSnapshots
        - requiresDirectKernelBoot
        - maxVCPUs
        - maxMemory
      properties:
        type:
          $ref: "#/components/schemas/AgentHypervisorType"
        supportsPause:
          type: boolean
        supportsLiveMigration:
          type: boolean
        supportsSnapshots:
          type: boolean
        requiresDirectKernelBoot:
          type: boolean
          description: Whether booting requires an explicit kernel + rootfs.
        maxVCPUs:
          type: integer
        maxMemory:
          type: integer
          format: int64
          description: Bytes.

    AgentHostInfo:
      type: object
      description: >-
        Descriptive hardware/platform details for operator display. Purely
        informational, best-effort, and every field may be absent.
      properties:
        osName:
          type: string
          nullable: true
          description: OS product/distribution name including version.
        kernelVersion:
          type: string
          nullable: true
        cpuModel:
          type: string
          nullable: true
        cpuVendor:
          type: string
          nullable: true
        physicalCoreCount:
          type: integer
          nullable: true
        logicalCoreCount:
          type: integer
          nullable: true
        totalMemoryBytes:
          type: integer
          format: int64
          nullable: true
        machineModel:
          type: string
          nullable: true
        bootTime:
          type: string
          format: date-time
          nullable: true

    UpdateAgentRequest:
      type: object
      description: Mutable agent properties.
      properties:
        autoUpdate:
          type: boolean
          description: Enroll in (or withdraw from) declarative auto-update.

    ReassignAgentOrganizationRequest:
      type: object
      description: >-
        The agent's new owning scope. Exactly one of `organizationId` or
        `organizationalUnitId` is required.
      properties:
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true

    AgentUpdateRequest:
      type: object
      description: >-
        Optional overrides for an operator-triggered agent self-update. With no
        body at all, the agent updates to the configured target version along
        the release path.
      properties:
        force:
          type: boolean
          description: >-
            Proceed despite caveats that would otherwise be refused: hosted
            sandboxes, or an agent already at the target version.
        artifactUrl:
          type: string
          description: >-
            Explicit artifact override for deployments the URL-convention
            resolver cannot serve. Requires `sha256`, and system admin.
        sha256:
          type: string
          description: Hex SHA-256 of the artifact at `artifactUrl`.
        artifactKind:
          $ref: "#/components/schemas/AgentUpdateArtifactKind"
        tarballMember:
          type: string
          description: >-
            Member to extract from an explicit tarball artifact. Defaults to
            `strato-agent`.
        targetVersion:
          type: string
          description: >-
            Informational version label for an explicit artifact; defaults to
            the configured target.

    AgentUpdateArtifactKind:
      type: string
      description: >-
        Shape of an explicit update artifact. `tarball` extracts
        `tarballMember`; `binary` means the download is the agent executable.
        Ignored without `artifactUrl`.
      enum: [tarball, binary]

    AgentUpdateResult:
      type: object
      description: Outcome the agent reported for a dispatched update.
      required: [status, targetVersion, artifactUrl]
      properties:
        status:
          type: string
          description: Always `updating` on success.
        targetVersion:
          type: string
        artifactUrl:
          type: string
          description: >-
            The artifact URL with query and userinfo stripped — an override may
            resolve to a presigned URL whose query string is a credential.
        message:
          type: string
          nullable: true

    CreateAgentEnrollmentRequest:
      type: object
      description: >-
        A node enrollment. Exactly one of `organizationId` or
        `organizationalUnitId` is required — that scope is the capacity the
        registering agent becomes dedicated to. A `siteId` is also required:
        every enrolled agent joins an availability zone.
      required: [agentName, siteId]
      properties:
        agentName:
          type: string
          maxLength: 100
          pattern: "^[A-Za-z0-9._-]+$"
          description: >-
            Unique agent name, restricted to characters SPIRE accepts in a
            SPIFFE ID path segment.
        expirationHours:
          type: integer
          minimum: 1
          maximum: 168
          default: 1
          description: Lifetime of the enrollment and its SPIRE join token.
        siteId:
          type: string
          format: uuid
          description: >-
            Site (availability zone) the agent joins on registration. Required.
            Must belong to a scope containing the enrollment's, and the caller
            needs `manage` on it.
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true

    AgentEnrollmentDetail:
      type: object
      description: >-
        A newly created enrollment. Returned only from the create endpoint,
        because it carries one-time SPIRE node-attestation material.
      required: [id, agentName, spiffeId, expiresAt, spire, bootstrapCommand]
      properties:
        id:
          type: string
          format: uuid
        agentName:
          type: string
        spiffeId:
          type: string
        expiresAt:
          type: string
          format: date-time
        spire:
          $ref: "#/components/schemas/SPIREProvisioning"
        bootstrapCommand:
          type: string
          description: >-
            Copy-paste one-liner that installs strato-agent and spire-agent,
            attests the node with the join token, and points it at this control
            plane's mTLS listener.

    SPIREProvisioning:
      type: object
      description: >-
        SPIRE material handed back once, at enrollment creation. `joinToken` is
        a one-time bearer secret that is never persisted or re-exposed.
      required:
        - joinToken
        - joinTokenExpiresAt
        - spiffeId
        - nodeId
        - trustDomain
        - serverAddress
      properties:
        joinToken:
          type: string
        joinTokenExpiresAt:
          type: string
          format: date-time
        spiffeId:
          type: string
        nodeId:
          type: string
        trustDomain:
          type: string
        serverAddress:
          type: string

    AgentEnrollmentListItem:
      type: object
      description: >-
        List-safe view of an enrollment. Deliberately omits the whole `spire`
        block: the join token is shown exactly once, at creation time.
      required: [id, agentName, spiffeId, expiresAt, isUsed, isValid]
      properties:
        id:
          type: string
          format: uuid
        agentName:
          type: string
        spiffeId:
          type: string
        expiresAt:
          type: string
          format: date-time
        isUsed:
          type: boolean
          description: Whether the named agent has registered.
        isValid:
          type: boolean
          description: Unused and not yet expired.
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        usedAt:
          type: string
          format: date-time
          nullable: true

    SiteDetail:
      type: object
      description: >-
        An availability zone: the agents that share one OVN deployment, so a
        logical network pinned to the site can span its nodes.
      required: [id, name, status, labels]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/SiteStatus'
        latitude:
          type: number
          format: double
          nullable: true
          description: Decimal degrees (WGS84), −90…90. Paired with longitude.
        longitude:
          type: number
          format: double
          nullable: true
          description: Decimal degrees (WGS84), −180…180. Paired with latitude.
        locationLabel:
          type: string
          nullable: true
          description: Human-readable location, e.g. "Equinix DC1, Ashburn VA".
        regionCode:
          type: string
          nullable: true
          description: Short operator-defined region/zone slug, e.g. "us-east-1".
        labels:
          type: object
          additionalProperties:
            type: string
          description: Free-form operator labels; empty object when unset.
        networkControllerAgentId:
          type: string
          format: uuid
          nullable: true
          description: >-
            The member agent that authors this site's shared OVN northbound
            database; null when none is designated.
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    SiteStatus:
      type: string
      description: Operational lifecycle of an availability zone.
      enum:
        - active
        - draining
        - maintenance
        - decommissioned

    CreateSiteRequest:
      type: object
      description: >-
        Exactly one of `organizationId` or `organizationalUnitId` is required.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          format: uuid
          nullable: true
        organizationalUnitId:
          type: string
          format: uuid
          nullable: true
        status:
          description: Lifecycle at creation; defaults to `active` when omitted.
          allOf:
            - $ref: '#/components/schemas/SiteStatus'
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        locationLabel:
          type: string
          nullable: true
        regionCode:
          type: string
          nullable: true
        labels:
          type: object
          additionalProperties:
            type: string
          nullable: true

    UpdateSiteRequest:
      type: object
      description: >-
        Full-replace (PUT) semantics for descriptive fields: omitting one clears
        it (labels omitted → empty map). `status` is the exception — an omitted
        status leaves the current lifecycle unchanged.
      properties:
        description:
          type: string
          nullable: true
        networkControllerAgentId:
          type: string
          format: uuid
          nullable: true
        status:
          description: When omitted, the current status is left unchanged.
          allOf:
            - $ref: '#/components/schemas/SiteStatus'
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        locationLabel:
          type: string
          nullable: true
        regionCode:
          type: string
          nullable: true
        labels:
          type: object
          additionalProperties:
            type: string
          nullable: true

    WorkloadIdentityOverview:
      type: object
      description: SPIFFE/SPIRE trust-domain state as reported by the SPIRE server.
      required: [enabled, entries, nodeAttestation, federation, issuance]
      properties:
        enabled:
          type: boolean
          description: >-
            Whether SPIRE is configured on this control plane. When false every
            collection is empty and the UI renders a "not configured" state.
        trustDomain:
          type: string
          nullable: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SPIRERegistrationEntry"
        nodeAttestation:
          type: array
          description: Attested nodes summarized by attestation method.
          items:
            $ref: "#/components/schemas/SPIRENodeAttestationGroup"
        trustBundle:
          $ref: "#/components/schemas/SPIRETrustBundle"
        federation:
          $ref: "#/components/schemas/SPIREFederation"
        issuance:
          $ref: "#/components/schemas/SPIREIssuance"
        warning:
          type: string
          nullable: true
          description: A non-fatal problem reaching the SPIRE server, if any.

    SPIRERegistrationEntry:
      type: object
      description: One SPIRE workload registration entry.
      required:
        - id
        - spiffeID
        - path
        - parentID
        - selectors
        - svidTypes
        - x509TTLSeconds
        - jwtTTLSeconds
        - federatesWith
        - admin
        - downstream
      properties:
        id:
          type: string
        spiffeID:
          type: string
          description: Full identity, e.g. `spiffe://strato.prod/db/primary`.
        path:
          type: string
          description: Path portion after the trust domain.
        parentID:
          type: string
          description: Parent identity — the SPIRE server for node entries, or a node id.
        node:
          type: string
          nullable: true
          description: Short node name derived from `parentID`; best-effort.
        selectors:
          type: array
          description: Selectors formatted as `type:value`.
          items:
            type: string
        svidTypes:
          type: array
          description: SVID kinds this entry issues; always `x509` and `jwt`.
          items:
            type: string
        x509TTLSeconds:
          type: integer
        jwtTTLSeconds:
          type: integer
          description: 0 means the server's default JWT-SVID TTL, not "no JWT-SVID".
        federatesWith:
          type: array
          items:
            type: string
        admin:
          type: boolean
        downstream:
          type: boolean
        hint:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    SPIRENodeAttestationGroup:
      type: object
      description: Attested-node counts for one attestation method.
      required: [attestationType, count, banned]
      properties:
        attestationType:
          type: string
        count:
          type: integer
        banned:
          type: integer

    SPIRETrustBundle:
      type: object
      description: Trust-bundle metadata; present only once a bundle has loaded.
      required: [trustDomain, x509AuthorityCount, refreshedAt, sequenceNumber]
      properties:
        trustDomain:
          type: string
        x509AuthorityCount:
          type: integer
        refreshedAt:
          type: string
          format: date-time
        sequenceNumber:
          type: integer
          format: int64

    SPIREFederation:
      type: object
      description: >-
        Federation relationships. When `available` is true these come from
        SPIRE's trustdomain API with real sync state, supplemented by static
        `federates_with` domains at `state: unknown`. When false, `domains`
        degrades to just the domains entries federate with.
      required: [available, domains]
      properties:
        available:
          type: boolean
        domains:
          type: array
          items:
            $ref: "#/components/schemas/SPIREFederatedDomain"

    SPIREFederatedDomain:
      type: object
      required: [trustDomain, state]
      properties:
        trustDomain:
          type: string
        state:
          type: string
          enum: [synced, refresh_failed, unknown]

    SPIREIssuance:
      type: object
      description: >-
        SVID issuance counts from an external metrics store; the control plane
        is not in the signing path. Counts are null when unavailable.
      required: [available, windowHours]
      properties:
        available:
          type: boolean
        windowHours:
          type: integer
        x509SVIDs:
          type: integer
          nullable: true
        jwtSVIDs:
          type: integer
          nullable: true
    IAMPrincipalType:
      type: string
      description: The kinds of principal a role binding can name.
      enum: [user, group]

    IAMNodeType:
      type: string
      description: >-
        The tree nodes a role binding or guardrail can attach to: the org
        hierarchy plus any individual resource.
      enum:
        - organization
        - organizational_unit
        - project
        - virtual_machine
        - sandbox
        - image
        - network
        - floating_ip
        - volume
        - volume_snapshot
        - sandbox_snapshot
        - site
        - agent

    IAMNode:
      type: object
      description: A node in the org/resource tree — the `(type, id)` pair policy attaches to.
      required: [type, id]
      properties:
        type:
          $ref: "#/components/schemas/IAMNodeType"
        id:
          type: string
          format: uuid

    IAMPrincipalRef:
      type: object
      description: A reference to a principal — the subject of a binding or check.
      required: [type, id]
      properties:
        type:
          $ref: "#/components/schemas/IAMPrincipalType"
        id:
          type: string
          format: uuid

    IAMPermissionCheckItem:
      type: object
      description: One permission question in a batch check.
      required: [key, resourceType, resourceId, permission]
      properties:
        key:
          type: string
          description: Opaque client-chosen id echoed back in the response.
        resourceType:
          $ref: "#/components/schemas/IAMNodeType"
        resourceId:
          type: string
          format: uuid
        permission:
          type: string
          description: >-
            A legacy permission name (`manage_project`) for a self-check, or
            an IAM action name (`vm:start`) when `principal` is set.

    IAMPermissionCheckRequest:
      type: object
      required: [checks]
      properties:
        checks:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/IAMPermissionCheckItem"
        principal:
          allOf:
            - $ref: "#/components/schemas/IAMPrincipalRef"
          description: >-
            When present, the checks are evaluated for this principal instead
            of the caller, and answered from the role-bindings table. Requires
            admin on each named resource or a container above it.

    IAMPermissionCheckResponse:
      type: object
      required: [results]
      properties:
        results:
          type: object
          description: One boolean per submitted check, keyed by its `key`.
          additionalProperties:
            type: boolean

    IAMWhoCanRequest:
      type: object
      required: [resourceType, resourceId, action]
      properties:
        resourceType:
          $ref: "#/components/schemas/IAMNodeType"
        resourceId:
          type: string
          format: uuid
        action:
          type: string
          description: An IAM action name, e.g. `vm:start`.

    IAMWhoCanSource:
      type: string
      description: >-
        Why a principal can perform the action. `binding` is a row in
        `role_bindings`; `orgMembership` is bare membership, which grants a
        small set of actions with no binding behind it; `systemAdmin` bypasses
        authorization entirely (re-expressed as a platform policy at cutover).
      enum: [binding, orgMembership, systemAdmin]

    IAMWhoCanEntry:
      type: object
      description: >-
        One reason one principal can perform the queried action. A principal
        may appear more than once, because each entry explains a distinct
        grant and revoking access means revoking all of them.
      required: [principal, source, principalDisabled, principalExternalToOrg]
      properties:
        principal:
          $ref: "#/components/schemas/IAMPrincipalRef"
        source:
          $ref: "#/components/schemas/IAMWhoCanSource"
        role:
          type: string
          description: The role that carries the action; absent for non-binding sources.
        grantedOn:
          allOf:
            - $ref: "#/components/schemas/IAMNode"
          description: >-
            The node the binding is attached to — the resource itself when the
            grant is direct, an ancestor when it is inherited.
        via:
          allOf:
            - $ref: "#/components/schemas/IAMPrincipalRef"
          description: >-
            The group the user inherited the binding through; absent when the
            binding names the user directly.
        expiresAt:
          type: string
          format: date-time
        principalDisabled:
          type: boolean
          description: >-
            The grant is real but its holder's account is disabled, so they
            cannot currently act on it. Marked rather than filtered out, so an
            un-revoked grant on a departed employee stays visible.
        principalExternalToOrg:
          type: boolean
          description: >-
            The principal lives outside the resource's organization — a user
            with no membership there, or a group owned by another org.
            Cross-org access is reported and marked, never filtered; it is
            exactly what most needs to be visible.
        ceilinged:
          type: boolean
          description: >-
            The grant is real but a ceiling (a guardrail or authored forbid)
            denies it, so this principal cannot actually act here and the
            enforcer agrees (#610). Marked, not filtered — a neutralised grant
            is exactly what an audit needs to see. Absent/false when no ceiling
            applies.
        ceilingPolicyIDs:
          type: array
          description: >-
            The ceiling policy ids that deny this grant (`guardrail-<id>` /
            `policy-<id>`), when `ceilinged`. May be empty even when `ceilinged`
            is true if the denial is structural — a fail-closed on an
            inconsistent/truncated ancestor chain — rather than a named ceiling.
          items:
            type: string

    IAMWhoCanCeiling:
      type: object
      description: >-
        A ceiling in force on the queried resource — a guardrail inherited down
        the tree, or an authored forbid policy scoped to it (#610). Which grants
        it neutralises is on the entries (`ceilinged`); this is the summary of
        what constrains the resource.
      required: [kind, id, name, node]
      properties:
        kind:
          type: string
          enum: [guardrail, policy]
        id:
          type: string
          format: uuid
        name:
          type: string
        node:
          allOf:
            - $ref: "#/components/schemas/IAMNode"
          description: The container a guardrail hangs on, or the owner of a policy.

    IAMWhoCanResponse:
      type: object
      required:
        [resource, action, ancestors, principals, openToAllAuthenticatedUsers, authoredPolicies, authoredPolicyCaveat, ceilings]
      properties:
        resource:
          $ref: "#/components/schemas/IAMNode"
        action:
          type: string
        ancestors:
          type: array
          description: The chain the answer was assembled from, resource first.
          items:
            $ref: "#/components/schemas/IAMNode"
        principals:
          type: array
          items:
            $ref: "#/components/schemas/IAMWhoCanEntry"
        openToAllAuthenticatedUsers:
          type: boolean
          description: >-
            When true, `principals` is not the whole answer: every
            authenticated user can perform this action here.
        authoredPolicies:
          type: array
          description: >-
            Authored **permit** policies (issue #606) in force on this resource
            that may bear on the action, matched best-effort on action scope and
            containment. Their principals are not in `principals`. Authored
            forbids are reflected exactly in `ceilings` instead (#610).
          items:
            $ref: "#/components/schemas/IAMWhoCanPolicyMatch"
        authoredPolicyCaveat:
          type: boolean
          description: >-
            When true, an authored permit above bears on this query and its
            principals could not be enumerated — `principals` is again partial.
        ceilings:
          type: array
          description: >-
            The ceilings in force on this resource — guardrails inherited down
            the tree plus authored forbid policies scoped to it (#610). Which
            grants each neutralises is on the entries (`ceilinged`).
          items:
            $ref: "#/components/schemas/IAMWhoCanCeiling"

    IAMWhoCanPolicyMatch:
      type: object
      description: >-
        An authored policy that may bear on the queried action and resource.
        Best-effort: which principals it permits or forbids, and any
        conditions, cannot be enumerated from a reverse lookup.
      required: [policyID, name, effect, owner, actionMatch]
      properties:
        policyID:
          type: string
          format: uuid
        name:
          type: string
        effect:
          $ref: "#/components/schemas/IAMPolicyEffect"
        owner:
          $ref: "#/components/schemas/IAMNode"
        actionMatch:
          type: string
          description: >-
            Whether the policy's action scope covers the queried action, as far
            as its text can be read. `unknown` when the scope cannot be
            enumerated (an action-group reference).
          enum: [matches, unknown]

    IAMGuardrailPrincipalMatchKind:
      type: string
      description: Which principals a guardrail constrains.
      enum: [any, user, group, external_to_organization]

    IAMGuardrailPrincipalMatch:
      type: object
      required: [kind]
      properties:
        kind:
          $ref: "#/components/schemas/IAMGuardrailPrincipalMatchKind"
        id:
          type: string
          format: uuid
          description: The user or group id; required for `user` and `group`, absent otherwise.

    IAMGuardrailResourceMatchKind:
      type: string
      description: Which resources a guardrail constrains.
      enum: [any, environment]

    IAMGuardrailResourceMatch:
      type: object
      required: [kind]
      properties:
        kind:
          $ref: "#/components/schemas/IAMGuardrailResourceMatchKind"
        value:
          type: string
          description: The environment name; required for `environment`, absent otherwise.

    IAMRoleOwnerType:
      type: string
      description: >-
        Who owns a role definition. `platform` rows are the seeded defaults,
        reconciled from the code registry and immutable through the API;
        organization- and project-owned rows are user-created and bindable at
        or below their owner.
      enum: [platform, organization, project]
    IAMRole:
      type: object
      description: >-
        A role definition: a named Cedar permit whose action scope is an
        explicit, enumerable action list. The four defaults are seeded rows,
        not a separate kind of thing.
      required: [id, name, ownerType, ownerId, cedarText, actions, managed]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
          description: >-
            The owning organization or project. Platform rows carry the
            all-zero sentinel.
        cedarText:
          type: string
          description: >-
            The role's permit, in Cedar policy language, compiled into the
            policy set verbatim. Round-trips: this value is accepted as
            `cedarText` on a later write.
        actions:
          type: array
          description: >-
            Derived from `cedarText`'s action scope on every write, never sent
            by the client.
          items:
            type: string
        managed:
          type: boolean
          description: >-
            A seeded default, reconciled from the code registry at boot and
            immutable through this API.
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IAMRoleListResponse:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/IAMRole"
    IAMBindableRolesResponse:
      type: object
      required: [node, ancestors, roles]
      properties:
        node:
          $ref: "#/components/schemas/IAMNode"
        ancestors:
          type: array
          description: >-
            The chain the answer was assembled from, resource first, so an
            inherited role is explicable without a second round trip.
          items:
            $ref: "#/components/schemas/IAMNode"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/IAMBindableRole"
    IAMBindableRole:
      type: object
      description: >-
        A role as the grant flow needs it: enough to choose one and know what
        it confers, without the policy text. This listing is gated on read of
        the node rather than on `iam:readPolicy`, and a role's `cedarText` can
        describe the organization's security posture — which environments are
        fenced off, where MFA is demanded — so reading it stays an
        `iam:readPolicy` act.
      required: [id, name, ownerType, ownerId, actions, managed]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
        actions:
          type: array
          items:
            type: string
        managed:
          type: boolean
    IAMRoleCreateRequest:
      type: object
      required: [name, ownerType, ownerId]
      properties:
        name:
          type: string
        description:
          type: string
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
        actions:
          type: array
          description: >-
            Pick actions and the server writes the canonical permit. Mutually
            exclusive with `cedarText`; exactly one is required.
          items:
            type: string
        cedarText:
          type: string
          description: >-
            Write the permit yourself. Mutually exclusive with `actions`.
            Because the permit is conditioned on grants fields whose names
            embed the role id, a client supplying its own text supplies `id`
            too — `/api/iam/roles/validate` hands out one to build against.
        id:
          type: string
          format: uuid
          description: >-
            The id to create the role under. Optional; the server allocates one
            when it is omitted, in which case only the `actions` mode can be
            used.
    IAMRoleUpdateRequest:
      type: object
      description: >-
        Partial update. Sending `actions` or `cedarText` rewrites the permit;
        sending neither leaves it as it is. The two remain mutually exclusive.
      properties:
        name:
          type: string
        description:
          type: string
        actions:
          type: array
          items:
            type: string
        cedarText:
          type: string
    IAMRoleValidateRequest:
      type: object
      description: >-
        Exactly one of `actions` or `cedarText`, as on a write.
      properties:
        actions:
          type: array
          items:
            type: string
        cedarText:
          type: string
        id:
          type: string
          format: uuid
          description: >-
            The role being edited, so its own grants fields are the accepted
            ones. Omit for a role that does not exist yet and the response
            carries a freshly allocated id to build against.
    IAMRoleValidateResponse:
      type: object
      required: [id, cedarText, actions]
      properties:
        id:
          type: string
          format: uuid
          description: >-
            The id the text was checked against — the one being edited, or a
            freshly allocated one to write `cedarText` against and then send
            back as the create request's `id`.
        cedarText:
          type: string
        actions:
          type: array
          items:
            type: string
    IAMPolicyEffect:
      type: string
      description: >-
        A policy's effect, derived from its Cedar text. Unlike a role
        (permit-only) or a guardrail (forbid-only), an authored policy may be
        either.
      enum: [permit, forbid]
    IAMPolicy:
      type: object
      description: >-
        An authored Cedar policy: a permit or forbid written directly in Cedar
        policy language, owned by an organization or project and compiled into
        the policy set under the id `policy-<uuid>`.
      required: [id, name, ownerType, ownerId, cedarText, effect, enabled]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
          description: The owning organization or project.
        cedarText:
          type: string
          description: >-
            The policy in Cedar policy language, compiled verbatim.
            Round-trips: this value is accepted as `cedarText` on a later write.
        effect:
          $ref: "#/components/schemas/IAMPolicyEffect"
        enabled:
          type: boolean
          description: >-
            Disabled policies stay in the table but are left out of the
            compiled set.
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IAMPolicyListResponse:
      type: object
      required: [policies]
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/IAMPolicy"
    IAMPolicyCreateRequest:
      type: object
      required: [name, ownerType, ownerId, cedarText]
      properties:
        name:
          type: string
        description:
          type: string
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
        cedarText:
          type: string
          description: >-
            The Cedar permit or forbid. The effect is read off it; there is no
            action-list shorthand — an authored policy is Cedar by definition.
        enabled:
          type: boolean
          description: Defaults to true when omitted.
        id:
          type: string
          format: uuid
          description: >-
            Optional pre-allocated id (a `validate` round-trip hands one out).
            The server allocates one when it is omitted.
    IAMPolicyUpdateRequest:
      type: object
      description: >-
        Partial update. Sending `cedarText` re-derives the effect and re-checks
        containment; omitted fields are left unchanged.
      properties:
        name:
          type: string
        description:
          type: string
        cedarText:
          type: string
        enabled:
          type: boolean
    IAMPolicyValidateRequest:
      type: object
      required: [ownerType, ownerId, cedarText]
      properties:
        ownerType:
          $ref: "#/components/schemas/IAMRoleOwnerType"
        ownerId:
          type: string
          format: uuid
        cedarText:
          type: string
        id:
          type: string
          format: uuid
          description: >-
            The policy being edited, so the id its compiled form uses is
            stable. Omit for a policy that does not exist yet.
    IAMPolicyValidateResponse:
      type: object
      required: [id, cedarText, effect]
      properties:
        id:
          type: string
          format: uuid
        cedarText:
          type: string
        effect:
          $ref: "#/components/schemas/IAMPolicyEffect"
    IAMActionCatalogEntry:
      type: object
      required: [action, service, resourceTypes, roles, membershipDerived]
      properties:
        action:
          type: string
        service:
          type: string
        resourceTypes:
          type: array
          description: >-
            The tree-node types this action can be requested against. Container
            types appear because `create`/`list` checks target the container.
          items:
            $ref: "#/components/schemas/IAMNodeType"
        roles:
          type: array
          description: >-
            The seeded roles carrying this action. Empty for an action no
            default role grants — which is a fine thing for a custom role to
            grant.
          items:
            type: string
        membershipDerived:
          type: boolean
          description: >-
            Granted by bare organization membership, with no binding behind it.
            Including such an action in a custom role is legal but buys nothing
            inside the org.
    IAMActionCatalogService:
      type: object
      required: [service, actions]
      properties:
        service:
          type: string
        actions:
          type: array
          items:
            $ref: "#/components/schemas/IAMActionCatalogEntry"
    IAMActionCatalogResponse:
      type: object
      required: [services]
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/IAMActionCatalogService"
    IAMGuardrail:
      type: object
      description: >-
        A tier-2 ceiling on what grants beneath a node can reach. Guardrails
        only ever forbid; they intersect rather than override one another.
      required: [id, name, node, effect, actions, principalMatch, resourceMatch, shape, authored, enabled]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        node:
          $ref: "#/components/schemas/IAMNode"
        effect:
          type: string
          description: Always `forbid`. Stated rather than left to be inferred.
          enum: [forbid]
        actions:
          type: array
          description: >-
            Exact actions, `service:*` wildcards, or `*`. An empty list means
            every action. Placeholder (`["*"]`) on an authored guardrail.
          items:
            type: string
        principalMatch:
          $ref: "#/components/schemas/IAMGuardrailPrincipalMatch"
        resourceMatch:
          $ref: "#/components/schemas/IAMGuardrailResourceMatch"
        shape:
          type: string
          description: Which side carries the constraint; derived from the two matches.
        cedarText:
          type: string
          description: >-
            The Cedar `forbid` this guardrail compiles to — the stored source of
            truth since #610 (matcher-generated or hand-authored). Absent only
            when the row cannot be rendered (an unknown node type, or an
            external-principal ceiling whose attach node resolves to no
            organization).
        authored:
          type: boolean
          description: >-
            Whether the forbid was hand-authored (`true`) or assembled from the
            matchers (`false`, #610). On an authored row the matcher fields are
            placeholders; a builder UI reads this to choose the editor.
        enabled:
          type: boolean
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IAMGuardrailWriteResponse:
      type: object
      description: >-
        A written guardrail, plus the grants it now narrows. The write is never
        refused over these — subtracting from existing grants is what a ceiling
        is for — but the author sees what they just took away.
      required: [guardrail, shadowedBindings]
      properties:
        guardrail:
          $ref: "#/components/schemas/IAMGuardrail"
        shadowedBindings:
          type: array
          description: >-
            Active role bindings beneath the attach node that this ceiling now
            constrains. Empty when the symbolic analysis could not run; the
            ceiling is in force either way.
          items:
            $ref: "#/components/schemas/IAMShadowedBinding"

    IAMShadowedBinding:
      type: object
      required: [principalType, principalID, role, node]
      properties:
        principalType:
          type: string
          enum: [user, group]
        principalID:
          type: string
          format: uuid
        role:
          type: string
          enum: [viewer, operator, editor, admin]
        node:
          $ref: "#/components/schemas/IAMNode"

    IAMGuardrailCreateRequest:
      type: object
      required: [name, nodeType, nodeId]
      properties:
        name:
          type: string
        description:
          type: string
        effect:
          type: string
          description: >-
            Optional, and only ever `forbid`. A request naming anything else is
            rejected rather than silently coerced.
          enum: [forbid]
        nodeType:
          $ref: "#/components/schemas/IAMNodeType"
        nodeId:
          type: string
          format: uuid
        actions:
          type: array
          description: Defaults to empty, which means every action.
          items:
            type: string
        principalMatch:
          allOf:
            - $ref: "#/components/schemas/IAMGuardrailPrincipalMatch"
          description: Defaults to `any`.
        resourceMatch:
          allOf:
            - $ref: "#/components/schemas/IAMGuardrailResourceMatch"
          description: Defaults to `any`.
        cedarText:
          type: string
          description: >-
            Advanced (#610): a hand-written Cedar `forbid`, held to the guardrail
            shape (forbid-only, contained to the attach node, not self-locking).
            Sent instead of the matchers — the two together are a `400`.
        enabled:
          type: boolean
          default: true

    IAMGuardrailUpdateRequest:
      type: object
      description: >-
        Partial update; omitted fields are left unchanged. A guardrail's input
        mode is fixed at creation: send matcher fields for a matcher-built
        guardrail, `cedarText` for an authored one — the wrong mode's fields are
        a `400`.
      properties:
        description:
          type: string
        actions:
          type: array
          items:
            type: string
        principalMatch:
          $ref: "#/components/schemas/IAMGuardrailPrincipalMatch"
        resourceMatch:
          $ref: "#/components/schemas/IAMGuardrailResourceMatch"
        cedarText:
          type: string
          description: >-
            Advanced (#610): edit an authored guardrail's Cedar text. Rejected
            on a matcher-built guardrail.
        enabled:
          type: boolean

    IAMGuardrailListResponse:
      type: object
      required: [node, guardrails]
      properties:
        node:
          $ref: "#/components/schemas/IAMNode"
        ancestors:
          type: array
          description: >-
            Present only when the effective set was requested: the chain the
            answer was assembled from, resource first.
          items:
            $ref: "#/components/schemas/IAMNode"
        guardrails:
          type: array
          items:
            $ref: "#/components/schemas/IAMGuardrail"

    IAMPolicySetVersion:
      type: object
      description: >-
        One entry in the append-only policy-set version log. `reason` and
        `changedBy` make "why did the policy set change?" answerable.
      required: [version, reason]
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
        reason:
          type: string
        changedBy:
          type: string
          format: uuid
          description: The user behind the change; absent for system-driven bumps.
        createdAt:
          type: string
          format: date-time

    IAMPolicySetVersionResponse:
      type: object
      required: [version, replicaVersion]
      properties:
        version:
          type: integer
          description: The version in the database — what a write would build on.
        replicaVersion:
          type: integer
          description: The version the replica serving this request has observed.
        latest:
          allOf:
            - $ref: "#/components/schemas/IAMPolicySetVersion"
          description: The newest version-log entry, absent when the log is empty.

    IAMDecisionLogEntry:
      type: object
      description: >-
        One authorization decision record. The `spicedb*` field names are
        historical (kept for API compatibility): `spicedbPermission` carries
        the permission as asked at the check site, and `spicedbDecision` is
        always `none` on rows written after the SpiceDB removal (#483).
      required:
        - id
        - subject
        - spicedbPermission
        - resourceType
        - resourceID
        - spicedbDecision
        - cedarDecision
        - determiningPolicies
      properties:
        id:
          type: string
          format: uuid
        requestID:
          type: string
        path:
          type: string
        method:
          type: string
        subject:
          type: string
          description: The principal the check was made for.
        spicedbPermission:
          type: string
        resourceType:
          type: string
        resourceID:
          type: string
        iamAction:
          type: string
          description: The IAM action the legacy permission was mapped to, when one exists.
        nodeType:
          type: string
        nodeID:
          type: string
          format: uuid
        organizationID:
          type: string
          format: uuid
        spicedbDecision:
          type: string
        cedarDecision:
          type: string
        decisionsMatch:
          type: boolean
        determiningPolicies:
          type: array
          items:
            type: string
        tier:
          type: string
          description: Which policy tier decided — platform policy, guardrail, or binding.
        cedarErrors:
          type: string
        policyVersion:
          type: integer
          description: The policy-set version in force when the decision was made.
        skippedConditionedBindings:
          type: integer
        createdAt:
          type: string
          format: date-time

    IAMDecisionSummaryBucket:
      type: object
      description: >-
        One burn-down bucket: a distinct way a (permission, action) pair has
        decided, with how often.
      required: [spicedbPermission, spicedbDecision, cedarDecision, count]
      properties:
        spicedbPermission:
          type: string
        iamAction:
          type: string
        spicedbDecision:
          type: string
        cedarDecision:
          type: string
        tier:
          type: string
        count:
          type: integer

    AuditEvent:
      type: object
      description: One entry in the audit trail.
      required: [eventType, adminBypass]
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
        userID:
          type: string
          format: uuid
        username:
          type: string
        apiKeyID:
          type: string
          format: uuid
        organizationID:
          type: string
          format: uuid
        method:
          type: string
        path:
          type: string
        status:
          type: integer
          description: The HTTP status the audited request returned.
        resourceType:
          type: string
        resourceID:
          type: string
        action:
          type: string
        sourceIP:
          type: string
        adminBypass:
          type: boolean
          description: The request was served via the system-admin authorization bypass.
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time

    AuditEventListResponse:
      type: object
      required: [events, total, limit, offset]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
          description: Total matching events, ignoring `limit`/`offset`.
        limit:
          type: integer
        offset:
          type: integer
    OIDCGroupMapping:
      type: object
      description: >-
        Maps one value of the provider's groups claim to a Strato group. Groups
        named here are IdP-managed: membership is reconciled on every login.
      required: [claimValue, groupID]
      properties:
        claimValue:
          type: string
          description: The claim value as emitted by the IdP (a name, or an object id).
        groupID:
          type: string
          format: uuid
          description: The Strato group; must belong to the provider's organization.

    OIDCRoleMapping:
      type: object
      description: >-
        Maps one value of the provider's groups claim to a Strato role bound on
        the organization node. When a login token carries the claim value, the
        user's org role is reconciled to this role. The role must be bindable at
        the org (platform-owned, or owned by the org or one of its ancestors).
      required: [claimValue, roleID]
      properties:
        claimValue:
          type: string
          description: The claim value as emitted by the IdP.
        roleID:
          type: string
          format: uuid
          description: The role to bind on the organization node.

    OIDCProviderConfig:
      type: object
      description: >-
        A configured OIDC identity provider. The client secret is never
        returned. Claim-mapping fields are omitted for non-admin readers.
      required: [name, clientID, scopes, enabled, useNonce]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        clientID:
          type: string
        discoveryURL:
          type: string
        issuer:
          type: string
          description: Discovered issuer; ID tokens are rejected unless they match it.
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        userinfoEndpoint:
          type: string
        jwksURI:
          type: string
        endSessionEndpoint:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        useNonce:
          type: boolean
          description: Whether to mint and verify a nonce (disable for IdPs that drop it).
        groupsClaim:
          type: string
          description: Admin-only. The claim carrying group values.
        groupMappings:
          type: array
          description: Admin-only.
          items:
            $ref: "#/components/schemas/OIDCGroupMapping"
        adminClaimValues:
          type: array
          description: Admin-only. Claim values that grant the organization admin role.
          items:
            type: string
        roleMappings:
          type: array
          description: >-
            Admin-only. Claim values mapped to org-scoped roles bound on login.
          items:
            $ref: "#/components/schemas/OIDCRoleMapping"
        defaultRole:
          type: string
          description: >-
            Admin-only. Organization role for newly provisioned users when no
            claim matches: `member`, `admin`, an IAM role name, or a role id
            bindable at the org.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateOIDCProviderRequest:
      type: object
      description: >-
        Either `discoveryURL` or all of `authorizationEndpoint`, `tokenEndpoint`
        and `jwksURI` must be supplied.
      required: [name, clientID, clientSecret]
      properties:
        name:
          type: string
          description: Unique within the organization.
        clientID:
          type: string
        clientSecret:
          type: string
          description: Stored encrypted; never returned.
        discoveryURL:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        userinfoEndpoint:
          type: string
        jwksURI:
          type: string
        endSessionEndpoint:
          type: string
        scopes:
          type: array
          description: Defaults to `["openid", "profile", "email"]`.
          items:
            type: string
        enabled:
          type: boolean
          default: true
        useNonce:
          type: boolean
          default: true
        groupsClaim:
          type: string
        groupMappings:
          type: array
          items:
            $ref: "#/components/schemas/OIDCGroupMapping"
        adminClaimValues:
          type: array
          items:
            type: string
        roleMappings:
          type: array
          items:
            $ref: "#/components/schemas/OIDCRoleMapping"
        defaultRole:
          type: string
          description: >-
            `member`, `admin`, an IAM role name, or a role id bindable at the org.

    UpdateOIDCProviderRequest:
      type: object
      description: >-
        Every field is optional. Omitted URL fields keep their stored value; an
        empty string clears them.
      properties:
        name:
          type: string
        clientID:
          type: string
        clientSecret:
          type: string
        discoveryURL:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        userinfoEndpoint:
          type: string
        jwksURI:
          type: string
        endSessionEndpoint:
          type: string
        scopes:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        useNonce:
          type: boolean
        groupsClaim:
          type: string
        groupMappings:
          type: array
          items:
            $ref: "#/components/schemas/OIDCGroupMapping"
        adminClaimValues:
          type: array
          items:
            type: string
        roleMappings:
          type: array
          items:
            $ref: "#/components/schemas/OIDCRoleMapping"
        defaultRole:
          type: string
          description: >-
            `member`, `admin`, an IAM role name, or a role id bindable at the org.

    OIDCProviderTestResult:
      type: object
      description: The outcome of a provider configuration test.
      required: [valid, message]
      properties:
        valid:
          type: boolean
        message:
          type: string

    OIDCProviderPublicSummary:
      type: object
      description: The unauthenticated login-page view of a provider.
      required: [name, enabled]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        enabled:
          type: boolean

    SSOLookupResult:
      type: object
      description: >-
        `organizationID` is null and `providers` empty both for an unknown
        organization and for one with no enabled providers.
      required: [providers]
      properties:
        organizationID:
          type: string
          format: uuid
          nullable: true
        providers:
          type: array
          items:
            $ref: "#/components/schemas/OIDCProviderPublicSummary"

    SCIMTokenSummary:
      type: object
      description: A SCIM provisioning token; the secret itself is never returned.
      required: [name, tokenPrefix, organizationId, isActive]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tokenPrefix:
          type: string
          description: The leading, non-secret portion of the token.
        organizationId:
          type: string
          format: uuid
        isActive:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CreateSCIMTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        expiresInDays:
          type: integer
          description: Days until expiry; omit or use a non-positive value for no expiry.

    CreateSCIMTokenResult:
      type: object
      description: >-
        The created token. `token` is the full secret and is returned only in
        this response.
      required: [name, token, tokenPrefix, organizationId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
          description: The full `scim_`-prefixed token. Shown once.
        tokenPrefix:
          type: string
        organizationId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    UpdateSCIMTokenRequest:
      type: object
      description: Only the name and active flag are mutable.
      properties:
        name:
          type: string
        isActive:
          type: boolean

    SCIMResourceMeta:
      type: object
      description: RFC 7643 §3.1 common resource metadata.
      properties:
        resourceType:
          type: string
        created:
          type: string
          format: date-time
        lastModified:
          type: string
          format: date-time
        location:
          type: string
        version:
          type: string
          description: Weak ETag derived from the last-modified timestamp.

    SCIMMultiValuedAttribute:
      type: object
      description: RFC 7643 §2.4 multi-valued attribute.
      properties:
        value:
          type: string
        type:
          type: string
        primary:
          type: boolean
        display:
          type: string

    SCIMUserResource:
      type: object
      description: >-
        An RFC 7643 User. Strato populates id, externalId, meta, userName,
        name.formatted, displayName, active and a single primary work email;
        other core attributes are accepted on write but not echoed back. The
        `groups` attribute is deliberately omitted — group membership is served
        from the Groups endpoint.
      required: [schemas, userName]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:User"]
        id:
          type: string
        externalId:
          type: string
        meta:
          $ref: "#/components/schemas/SCIMResourceMeta"
        userName:
          type: string
        name:
          type: object
          properties:
            formatted:
              type: string
            familyName:
              type: string
            givenName:
              type: string
            middleName:
              type: string
            honorificPrefix:
              type: string
            honorificSuffix:
              type: string
        displayName:
          type: string
        nickName:
          type: string
        title:
          type: string
        userType:
          type: string
        preferredLanguage:
          type: string
        locale:
          type: string
        timezone:
          type: string
        active:
          type: boolean
          description: >-
            Deactivating a user prevents them from establishing a session at
            login.
        emails:
          type: array
          items:
            $ref: "#/components/schemas/SCIMMultiValuedAttribute"
        phoneNumbers:
          type: array
          items:
            $ref: "#/components/schemas/SCIMMultiValuedAttribute"

    SCIMGroupMember:
      type: object
      description: One member of a SCIM group.
      properties:
        value:
          type: string
          description: The member user's id.
        "$ref":
          type: string
          description: URI of the member resource (RFC 7643 `$ref`).
        display:
          type: string
        type:
          type: string

    SCIMGroupResource:
      type: object
      description: An RFC 7643 Group.
      required: [schemas, displayName]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:Group"]
        id:
          type: string
        externalId:
          type: string
        meta:
          $ref: "#/components/schemas/SCIMResourceMeta"
        displayName:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/SCIMGroupMember"

    SCIMListResponse:
      type: object
      description: An RFC 7644 §3.4.2 ListResponse with untyped resources.
      required: [schemas, totalResults, Resources]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
        totalResults:
          type: integer
        startIndex:
          type: integer
        itemsPerPage:
          type: integer
        Resources:
          type: array
          items:
            type: object
            additionalProperties: true

    SCIMUserListResponse:
      type: object
      description: An RFC 7644 ListResponse of User resources.
      required: [schemas, totalResults, Resources]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
        totalResults:
          type: integer
        startIndex:
          type: integer
        itemsPerPage:
          type: integer
        Resources:
          type: array
          items:
            $ref: "#/components/schemas/SCIMUserResource"

    SCIMGroupListResponse:
      type: object
      description: An RFC 7644 ListResponse of Group resources.
      required: [schemas, totalResults, Resources]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
        totalResults:
          type: integer
        startIndex:
          type: integer
        itemsPerPage:
          type: integer
        Resources:
          type: array
          items:
            $ref: "#/components/schemas/SCIMGroupResource"

    SCIMPatchOp:
      type: object
      description: An RFC 7644 §3.5.2 PatchOp request.
      required: [schemas, Operations]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:PatchOp"]
        Operations:
          type: array
          items:
            type: object
            required: [op]
            properties:
              op:
                type: string
                enum: [add, remove, replace]
              path:
                type: string
              value:
                description: >-
                  A string, number, boolean, object, or array of objects,
                  depending on the target attribute.

    SCIMErrorResponse:
      type: object
      description: An RFC 7644 §3.12 error.
      required: [schemas, status]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:Error"]
        status:
          type: string
          description: The HTTP status code, expressed as a JSON string.
          example: "401"
        detail:
          type: string
        scimType:
          type: string
          description: An RFC 7644 §3.12 error type keyword.

    SCIMServiceProviderConfig:
      type: object
      description: >-
        RFC 7643 §5. Strato supports PATCH, filtering (max 1000 results),
        sorting and ETags; bulk operations and password change are unsupported.
      required: [schemas, patch, bulk, filter, changePassword, sort, etag, authenticationSchemes]
      properties:
        schemas:
          type: array
          items:
            type: string
        patch:
          $ref: "#/components/schemas/SCIMFeatureConfig"
        bulk:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean
            maxOperations:
              type: integer
            maxPayloadSize:
              type: integer
        filter:
          type: object
          required: [supported]
          properties:
            supported:
              type: boolean
            maxResults:
              type: integer
        changePassword:
          $ref: "#/components/schemas/SCIMFeatureConfig"
        sort:
          $ref: "#/components/schemas/SCIMFeatureConfig"
        etag:
          $ref: "#/components/schemas/SCIMFeatureConfig"
        authenticationSchemes:
          type: array
          items:
            type: object
            required: [type, name]
            properties:
              type:
                type: string
              name:
                type: string
              description:
                type: string
              specUri:
                type: string
              documentationUri:
                type: string
        meta:
          $ref: "#/components/schemas/SCIMResourceMeta"

    SCIMFeatureConfig:
      type: object
      description: Whether one SCIM optional feature is supported.
      required: [supported]
      properties:
        supported:
          type: boolean

    SSFStream:
      type: object
      description: >-
        A Shared Signals Framework receiver stream. The transmitter auth token
        and the inbound push token are stored encrypted/hashed and never
        returned here.
      required:
        - organizationId
        - name
        - transmitterURL
        - expectedAudience
        - deliveryMethod
        - eventsRequested
        - enabled
        - registered
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        transmitterURL:
          type: string
        expectedIssuer:
          type: string
          description: Required `iss` on inbound SETs.
        expectedAudience:
          type: array
          items:
            type: string
        deliveryMethod:
          $ref: "#/components/schemas/SSFDeliveryMethod"
        eventsRequested:
          type: array
          description: SET event URIs requested from the transmitter.
          items:
            type: string
        remoteStreamID:
          type: string
          description: The transmitter's stream identifier, set once registered.
        pollEndpoint:
          type: string
        pushEndpoint:
          type: string
          description: The `/ssf/events/{streamID}` URL given to the transmitter.
        pushTokenPrefix:
          type: string
        enabled:
          type: boolean
        registered:
          type: boolean
          description: True once the stream exists at the transmitter.
        verifiedAt:
          type: string
          format: date-time
        lastEventAt:
          type: string
          format: date-time
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SSFDeliveryMethod:
      type: string
      description: How the transmitter delivers security events.
      enum: [push, poll]

    CreateSSFStreamRequest:
      type: object
      required: [name, transmitterURL, deliveryMethod]
      properties:
        name:
          type: string
        description:
          type: string
        transmitterURL:
          type: string
          description: The transmitter's base or configuration URL (validated).
        authToken:
          type: string
          description: Bearer token for outbound calls to the transmitter; stored encrypted.
        expectedIssuer:
          type: string
        expectedAudience:
          type: array
          items:
            type: string
        deliveryMethod:
          $ref: "#/components/schemas/SSFDeliveryMethod"
        eventsRequested:
          type: array
          items:
            type: string

    UpdateSSFStreamRequest:
      type: object
      description: Omitted fields are unchanged; transmitter URL and delivery method are immutable.
      properties:
        name:
          type: string
        description:
          type: string
        authToken:
          type: string
        expectedIssuer:
          type: string
        expectedAudience:
          type: array
          items:
            type: string
        eventsRequested:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    RegisterSSFStreamResult:
      type: object
      description: The registered stream plus the one-time inbound push token.
      required: [stream]
      properties:
        stream:
          $ref: "#/components/schemas/SSFStream"
        pushToken:
          type: string
          description: >-
            Present only for push streams and only in this response; stored
            hashed.

    SSFStreamStatus:
      type: object
      description: The transmitter's reported status for a stream.
      required: [remoteStreamID, status]
      properties:
        remoteStreamID:
          type: string
        status:
          type: string
        reason:
          type: string

    SSFPollResult:
      type: object
      description: The result of draining a poll-delivery stream.
      required: [processed, failed, moreAvailable]
      properties:
        processed:
          type: integer
        failed:
          type: integer
        moreAvailable:
          type: boolean

    WebhookEventType:
      type: string
      description: >-
        A subscribable platform event type. `webhook.test` additionally
        appears in deliveries created by the test endpoint but cannot be
        subscribed to.
      enum:
        - operation.completed
        - operation.failed
        - vm.state_changed
        - agent.connected
        - agent.disconnected
        - quota.threshold_exceeded

    WebhookSubscription:
      type: object
      description: >-
        A user-managed webhook subscription. The signing secret is never
        included; it is returned once by create and rotate-secret.
      required: [id, organizationId, name, url, eventTypes, isActive]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
          description: >-
            When set, only events carrying this project are delivered; absent
            means every event in the organization.
        name:
          type: string
        url:
          type: string
        eventTypes:
          type: array
          description: Subscribed event types; empty subscribes to all types.
          items:
            $ref: "#/components/schemas/WebhookEventType"
        isActive:
          type: boolean
        disabledReason:
          type: string
          description: >-
            Why the platform deactivated the subscription (continuous delivery
            failure); absent for user-deactivated or active subscriptions.
        failingSince:
          type: string
          format: date-time
          description: >-
            Start of the current unbroken delivery-failure streak; absent
            after any successful delivery.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string
          description: The https/http endpoint to POST events to.
        projectId:
          type: string
          format: uuid
          description: Narrow delivery to one project of the organization.
        eventTypes:
          type: array
          description: Event types to subscribe to; empty or omitted means all.
          items:
            $ref: "#/components/schemas/WebhookEventType"

    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
        isActive:
          type: boolean

    WebhookWithSecret:
      type: object
      description: A subscription plus its plaintext signing secret, shown exactly once.
      required: [subscription, signingSecret]
      properties:
        subscription:
          $ref: "#/components/schemas/WebhookSubscription"
        signingSecret:
          type: string

    WebhookDelivery:
      type: object
      description: >-
        One webhook delivery: the outbox row for a (event, subscription) pair,
        kept after completion as delivery history. Deliveries are signed with
        `X-Strato-Signature: t=<unix seconds>,v1=<hex HMAC-SHA256 of
        "<t>.<body>">` using the subscription's signing secret.
      required: [id, subscriptionId, eventId, eventType, status, attempts, payload]
      properties:
        id:
          type: string
          format: uuid
        subscriptionId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
          description: >-
            Shared across the fan-out of one event to many subscriptions;
            consumers dedupe on it (delivery is at-least-once).
        eventType:
          type: string
        status:
          type: string
          enum: [pending, succeeded, dead]
        attempts:
          type: integer
        nextAttemptAt:
          type: string
          format: date-time
          description: Present only while the delivery is pending.
        lastAttemptAt:
          type: string
          format: date-time
        responseStatus:
          type: integer
          description: HTTP status of the last attempt, when the endpoint answered.
        lastError:
          type: string
        deliveredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        payload:
          type: string
          description: The exact JSON body posted, frozen at enqueue time.

    SETErrorResponse:
      type: object
      description: >-
        The RFC 8935 error envelope returned by the push-delivery endpoint.
        Unlike the rest of the API this is not the standard Strato `Error` body.
      required: [err]
      properties:
        err:
          type: string
          description: An RFC 8935 error code, e.g. `invalid_request`.
        description:
          type: string
    LogEntry:
      type: object
      description: One log line with its Loki stream labels.
      required: [timestamp, message, labels]
      properties:
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        labels:
          type: object
          description: The Loki stream labels attached to this entry.
          additionalProperties:
            type: string
