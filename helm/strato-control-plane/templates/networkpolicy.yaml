{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "strato-control-plane.fullname" . }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "strato-control-plane.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- end }}
    {{- if and .Values.spire.enabled .Values.spire.envoy.enabled }}
    # Envoy sidecar terminates agent mTLS on these ports. The mTLS port is
    # self-authenticating (client cert required), so allowing all sources is safe;
    # without this rule an enabled NetworkPolicy would block all agent connections.
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.spire.envoy.agentPort }}
        - protocol: TCP
          port: {{ .Values.spire.envoy.healthPort }}
    {{- end }}
  egress:
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow database access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.spicedb.enabled }}
    # Allow SpiceDB access
    - to:
        - podSelector:
            matchLabels:
              {{- include "strato-control-plane.spicedb.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
    {{- end }}
    {{- if or .Values.valkey.enabled .Values.externalValkey.host }}
    # Allow Valkey/Redis access (wait-for-valkey init container and runtime)
    - to: []
      ports:
        - protocol: TCP
          port: {{ include "strato-control-plane.valkeyPort" . }}
    {{- end }}
    {{- if and .Values.opentelemetry.enabled .Values.opentelemetry.collector.enabled }}
    # Allow OTLP export to the chart's collector
    - to:
        - podSelector:
            matchLabels:
              {{- include "strato-control-plane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: otel-collector
      ports:
        - protocol: TCP
          port: {{ .Values.opentelemetry.collector.service.grpcPort }}
    {{- end }}
    # Allow outbound HTTPS (OIDC discovery/JWKS, SSF transmitters, audit
    # webhooks, external image URLs)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    {{- if .Values.spire.enabled }}
    # SPIRE server gRPC API (join-token provisioning, entry revocation);
    # 8081 is the server container's bind_port
    - to:
        - podSelector:
            matchLabels:
              {{- include "strato-control-plane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: spire-server
      ports:
        - protocol: TCP
          port: 8081
    {{- end }}
    {{- end }}
    {{- if and .Values.spire.enabled .Values.opentelemetry.enabled .Values.opentelemetry.prometheus.enabled }}
    # Allow the Workload Identity issuance panel to query the chart's Prometheus
    # (SPIRE_METRICS_PROMETHEUS_URL). Appended outside the egress with/else so it
    # applies to both the default and any custom egress list, and scoped to the
    # Prometheus pods rather than opening the port to every destination. For an
    # *external* Prometheus (opentelemetry.prometheus.url), add your own egress
    # rule to reach it — the 443 rule below already covers an https URL.
    - to:
        - podSelector:
            matchLabels:
              {{- include "strato-control-plane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.opentelemetry.prometheus.service.port }}
    {{- end }}
{{- end }}
---
{{- if and .Values.spicedb.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "strato-control-plane.spicedb.fullname" . }}
  labels:
    {{- include "strato-control-plane.spicedb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "strato-control-plane.spicedb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow control plane to access SpiceDB
    - from:
        - podSelector:
            matchLabels:
              {{- include "strato-control-plane.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: control-plane
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
    # Allow schema job to access SpiceDB
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: spicedb-schema
      ports:
        - protocol: TCP
          port: 50051
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Allow database access
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
