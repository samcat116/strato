{{- if .Values.gateway.enabled }}
{{- $fullName := include "strato-control-plane.fullname" . }}
{{- $gwName := include "strato-control-plane.gateway.name" . }}
{{- $gwNamespace := include "strato-control-plane.gateway.namespace" . }}
{{- $svcPort := .Values.service.port }}
{{- $frontendPort := .Values.frontend.service.port }}
# UI/API + frontend, TLS terminated at the Gateway. Gateway API selects the
# most specific path prefix regardless of rule order, so the control-plane
# prefixes win over the frontend catch-all without explicit ordering.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: {{ .Values.gateway.listeners.web }}
  hostnames:
    - {{ include "strato-control-plane.gateway.webHost" . | quote }}
  rules:
    # Control-plane routes. /organizations is the SCIM protocol + token
    # management surface and /ssf is the RFC 8935 push-delivery callback
    # (POST /ssf/events/:streamID) that external SSF transmitters POST to; both
    # bypass the frontend, so Next.js pages must not live under either prefix.
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /auth
        - path:
            type: PathPrefix
            value: /agent
        - path:
            type: PathPrefix
            value: /health
        - path:
            type: PathPrefix
            value: /organizations
        - path:
            type: PathPrefix
            value: /ssf
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
    {{- if .Values.frontend.enabled }}
    # Frontend catch-all.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $fullName }}-frontend
          port: {{ $frontendPort }}
    {{- end }}
{{- if and .Values.spire.enabled .Values.spire.envoy.enabled }}
---
# Agent mTLS (WebSocket + telemetry ingest) — SNI passthrough to the Envoy
# sidecar, which terminates mTLS and verifies the agent SVID client cert.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ $fullName }}-agents
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: {{ .Values.gateway.listeners.agents }}
  hostnames:
    - {{ include "strato-control-plane.gateway.agentsHost" . | quote }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ .Values.spire.envoy.agentPort }}
{{- end }}
{{- if .Values.spire.enabled }}
---
# SPIRE server node-attestation API — SNI passthrough; SPIRE does its own TLS.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: {{ $fullName }}-spire
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $gwNamespace }}
      sectionName: {{ .Values.gateway.listeners.spire }}
  hostnames:
    - {{ include "strato-control-plane.gateway.spireHost" . | quote }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}-spire-server
          port: {{ .Values.spire.service.grpcPort }}
{{- end }}
{{- end }}
