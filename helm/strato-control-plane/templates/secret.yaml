{{- /*
Secret holding the external database password when it is supplied inline
(release-generated credentials live in credentials-secret.yaml).
*/}}
{{- if and (not .Values.postgresql.enabled) .Values.externalDatabase.password (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-external-db
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
type: Opaque
data:
  db-password: {{ .Values.externalDatabase.password | b64enc | quote }}
{{- end }}
