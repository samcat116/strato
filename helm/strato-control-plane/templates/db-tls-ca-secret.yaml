{{- if .Values.strato.database.tlsCACert }}
# CA bundle used by the control plane to verify the Postgres server certificate
# when strato.database.tls is prefer/require (issue #56). Mounted read-only into
# the control-plane pod at /etc/strato/db-tls/ca.crt.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-db-tls-ca
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.crt: |
    {{- .Values.strato.database.tlsCACert | nindent 4 }}
{{- end }}
