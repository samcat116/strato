{{- if .Values.spire.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-spire-server
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: spire-server
data:
  server.conf: |
    server {
        bind_address = "0.0.0.0"
        bind_port = "8081"
        trust_domain = "{{ .Values.spire.trustDomain }}"
        data_dir = "/var/lib/spire/server"
        log_level = "{{ .Values.spire.logLevel }}"
        log_format = "json"

        # CA certificate TTL
        ca_ttl = "{{ .Values.spire.caTTL }}"

        # Default SVID TTLs
        default_x509_svid_ttl = "{{ .Values.spire.svidTTL }}"
        default_jwt_svid_ttl = "{{ .Values.spire.jwtSvidTTL }}"

        # Federation settings
        federation {
            bundle_endpoint {
                address = "0.0.0.0"
                port = 8443
            }
        }
    }

    plugins {
        DataStore "sql" {
            plugin_data {
                database_type = "postgres"
                {{- /*
                Follow the chart-wide TLS mode instead of hardcoding disable.
                SPIRE's sql plugin uses lib/pq semantics where plain `require`
                encrypts but skips server-cert verification, so map require to
                verify-full — same reasoning as the SpiceDB datastore URI.
                Under the verify modes lib/pq needs a root CA it trusts: when
                the chart carries one (strato.database.tlsCACert) point
                sslrootcert at its mount. Modes below require (prefer/allow)
                keep their fallback semantics and are left untouched.
                The password is deliberately absent from the DSN: lib/pq falls
                back to the PGPASSWORD environment variable, which keeps
                arbitrary secret values out of keyword/value parsing.
                */}}
                {{- $tlsMode := include "strato-control-plane.databaseTLS" . }}
                {{- $sslQuery := printf "sslmode=%s" $tlsMode }}
                {{- if eq $tlsMode "require" }}
                  {{- $sslQuery = "sslmode=verify-full" }}
                {{- end }}
                {{- if and .Values.strato.database.tlsCACert (or (eq $tlsMode "require") (hasPrefix "verify" $tlsMode)) }}
                  {{- $sslQuery = printf "%s sslrootcert=/etc/spire/db-tls/ca.crt" $sslQuery }}
                {{- end }}
                connection_string = "host={{ include "strato-control-plane.databaseHost" . }} port={{ include "strato-control-plane.databasePort" . }} dbname=spire user={{ .Values.spire.database.username }} {{ $sslQuery }}"
            }
        }

        NodeAttestor "join_token" {
            plugin_data {}
        }

        {{- if .Values.spire.attestors.k8sPsat.enabled }}
        {{- /*
        Allow-list entries must be "namespace:serviceaccount". When unset,
        default to the agent DaemonSet's own service account — the identity
        that actually presents the projected token.
        */}}
        {{- $allowList := .Values.spire.attestors.k8sPsat.serviceAccountAllowList }}
        {{- if not $allowList }}
          {{- $allowList = list (printf "%s:%s-spire-agent" .Release.Namespace (include "strato-control-plane.fullname" .)) }}
        {{- end }}
        NodeAttestor "k8s_psat" {
            plugin_data {
                clusters = {
                    "{{ .Values.spire.clusterName }}" = {
                        service_account_allow_list = {{ toJson $allowList }}
                    }
                }
            }
        }
        {{- end }}

        KeyManager "disk" {
            plugin_data {
                keys_path = "/var/lib/spire/server/keys"
            }
        }

        {{- if .Values.spire.notifier.k8sbundle.enabled }}
        Notifier "k8sbundle" {
            plugin_data {
                namespace = "{{ .Release.Namespace }}"
                config_map = "{{ include "strato-control-plane.fullname" . }}-spire-bundle"
            }
        }
        {{- end }}
    }

    health_checks {
        listener_enabled = true
        bind_address = "0.0.0.0"
        bind_port = "8080"
        live_path = "/live"
        ready_path = "/ready"
    }
    {{- if include "strato-control-plane.metricsExposed" . }}

    # Expose SPIRE server telemetry (incl. the CA SVID-signing counters
    # spire_server_server_ca_sign_x509_svid / _jwt_svid) for Prometheus to
    # scrape. Backs the control plane's Workload Identity "Issuance" panel.
    telemetry {
        Prometheus {
            host = "0.0.0.0"
            port = 9988
        }
    }
    {{- end }}
{{- end }}
