{{- if not .Values.spire.enabled }}
{{- fail "spire.enabled must be true: agents authenticate to the control plane only with a SPIRE-issued SVID, so disabling SPIRE yields a control plane that refuses every agent connection. Set spire.enabled=true, or point the chart at an external SPIRE server via spire.controlPlane.serverApiAddress." }}
{{- end }}
{{- if and .Values.ingress.enabled (not .Values.gateway.enabled) }}
{{- fail "ingress.enabled requires gateway.enabled: the legacy Ingress routes /agent to the plain HTTP service port, so agent connections terminate TLS at the Ingress and never reach the Envoy mTLS sidecar. No client certificate arrives, and the control plane rejects every agent (it accepts X-Forwarded-Client-Cert only from the pod-local sidecar over loopback, so an Ingress cannot forward one either). Enable the Gateway, which routes agents.<host> as TLS passthrough to the sidecar, or expose the agent-mtls port yourself and leave the Ingress disabled." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strato-control-plane.fullname" . }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    # matchLabels is immutable on an existing Deployment, so the component label
    # is deliberately absent here; it lives on the pod template and on the
    # Service/PDB/NetworkPolicy selectors (all mutable), which is what stops
    # cross-matching other pods that share the name/instance labels.
    matchLabels:
      {{- include "strato-control-plane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "strato-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "strato-control-plane.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.initContainers.waitForDB.enabled }}
        - name: wait-for-db
          image: {{ default "busybox:1.36.1" .Values.initContainers.waitForDB.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -w 1 -z {{ include "strato-control-plane.databaseWaitHost" . }} {{ .Values.strato.database.port }}; do echo waiting for database; sleep 2; done
        {{- end }}
        {{- if and .Values.spicedb.enabled .Values.initContainers.waitForSpiceDB.enabled }}
        - name: wait-for-spicedb
          image: {{ default "busybox:1.36.1" .Values.initContainers.waitForSpiceDB.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -w 1 -z {{ include "strato-control-plane.spicedb.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local {{ .Values.spicedb.service.grpcPort }}; do echo waiting for SpiceDB; sleep 2; done
        {{- end }}
        {{- if or .Values.valkey.enabled .Values.externalValkey.host }}
        - name: wait-for-valkey
          image: {{ default "busybox:1.36.1" .Values.initContainers.waitForDB.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -w 1 -z {{ include "strato-control-plane.valkeyHost" . }}{{- if .Values.valkey.enabled }}.{{ .Release.Namespace }}.svc.cluster.local{{- end }} {{ include "strato-control-plane.valkeyPort" . }}; do echo waiting for Valkey; sleep 2; done
        {{- end }}
      containers:
        {{- if and .Values.spire.enabled .Values.spire.envoy.enabled }}
        - name: envoy-sidecar
          image: "{{ .Values.spire.envoy.image.repository }}:{{ .Values.spire.envoy.image.tag }}"
          imagePullPolicy: {{ .Values.spire.envoy.image.pullPolicy }}
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          ports:
            - name: agent-mtls
              containerPort: {{ .Values.spire.envoy.agentPort }}
              protocol: TCP
            - name: envoy-health
              containerPort: {{ .Values.spire.envoy.healthPort }}
              protocol: TCP
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: spire-agent-socket
              mountPath: /var/run/spire/sockets
              readOnly: true
          resources:
            {{- toYaml .Values.spire.envoy.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ready
              port: envoy-health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: envoy-health
            initialDelaySeconds: 5
            periodSeconds: 5
        {{- end }}
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./App"
            - "serve"
            - "--env"
            - "production"
            - "--hostname"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # Build identity, surfaced on /health/* so a given response can be
            # traced back to an exact version/commit. gitSHA defaults to the image
            # tag when not set explicitly via .Values.strato.gitSHA.
            - name: STRATO_VERSION
              value: "{{ .Values.image.tag | default .Chart.AppVersion }}"
            - name: STRATO_GIT_SHA
              value: "{{ .Values.strato.gitSHA | default (.Values.image.tag | default .Chart.AppVersion) }}"
            - name: LOG_LEVEL
              value: "{{ .Values.strato.logLevel }}"
            # Image storage. `filesystem` writes to the pod's ephemeral disk —
            # see the warning on strato.imageStorage in values.yaml.
            - name: IMAGE_STORAGE_BACKEND
              value: "{{ .Values.strato.imageStorage.backend }}"
            {{- if eq .Values.strato.imageStorage.backend "filesystem" }}
            - name: IMAGE_STORAGE_PATH
              value: "{{ .Values.strato.imageStorage.path }}"
            {{- else }}
            {{- /* Fail at install time rather than crashlooping on the
                   control plane's own IMAGE_S3_BUCKET guard. */}}
            - name: IMAGE_S3_BUCKET
              value: {{ required "strato.imageStorage.s3.bucket is required when strato.imageStorage.backend is 's3'" .Values.strato.imageStorage.s3.bucket | quote }}
            {{- with .Values.strato.imageStorage.s3.endpoint }}
            - name: IMAGE_S3_ENDPOINT
              value: "{{ . }}"
            {{- end }}
            - name: IMAGE_S3_REGION
              value: "{{ .Values.strato.imageStorage.s3.region }}"
            {{- if .Values.strato.imageStorage.s3.virtualHostStyle }}
            - name: IMAGE_S3_VIRTUAL_HOST_STYLE
              value: "true"
            {{- end }}
            {{- $s3Secret := include "strato-control-plane.imageStorageSecretName" . }}
            {{- if $s3Secret }}
            - name: IMAGE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $s3Secret }}
                  key: "{{ .Values.strato.imageStorage.s3.existingSecretAccessKeyIdKey }}"
            - name: IMAGE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $s3Secret }}
                  key: "{{ .Values.strato.imageStorage.s3.existingSecretSecretAccessKeyKey }}"
            {{- end }}
            {{- end }}
            - name: DATABASE_HOST
              value: "{{ include "strato-control-plane.databaseHost" . }}"
            - name: DATABASE_PORT
              value: "{{ .Values.strato.database.port }}"
            - name: DATABASE_NAME
              value: "{{ .Values.strato.database.name }}"
            - name: DATABASE_USERNAME
              value: "{{ .Values.strato.database.username }}"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "strato-control-plane.databaseSecretName" . }}"
                  key: "{{ include "strato-control-plane.databaseSecretKey" . }}"
            # Encrypt the Postgres connection (issue #56). Defaults by topology
            # (disable for the bundled in-cluster DB, require for external); set
            # strato.database.tls to override. When a CA bundle is supplied it's
            # mounted below and its path handed to the control plane for
            # server-cert verification.
            - name: DATABASE_TLS
              value: "{{ include "strato-control-plane.databaseTLS" . }}"
            {{- if .Values.strato.database.tlsCACert }}
            - name: DATABASE_TLS_CA_CERT_PATH
              value: "/etc/strato/db-tls/ca.crt"
            {{- end }}
            {{- if .Values.spicedb.enabled }}
            - name: SPICEDB_ENDPOINT
              value: "http://{{ include "strato-control-plane.spicedb.fullname" . }}:{{ .Values.spicedb.service.httpPort }}"
            - name: SPICEDB_PRESHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: "{{ include "strato-control-plane.spicedb.fullname" . }}-config"
                  key: "preshared-key"
            {{- end }}
            {{- if .Values.strato.secretEncryption.existingSecret }}
            # At-rest encryption key for stored secrets (OIDC client secrets).
            - name: STRATO_SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.strato.secretEncryption.existingSecret }}"
                  key: "{{ .Values.strato.secretEncryption.key }}"
            {{- end }}
            - name: WEBAUTHN_RELYING_PARTY_ID
              value: "{{ include "strato-control-plane.webauthnRelyingPartyId" . }}"
            - name: WEBAUTHN_RELYING_PARTY_NAME
              value: "{{ .Values.strato.webauthn.relyingPartyName }}"
            - name: WEBAUTHN_RELYING_PARTY_ORIGIN
              value: "{{ include "strato-control-plane.webauthnOrigin" . }}"
            # Enable Secure session cookies + HSTS only when browsers reach us over
            # HTTPS. Derived from the resolved WebAuthn origin's scheme so it tracks
            # exactly what that origin considers HTTPS — an explicit https:// origin
            # override or ingress.tls — and plaintext installs don't set a Secure
            # cookie the browser would drop. Force with strato.httpTlsEnabled.
            - name: HTTP_TLS_ENABLED
              value: "{{ include "strato-control-plane.tlsEnabled" . }}"
            # Base URL for OIDC issuer/redirect URIs. Without it the code falls
            # back to http://localhost:8080, which breaks OIDC login in-cluster;
            # default to the resolved WebAuthn origin (the URL browsers visit)
            # so the two can never disagree unless explicitly overridden.
            - name: BASE_URL
              value: "{{ .Values.strato.baseUrl | default (include "strato-control-plane.webauthnOrigin" .) }}"
            {{- with .Values.strato.oidc }}
            {{- if .discoveryAllowedHosts }}
            - name: OIDC_DISCOVERY_ALLOWED_HOSTS
              value: "{{ join "," .discoveryAllowedHosts }}"
            {{- end }}
            {{- if .discoveryAllowedSuffixes }}
            - name: OIDC_DISCOVERY_ALLOWED_SUFFIXES
              value: "{{ join "," .discoveryAllowedSuffixes }}"
            {{- end }}
            {{- end }}
            {{- if .Values.strato.lokiEndpoint }}
            # Loki base URL for VM console-log queries (and the loki audit
            # backend). The chart ships no Loki, so this is opt-in.
            - name: LOKI_ENDPOINT
              value: "{{ .Values.strato.lokiEndpoint }}"
            {{- end }}
            {{- if and .Values.gateway.enabled .Values.spire.enabled .Values.spire.envoy.enabled }}
            # EXTERNAL_HOSTNAME seeds the generated agent WebSocket URL (and, via
            # the installer, the telemetry-ingest origin). With mTLS on, agents
            # must dial the agents SNI passthrough listener so the Envoy sidecar
            # terminates the SVID and adds XFCC; the web listener terminates TLS
            # itself and would strip the client cert, so mTLS auth would reject
            # the connection. Point it at agents.<host> rather than the web host.
            - name: EXTERNAL_HOSTNAME
              value: "{{ include "strato-control-plane.gateway.agentsHost" . }}"
            {{- else if .Values.strato.externalHostname }}
            - name: EXTERNAL_HOSTNAME
              value: "{{ .Values.strato.externalHostname }}"
            {{- end }}
            {{- if .Values.spire.enabled }}
            # SPIFFE/SPIRE authentication: the agent WebSocket handler enforces
            # mTLS via the Envoy sidecar, and there is no other way for an agent
            # to authenticate. Always on — the chart refuses to render with
            # spire.enabled=false.
            - name: SPIRE_ENABLED
              value: "true"
            - name: SPIRE_TRUST_DOMAIN
              value: "{{ .Values.spire.trustDomain }}"
            - name: SPIRE_BUNDLE_REFRESH_INTERVAL
              value: "{{ .Values.spire.controlPlane.bundleRefreshInterval }}"
            # SPIRE server gRPC API, required for the control-plane-driven
            # agent registration flow (join-token provisioning and entry
            # revocation on agent removal). Defaults to this chart's SPIRE
            # server Service.
            - name: SPIRE_SERVER_API_ADDRESS
              value: "{{ .Values.spire.controlPlane.serverApiAddress | default (printf "%s-spire-server.%s.svc.cluster.local:%v" (include "strato-control-plane.fullname" .) .Release.Namespace .Values.spire.service.grpcPort) }}"
            {{- if .Values.spire.controlPlane.workloadApi.enabled }}
            # SPIFFE Workload API socket of the node-local SPIRE agent. With a
            # TCP SPIRE_SERVER_API_ADDRESS the control plane fetches its own
            # SVID here and dials the SPIRE server's admin API with mTLS — the
            # TCP endpoint is TLS-only, so without this the connection dies at
            # the HTTP/2 preface (issue #507). The admin flag on the
            # control-plane entry comes from the entry bootstrap Job.
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix://{{ .Values.spire.controlPlane.workloadApi.socketPath }}"
            {{- end }}
            {{- if .Values.spire.controlPlane.serverPublicAddress }}
            # Public address remote nodes dial for attestation (explicit override).
            - name: SPIRE_SERVER_PUBLIC_ADDRESS
              value: "{{ .Values.spire.controlPlane.serverPublicAddress }}"
            {{- else if .Values.gateway.enabled }}
            # With the gateway, nodes attest through the SNI-passthrough entry
            # point spire.<host>:443 rather than the compose EXTERNAL_HOSTNAME:8085.
            - name: SPIRE_SERVER_PUBLIC_ADDRESS
              value: "{{ printf "%s:443" (include "strato-control-plane.gateway.spireHost" .) }}"
            {{- end }}
            {{- if and .Values.opentelemetry.enabled .Values.opentelemetry.prometheus.enabled }}
            # Workload Identity "Issuance" panel: read SPIRE's SVID-signing
            # counters from this chart's Prometheus over a rolling 24h window.
            # Metric names default to SPIRE's server CA counters; override with
            # SPIRE_METRICS_X509_SVID_METRIC / SPIRE_METRICS_JWT_SVID_METRIC if a
            # SPIRE version renames them.
            - name: SPIRE_METRICS_PROMETHEUS_URL
              value: "http://{{ include "strato-control-plane.fullname" . }}-prometheus:{{ .Values.opentelemetry.prometheus.service.port }}"
            {{- end }}
            {{- if .Values.spire.notifier.k8sbundle.enabled }}
            # Trust bundle published to a ConfigMap by SPIRE's k8sbundle
            # notifier and mounted below. With it the control plane re-verifies
            # the client certificate Envoy forwards in XFCC instead of trusting
            # the URI assertion alone.
            - name: SPIRE_TRUST_BUNDLE_PATH
              value: /run/spire/bundle/bundle.crt
            {{- end }}
            {{- end }}
            {{- if .Values.opentelemetry.enabled }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.opentelemetry.serviceName }}"
            - name: OTEL_METRICS_ENABLED
              value: "{{ .Values.opentelemetry.metrics.enabled }}"
            - name: OTEL_LOGS_ENABLED
              value: "{{ .Values.opentelemetry.logs.enabled }}"
            - name: OTEL_TRACES_ENABLED
              value: "{{ .Values.opentelemetry.traces.enabled }}"
            {{- if .Values.opentelemetry.collector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "strato-control-plane.fullname" . }}-otel-collector:{{ .Values.opentelemetry.collector.service.grpcPort }}"
            {{- else if .Values.opentelemetry.collector.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.opentelemetry.collector.endpoint }}"
            {{- end }}
            {{- else }}
            # Disable OpenTelemetry when not enabled
            - name: OTEL_METRICS_ENABLED
              value: "false"
            - name: OTEL_LOGS_ENABLED
              value: "false"
            - name: OTEL_TRACES_ENABLED
              value: "false"
            {{- end }}
            # Valkey is required for control-plane coordination (agent presence,
            # singleton sweeps, scheduler reservations — issue #258); the
            # valkeyHost helper fails the render when neither valkey.enabled nor
            # externalValkey.host provides one.
            - name: VALKEY_HOST
              value: "{{ include "strato-control-plane.valkeyHost" . }}"
            - name: VALKEY_PORT
              value: "{{ include "strato-control-plane.valkeyPort" . }}"
            - name: VALKEY_DATABASE
              value: "{{ .Values.externalValkey.database | default 0 }}"
            {{- if or (and .Values.valkey.enabled .Values.valkey.auth.enabled) .Values.externalValkey.password }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "strato-control-plane.valkeySecretName" . }}"
                  key: "{{ include "strato-control-plane.valkeySecretKey" . }}"
            {{- end }}
            {{- with .Values.extraEnv }}
            # Operator-supplied passthrough for env vars without a dedicated
            # chart knob (SSF_*, AUDIT_*, RATE_LIMIT_*, SCHEDULING_STRATEGY,
            # STRATO_DEFAULT_NETWORK_*, ...). Rendered with tpl.
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path | default "/health/live" }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path | default "/health/ready" }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
            successThreshold: {{ .Values.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- $spireBundle := and .Values.spire.enabled .Values.spire.notifier.k8sbundle.enabled }}
          {{- $workloadApi := and .Values.spire.enabled .Values.spire.controlPlane.workloadApi.enabled }}
          {{- if or .Values.strato.database.tlsCACert $spireBundle $workloadApi }}
          volumeMounts:
            {{- if .Values.strato.database.tlsCACert }}
            - name: db-tls-ca
              mountPath: /etc/strato/db-tls
              readOnly: true
            {{- end }}
            {{- if $spireBundle }}
            - name: spire-bundle
              mountPath: /run/spire/bundle
              readOnly: true
            {{- end }}
            {{- if $workloadApi }}
            # Workload API socket dir from the spire-agent DaemonSet hostPath;
            # source of the control plane's own SVID for the mTLS admin path.
            - name: spire-agent-socket
              mountPath: {{ dir .Values.spire.controlPlane.workloadApi.socketPath }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or (and .Values.spire.enabled .Values.spire.envoy.enabled) .Values.strato.database.tlsCACert $spireBundle $workloadApi }}
      volumes:
        {{- if and .Values.spire.enabled .Values.spire.envoy.enabled }}
        - name: envoy-config
          configMap:
            name: {{ include "strato-control-plane.fullname" . }}-envoy-sidecar
        {{- end }}
        {{- if or (and .Values.spire.enabled .Values.spire.envoy.enabled) $workloadApi }}
        # Shared by the Envoy sidecar (SDS) and the control-plane container
        # (Workload API for the mTLS admin path).
        - name: spire-agent-socket
          hostPath:
            path: {{ .Values.spire.envoy.spireAgentSocketDir }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if $spireBundle }}
        # Written by SPIRE server's k8sbundle notifier (see spire-server
        # ConfigMap). Optional so the control plane can start before the SPIRE
        # server publishes it; the kubelet populates the mount once it exists
        # and the control plane's periodic refresh picks it up.
        - name: spire-bundle
          configMap:
            name: {{ include "strato-control-plane.fullname" . }}-spire-bundle
            optional: true
        {{- end }}
        {{- if .Values.strato.database.tlsCACert }}
        - name: db-tls-ca
          secret:
            secretName: {{ include "strato-control-plane.fullname" . }}-db-tls-ca
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
