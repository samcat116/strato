{{- /*
Release credentials, auto-generated on first install when not provided.

All generated values live in this one template because randAlphaNum must be
evaluated exactly once per value per render; generating from a helper called
by multiple templates would produce diverging values. Resolution order for
each credential:

  1. An explicit value in .Values (user override always wins).
  2. The existing <release>-strato-credentials secret (upgrade-stable reuse
     via lookup).
  3. For database passwords, the legacy bitnami <release>-postgresql secret,
     so installs created before auto-generation keep matching their
     initialized PGDATA.
  4. A freshly generated random value.

Note: lookup returns nothing under `helm template` / `--dry-run`, so offline
renders generate new values each time. That only affects rendering; a real
install/upgrade sees the live secret and stays stable.

The SpiceDB config secret is emitted here too (moved from secret.yaml)
because its datastore-conn-uri needs the resolved database password in
plaintext at template time.
*/}}
{{- if or .Values.postgresql.enabled .Values.spicedb.enabled }}
{{- $credsName := printf "%s-strato-credentials" .Release.Name }}
{{- $existingData := dict }}
{{- with lookup "v1" "Secret" .Release.Namespace $credsName }}
  {{- $existingData = .data | default dict }}
{{- end }}
{{- $legacyPgData := dict }}
{{- with lookup "v1" "Secret" .Release.Namespace (printf "%s-postgresql" .Release.Name) }}
  {{- $legacyPgData = .data | default dict }}
{{- end }}

{{- $dbPassword := .Values.postgresql.auth.password }}
{{- if and .Values.postgresql.enabled (not $dbPassword) }}
  {{- if hasKey $existingData "db-password" }}
    {{- $dbPassword = index $existingData "db-password" | b64dec }}
  {{- else if hasKey $legacyPgData "password" }}
    {{- $dbPassword = index $legacyPgData "password" | b64dec }}
  {{- else }}
    {{- $dbPassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $pgAdminPassword := .Values.postgresql.auth.postgresPassword }}
{{- if and .Values.postgresql.enabled (not $pgAdminPassword) }}
  {{- if hasKey $existingData "postgres-admin-password" }}
    {{- $pgAdminPassword = index $existingData "postgres-admin-password" | b64dec }}
  {{- else if hasKey $legacyPgData "postgres-password" }}
    {{- $pgAdminPassword = index $legacyPgData "postgres-password" | b64dec }}
  {{- else }}
    {{- $pgAdminPassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}

{{- $spicedbKey := .Values.spicedb.presharedKey }}
{{- if and .Values.spicedb.enabled (not $spicedbKey) }}
  {{- if hasKey $existingData "spicedb-preshared-key" }}
    {{- $spicedbKey = index $existingData "spicedb-preshared-key" | b64dec }}
  {{- else }}
    {{- $spicedbKey = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $credsName }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall` so a reinstall doesn't rotate the database
    # password out from under a retained PostgreSQL PVC.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  db-password: {{ $dbPassword | b64enc | quote }}
  postgres-admin-password: {{ $pgAdminPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.spicedb.enabled }}
  spicedb-preshared-key: {{ $spicedbKey | b64enc | quote }}
  {{- end }}
{{- if .Values.spicedb.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strato-control-plane.spicedb.fullname" . }}-config
  labels:
    {{- include "strato-control-plane.spicedb.labels" . | nindent 4 }}
type: Opaque
data:
  preshared-key: {{ $spicedbKey | b64enc | quote }}
  preshared_key: {{ $spicedbKey | b64enc | quote }}
  {{- if .Values.postgresql.enabled }}
  datastore-conn-uri: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.strato.database.username $dbPassword (include "strato-control-plane.databaseHost" .) .Values.strato.database.port .Values.strato.database.name | b64enc | quote }}
  datastore_uri: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.strato.database.username $dbPassword (include "strato-control-plane.databaseHost" .) .Values.strato.database.port .Values.strato.database.name | b64enc | quote }}
  {{- else if .Values.externalDatabase.password }}
  datastore-conn-uri: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.strato.database.username .Values.externalDatabase.password (include "strato-control-plane.databaseHost" .) .Values.strato.database.port .Values.strato.database.name | b64enc | quote }}
  datastore_uri: {{ printf "postgres://%s:%s@%s:%v/%s?sslmode=disable" .Values.strato.database.username .Values.externalDatabase.password (include "strato-control-plane.databaseHost" .) .Values.strato.database.port .Values.strato.database.name | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
