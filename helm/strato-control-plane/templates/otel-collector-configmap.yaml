{{- if and .Values.opentelemetry.enabled .Values.opentelemetry.collector.enabled }}
{{- /*
  The traces OTLP exporter, or nil when no endpoint is configured. Resolved once
  here so the exporters block and the pipeline below cannot disagree about
  whether it exists — a pipeline referencing an unrendered exporter is a
  collector that crash-loops on "exporter not found" at startup.
*/}}
{{- $tracesExporter := (.Values.opentelemetry.traces.exporter | default dict).otlp | default dict }}
{{- $tracesOTLP := ternary $tracesExporter nil (not (empty $tracesExporter.endpoint)) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-otel-collector
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  otel-collector-config.yaml: |
    extensions:
      # Backs the container's liveness/readiness probes. Without this the
      # collector serves no health endpoint at all and the probes have nothing
      # valid to target.
      health_check:
        endpoint: 0.0.0.0:{{ .Values.opentelemetry.collector.service.healthPort }}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.opentelemetry.collector.service.grpcPort }}
          http:
            endpoint: 0.0.0.0:{{ .Values.opentelemetry.collector.service.httpPort }}

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

      memory_limiter:
        check_interval: 1s
        limit_mib: {{ int (trimSuffix "Mi" .Values.opentelemetry.collector.resources.limits.memory) }}
        spike_limit_mib: {{ div (int (trimSuffix "Mi" .Values.opentelemetry.collector.resources.limits.memory)) 4 }}

      resourcedetection:
        detectors: [env, system]
        timeout: 5s

    exporters:
      debug:
        verbosity: normal

      {{- if .Values.opentelemetry.prometheus.enabled }}
      prometheusremotewrite:
        endpoint: "http://{{ include "strato-control-plane.fullname" . }}-prometheus:{{ .Values.opentelemetry.prometheus.service.port }}/api/v1/write"
        tls:
          insecure: true
      {{- end }}

      {{- if include "strato-control-plane.metricsExposed" . }}
      # Re-exposes OTLP metrics for scraping. Deliberately independent of the
      # bundled Prometheus above: an external scraper needs this endpoint and
      # nothing else from `opentelemetry.prometheus`.
      prometheus:
        endpoint: "0.0.0.0:{{ .Values.opentelemetry.collector.service.prometheusPort }}"
      {{- end }}

      {{- if $tracesOTLP }}
      # Forwards spans to an external trace backend. Named otlp/traces rather
      # than plain otlp so it can never be mistaken for the otlp *receiver*
      # above, which speaks the same protocol in the other direction.
      otlp/traces:
        endpoint: "{{ $tracesOTLP.endpoint }}"
        tls:
          insecure: {{ $tracesOTLP.insecure }}
          {{- with $tracesOTLP.caFile }}
          ca_file: "{{ . }}"
          {{- end }}
        {{- with $tracesOTLP.headers }}
        headers:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- end }}

    service:
      extensions: [health_check]

      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [debug{{- if .Values.opentelemetry.prometheus.enabled }}, prometheusremotewrite{{- end }}{{- if include "strato-control-plane.metricsExposed" . }}, prometheus{{- end }}]

        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection]
          # With a real backend configured, `debug` is dropped rather than kept
          # alongside it: at any real span rate it turns every batch into
          # collector stdout, which the cluster's log shipper then pays to store.
          exporters: [{{ if $tracesOTLP }}otlp/traces{{ else }}debug{{ end }}]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [debug]

      telemetry:
        logs:
          level: info
        metrics:
          level: detailed
          address: 0.0.0.0:{{ .Values.opentelemetry.collector.service.metricsPort }}
{{- end }}
