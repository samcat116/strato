{{/*
S3 credentials for image storage, created only when values carry an access key
and no existingSecret was supplied. Leaving both empty is the preferred setup on
clusters with IRSA or workload identity — the pod then needs no static keys.
*/}}
{{- if and (eq .Values.strato.imageStorage.backend "s3") (not .Values.strato.imageStorage.s3.existingSecret) .Values.strato.imageStorage.s3.accessKeyId }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-image-storage
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.strato.imageStorage.s3.existingSecretAccessKeyIdKey }}: {{ .Values.strato.imageStorage.s3.accessKeyId | quote }}
  {{ .Values.strato.imageStorage.s3.existingSecretSecretAccessKeyKey }}: {{ required "strato.imageStorage.s3.secretAccessKey is required when accessKeyId is set" .Values.strato.imageStorage.s3.secretAccessKey | quote }}
{{- end }}
