{{- if .Values.spire.enabled }}
{{- /*
Resolve the SPIRE database password:
  1. An explicit value in .Values.spire.database.password (user override wins).
  2. The existing <release>-spire secret (upgrade-stable reuse via lookup).
  3. A freshly generated random value.

Note: lookup returns nothing under `helm template` / `--dry-run`, so offline
renders generate a new value each time. That only affects rendering; a real
install/upgrade sees the live secret and stays stable.
*/}}
{{- $spireSecretName := printf "%s-spire" (include "strato-control-plane.fullname" .) }}
{{- $spirePassword := .Values.spire.database.password }}
{{- if not $spirePassword }}
  {{- with lookup "v1" "Secret" .Release.Namespace $spireSecretName }}
    {{- if hasKey (.data | default dict) "database-password" }}
      {{- $spirePassword = index .data "database-password" | b64dec }}
    {{- end }}
  {{- end }}
  {{- if not $spirePassword }}
    {{- $spirePassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $spireSecretName }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: spire-server
  annotations:
    # Survive `helm uninstall` so a reinstall doesn't rotate the password out
    # from under the retained SPIRE datastore.
    helm.sh/resource-policy: keep
type: Opaque
data:
  database-password: {{ $spirePassword | b64enc | quote }}
{{- end }}
