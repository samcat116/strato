{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "strato-control-plane.fullname" . }}-migrate
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "strato-control-plane.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.initContainers.waitForDB.enabled }}
        - name: wait-for-db
          image: {{ default "busybox:1.36.1" .Values.initContainers.waitForDB.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -w 1 -z {{ include "strato-control-plane.databaseWaitHost" . }} {{ .Values.strato.database.port }}; do echo waiting for database; sleep 2; done
        {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Run as production (matching the Deployment) so Environment.detect()
          # never resolves to development — the DATABASE_TLS default and other
          # production behavior then align with the running control plane.
          command: ["./App", "migrate", "--env", "production", "--yes"]
          env:
            - name: LOG_LEVEL
              value: "{{ .Values.strato.logLevel }}"
            - name: DATABASE_HOST
              value: "{{ include "strato-control-plane.databaseHost" . }}"
            - name: DATABASE_PORT
              value: "{{ .Values.strato.database.port }}"
            - name: DATABASE_NAME
              value: "{{ .Values.strato.database.name }}"
            - name: DATABASE_USERNAME
              value: "{{ .Values.strato.database.username }}"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "strato-control-plane.databaseSecretName" . }}"
                  key: "{{ include "strato-control-plane.databaseSecretKey" . }}"
            # Encrypt the Postgres connection for the migration too (issue #56),
            # matching the control-plane deployment.
            - name: DATABASE_TLS
              value: "{{ include "strato-control-plane.databaseTLS" . }}"
            {{- if .Values.strato.database.tlsCACert }}
            - name: DATABASE_TLS_CA_CERT_PATH
              value: "/etc/strato/db-tls/ca.crt"
            {{- end }}
            # The migrate command boots the full application, which requires
            # Valkey for the coordination layer (issue #258).
            - name: VALKEY_HOST
              value: "{{ include "strato-control-plane.valkeyHost" . }}"
            - name: VALKEY_PORT
              value: "{{ include "strato-control-plane.valkeyPort" . }}"
            - name: VALKEY_DATABASE
              value: "{{ .Values.externalValkey.database | default 0 }}"
            {{- if or (and .Values.valkey.enabled .Values.valkey.auth.enabled) .Values.externalValkey.password }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ include "strato-control-plane.valkeySecretName" . }}"
                  key: "{{ include "strato-control-plane.valkeySecretKey" . }}"
            {{- end }}
          {{- if .Values.strato.database.tlsCACert }}
          volumeMounts:
            - name: db-tls-ca
              mountPath: /etc/strato/db-tls
              readOnly: true
          {{- end }}
      {{- if .Values.strato.database.tlsCACert }}
      volumes:
        - name: db-tls-ca
          secret:
            secretName: {{ include "strato-control-plane.fullname" . }}-db-tls-ca
      {{- end }}
{{- end }}
