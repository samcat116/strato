apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "strato-control-plane.fullname" . }}
  labels:
    {{- include "strato-control-plane.labels" . | nindent 4 }}
data:
  {{- /*
  The schema is a verbatim copy of spicedb/schema.zed at the repo root, kept in
  files/spicedb-schema.zed because Helm can only read files inside the chart.
  CI diffs the two copies (helm-test.yml "schema drift" step) — update both
  together, never edit the chart copy by hand.
  */}}
  spicedb-schema.zed: |
    {{- .Files.Get "files/spicedb-schema.zed" | nindent 4 }}
