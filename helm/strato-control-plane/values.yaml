# Default values for strato-control-plane.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Control-plane replicas. Counts above 1 are supported (issue #261): agent
# WebSockets are routed between replicas via Valkey (`agent:{name}:replica`
# keys + pub/sub nudges), all durable state lives in PostgreSQL, and rolling
# deploys just cause agents to reconnect to surviving replicas. Valkey is
# required either way; see docs/architecture/multi-replica.md.
replicaCount: 1

image:
  repository: strato-control-plane
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Frontend (Next.js) configuration
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: strato-frontend
    pullPolicy: IfNotPresent
    tag: "latest"

  service:
    type: ClusterIP
    port: 3000

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

  # Environment variables
  env:
    # Empty means use same origin (ingress handles routing)
    NEXT_PUBLIC_API_URL: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: strato.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: strato-tls
  #    hosts:
  #      - strato.local
  #
  # Example production configuration:
  # enabled: true
  # className: nginx
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  # hosts:
  #   - host: strato.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls:
  #   - secretName: strato-tls
  #     hosts:
  #       - strato.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Health check probes configuration
livenessProbe:
  enabled: true
  path: /health/live
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /health/ready
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Extra environment variables for the control-plane container (also applied to
# the migration Job, which boots the same app). Standard container-env entries,
# rendered through tpl. Use this for settings without a dedicated chart value,
# e.g. SSF_*, AUDIT_*, RATE_LIMIT_*, SCHEDULING_STRATEGY, IMAGE_STORAGE_PATH,
# STRATO_DEFAULT_NETWORK_*, REQUEST_LOGGING.
# extraEnv:
#   - name: SCHEDULING_STRATEGY
#     value: best_fit
#   - name: AUDIT_WEBHOOK_URL
#     valueFrom:
#       secretKeyRef:
#         name: audit-webhook
#         key: url
extraEnv: []

# Strato Control Plane configuration
strato:
  logLevel: info

  # Git commit SHA this image was built from, surfaced on /health/* as gitSHA.
  # Defaults to the image tag / chart appVersion when left empty; set to the full
  # commit SHA in CI for precise build identification.
  gitSHA: ""

  database:
    host: ""  # Will be set from PostgreSQL subchart if enabled
    port: 5432
    name: vapor_database
    username: vapor_username
    # password is stored in secret

    # TLS mode for the Postgres connection, applied to BOTH the control plane
    # (DATABASE_TLS) and SpiceDB (sslmode) — issue #56:
    #   require  - encrypt and fail if the server won't negotiate TLS
    #   prefer   - encrypt if offered, fall back to plaintext otherwise
    #   disable  - plaintext only (trusted network)
    # Leave empty to pick a safe default by topology: `disable` for the bundled
    # in-cluster Postgres (which serves no TLS and never leaves the cluster) and
    # `require` for an external database (postgresql.enabled=false). Set
    # explicitly to override.
    tls: ""
    # Optional PEM CA bundle used to verify the database server certificate.
    # When set, its contents are mounted into the control plane and SpiceDB and
    # the server cert is verified against it under require/verify-* modes
    # (SpiceDB maps `require` to verify-full). It has no effect under `prefer`,
    # which keeps its fall-back-to-plaintext semantics.
    # Leave empty to use the image's system trust store (correct for a
    # publicly-rooted managed database).
    #   tlsCACert: |
    #     -----BEGIN CERTIFICATE-----
    #     ...
    #     -----END CERTIFICATE-----
    tlsCACert: ""

  webauthn:
    # Relying Party ID is typically the domain name (without protocol/port)
    # When empty, will be derived from ingress hostname or default to "localhost"
    relyingPartyId: ""
    relyingPartyName: "Strato"
    # Relying Party Origin is the full URL (protocol + domain + port if non-standard)
    # When empty, will be auto-configured from ingress settings:
    #   - https://<hostname> if TLS is enabled
    #   - http://<hostname> otherwise
    relyingPartyOrigin: ""

  # At-rest encryption of stored secrets (OIDC client secrets, SSF stream
  # auth tokens) — STRATO_SECRET_ENCRYPTION_KEY. Optional: when unset the
  # control plane warns and stores them unencrypted. Point existingSecret at
  # a Secret holding a 32-byte key (hex or base64; `openssl rand -hex 32`).
  # Losing the key makes stored secrets unreadable (re-enter them to recover).
  secretEncryption:
    existingSecret: ""
    key: "encryption-key"

  # External hostname for the control plane (used for WebSocket connections from agents)
  # When empty, will use the first ingress hostname or service name
  externalHostname: ""

  # Base URL used for OIDC issuer and redirect URIs. Leave empty to use the
  # resolved WebAuthn origin (recommended — browsers must reach both at the
  # same URL); set only when OIDC is served from a different public URL.
  baseUrl: ""

  oidc:
    # Override the SSRF allow-list for OIDC discovery/JWKS fetches
    # (OIDC_DISCOVERY_ALLOWED_HOSTS / OIDC_DISCOVERY_ALLOWED_SUFFIXES).
    # Setting either REPLACES the app's built-in default list for that
    # dimension, so include any built-in entries you still need. Empty lists
    # keep the app defaults.
    discoveryAllowedHosts: []
    discoveryAllowedSuffixes: []

  # URL agents use to fetch signed image-download links. Leave empty to use
  # the resolved WebAuthn origin; set explicitly when agents reach the control
  # plane at a different address than browsers do (e.g. an internal LB).
  controlPlaneUrl: ""

  # Loki base URL for VM console-log queries in the UI (e.g.
  # "http://loki.observability:3100"). Empty disables Loki-backed log viewing;
  # the chart does not deploy Loki itself.
  lokiEndpoint: ""

  # Force the Secure session cookie + HSTS on/off. Leave null to auto-detect from
  # the WebAuthn origin scheme (https:// -> true). Set true when TLS is terminated
  # by an external gateway/LoadBalancer that this chart's ingress.tls doesn't cover.
  httpTlsEnabled: null

# SpiceDB configuration
spicedb:
  enabled: true
  nameOverride: ""
  fullnameOverride: ""
  # The spicedb-operator subchart. Nothing in this chart creates a
  # SpiceDBCluster CR — SpiceDB runs as the chart's own StatefulSet — so the
  # operator (a Deployment plus cluster-scoped RBAC) is dead weight unless you
  # manage your own CRs. Off by default.
  operator:
    enabled: false
  image:
    repository: authzed/spicedb
    tag: v1.35.3
    pullPolicy: IfNotPresent
  
  replicaCount: 1

  # Postgres connection-pool sizing for the SpiceDB datastore. SpiceDB's
  # upstream defaults (read 20/20, write 10/10 — min pinned equal to max) hold
  # 30 connections open even when idle, which exhausts small managed databases
  # (e.g. DigitalOcean's 1GB tier caps at 25 connections, ~22 usable for
  # non-superuser roles) and starves the control plane out of booting. These
  # defaults fit a small shared database while leaving headroom for the
  # control plane; raise them for high-throughput installs with a dedicated
  # or larger Postgres. Budgets are per SpiceDB replica — multiply by
  # spicedb.replicaCount.
  datastore:
    connPool:
      read:
        maxOpen: 8
        minOpen: 2
      write:
        maxOpen: 2
        minOpen: 1

  service:
    grpcPort: 50051
    httpPort: 8080
    metricsPort: 9090
    
  # NOTE: SpiceDB's datastore is Postgres; the /data PVC this provisions is
  # unused. It stays enabled by default only because volumeClaimTemplates are
  # immutable — flipping it would break upgrades of existing installs. Safe
  # (and recommended) to set false on fresh installs.
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  # Pre-shared key for authentication.
  # Leave empty to auto-generate a strong key on first install; it is stored
  # in the <release>-strato-credentials secret and reused across upgrades.
  # Retrieve it with:
  #   kubectl get secret <release>-strato-credentials -o jsonpath='{.data.spicedb-preshared-key}' | base64 -d
  presharedKey: ""
  
  # Network policies
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
  
  # Pod disruption budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  
  # Schema initialization
  schema:
    enabled: true
    # Schema content will be loaded from ConfigMap

# PostgreSQL configuration
postgresql:
  enabled: true
  auth:
    database: vapor_database
    username: vapor_username
    # Leave passwords empty to auto-generate strong values on first install;
    # they are stored in the <release>-strato-credentials secret and reused
    # across upgrades. Retrieve with:
    #   kubectl get secret <release>-strato-credentials -o jsonpath='{.data.db-password}' | base64 -d
    password: ""
    postgresPassword: ""
    # The bitnami subchart reads all passwords from the release credentials
    # secret owned by this chart (see templates/credentials-secret.yaml), so
    # the database, the SpiceDB datastore URI, and DATABASE_PASSWORD always
    # stay in sync. Do not change these unless you manage the secret yourself.
    existingSecret: '{{ printf "%s-strato-credentials" .Release.Name }}'
    secretKeys:
      adminPasswordKey: postgres-admin-password
      userPasswordKey: db-password
  primary:
    persistence:
      enabled: true
      size: 20Gi
      
  metrics:
    enabled: false
    
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
    
# External PostgreSQL configuration (if postgresql.enabled is false)
externalDatabase:
  host: ""
  port: 5432
  database: vapor_database
  username: vapor_username
  password: ""  # Set this when using external database

  # Source external-database credentials from a pre-existing Secret instead of
  # the plaintext `password` above — e.g. one provisioned by Terraform alongside
  # a managed database, so no credential is committed to git. When set, `password`
  # is ignored and the chart renders no credential Secret of its own.
  #
  # The referenced Secret must contain:
  #   - existingSecretPasswordKey: the raw DB password (control plane reads it as
  #     DATABASE_PASSWORD and builds its own verified TLS connection).
  #   - existingSecretDatastoreUriKey (only when spicedb.enabled): a complete
  #     SpiceDB/pgx datastore connection string, password included, e.g.
  #       host=db port=5432 user=u password='...' dbname=d sslmode=verify-full sslrootcert=/etc/spicedb/db-tls/ca.crt
  #     (Server-cert verification still uses strato.database.tlsCACert / the CA
  #     mounted at /etc/spicedb/db-tls/ca.crt — the CA is public, not a secret.)
  existingSecret: ""
  existingSecretPasswordKey: "password"
  existingSecretDatastoreUriKey: "datastore-conn-uri"
  
# Migration job configuration
migration:
  enabled: true
  backoffLimit: 3
  
# Init containers
initContainers:
  waitForDB:
    enabled: true
    image: busybox:1.35
    
  waitForSpiceDB:
    enabled: true
    image: busybox:1.35

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Network policies for security
networkPolicy:
  enabled: true
  # Ingress rules - allow traffic from specific sources
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  # Egress rules - allow traffic to specific destinations.
  # When spire.enabled with in-cluster SPIRE, also add TCP 8081 (SPIRE server
  # API for join-token provisioning).
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 50051  # SpiceDB gRPC
        - protocol: TCP
          port: 8080   # SpiceDB HTTP
        - protocol: TCP
          port: 6379   # Valkey/Redis
        - protocol: TCP
          port: 4317   # OTLP export to the otel-collector
        - protocol: TCP
          port: 443    # OIDC discovery/JWKS, SSF transmitters, audit webhooks
        - protocol: TCP
          port: 53     # DNS
        - protocol: UDP
          port: 53     # DNS

# OpenTelemetry configuration
opentelemetry:
  enabled: true
  serviceName: strato-control-plane

  # Enable/disable individual signals
  metrics:
    enabled: true
  logs:
    enabled: true
  traces:
    enabled: true

  # OTel Collector configuration
  collector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.112.0
      pullPolicy: IfNotPresent

    replicaCount: 1

    service:
      grpcPort: 4317
      httpPort: 4318
      metricsPort: 8888
      prometheusPort: 8889

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

    # OTLP exporter endpoint (if not using collector)
    # endpoint: "http://external-collector:4317"

  # Prometheus for metrics storage (if enabled)
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      # NB: there is no Prometheus 2.56 — the previous v2.56.0 pin never
      # resolved. v3.5 is the current LTS line; keep in sync with
      # deploy/compose/docker-compose.yml.
      tag: v3.5.0
      pullPolicy: IfNotPresent

    service:
      port: 9090

    persistence:
      enabled: true
      size: 10Gi

    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi

# Valkey (Redis-compatible) configuration. REQUIRED: the control plane uses
# Valkey for its coordination layer (agent presence, singleton sweep locks,
# scheduler placement reservations) as well as session storage, and fails at
# startup without it. Disable the bundled instance only when pointing
# externalValkey.host at an existing one.
valkey:
  enabled: true
  # Override with Valkey image instead of Redis
  image:
    registry: docker.io
    repository: valkey/valkey
    tag: "8.0"
    pullPolicy: IfNotPresent

  # Standalone architecture for simplicity
  architecture: standalone

  # Authentication
  auth:
    enabled: true
    password: ""  # Auto-generated if empty
    existingSecret: ""
    existingSecretPasswordKey: ""

  # Master node configuration
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

  # Metrics
  metrics:
    enabled: false

  # Network policies
  networkPolicy:
    enabled: false

# External Valkey configuration (when valkey.enabled is false)
externalValkey:
  host: ""
  port: 6379
  password: ""
  database: 0

# SPIRE configuration for agent mTLS authentication
spire:
  enabled: false

  # Trust domain for SPIFFE IDs (e.g., "strato.local")
  trustDomain: "strato.local"

  # Cluster name (for k8s attestation)
  clusterName: "strato"

  # SPIRE Server image
  image:
    repository: ghcr.io/spiffe/spire-server
    tag: "1.9.6"
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Logging level
  logLevel: "INFO"

  # CA certificate TTL
  caTTL: "168h"  # 7 days

  # SVID TTLs
  svidTTL: "1h"
  jwtSvidTTL: "5m"

  # Database configuration (uses the same PostgreSQL as control plane).
  # With the bundled Postgres the chart provisions the `spire` database and
  # role automatically (spire-db-init-job.yaml); with an external database
  # create them yourself, using either the password from the <fullname>-spire
  # secret or — when the external role's password is imposed on you —
  # existingSecret below.
  database:
    username: spire
    # Image for the provisioning job (needs psql; only used when
    # postgresql.enabled).
    initImage: postgres:17-alpine
    # Leave empty to auto-generate a strong password on first install; it is
    # stored in the <release>-spire secret and reused across upgrades. When you
    # provision the `spire` PostgreSQL role, set its password to this value.
    # Retrieve it with:
    #   kubectl get secret <release>-spire -o jsonpath='{.data.database-password}' | base64 -d
    password: ""
    # For external databases whose role password you cannot choose (e.g. DO
    # Managed Postgres generates it), point at a pre-provisioned Secret holding
    # that password instead. Takes precedence over password/auto-generation;
    # the <release>-spire secret is then not created.
    existingSecret: ""
    existingSecretPasswordKey: "database-password"

  # Service configuration
  service:
    type: ClusterIP
    grpcPort: 8081
    federationPort: 8443

  # Persistence
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

  # Resources
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # RBAC
  rbac:
    create: true

  # Node attestors
  attestors:
    # Kubernetes Projected Service Account Token attestor
    k8sPsat:
      enabled: false
      # Entries are "namespace:serviceaccount". Leave empty to allow the
      # chart's own agent DaemonSet service account (the only identity that
      # presents the projected token in this deployment).
      serviceAccountAllowList: []

  # Trust bundle notifier
  notifier:
    k8sbundle:
      enabled: true

  # Control plane integration
  controlPlane:
    # Enable mTLS for agent connections
    enableMTLS: false
    # Trust bundle refresh interval (seconds)
    bundleRefreshInterval: 300
    # Require client certificates
    requireClientCert: true
    # SPIRE server gRPC API address (host:port) for join-token provisioning
    # and entry revocation. Leave empty to use this chart's SPIRE server
    # Service; set only when the SPIRE server runs elsewhere.
    serverApiAddress: ""

  # Envoy sidecar configuration for mTLS termination
  envoy:
    enabled: true
    image:
      repository: envoyproxy/envoy
      tag: "v1.31.0"
      pullPolicy: IfNotPresent
    # Port for agent mTLS connections
    agentPort: 8443
    # Port for Envoy health checks
    healthPort: 8444
    # Port for Envoy admin interface (localhost only)
    adminPort: 9901
    # Directory containing SPIRE Agent socket
    spireAgentSocketDir: /var/run/spire/sockets
    # Full path to SPIRE Agent socket
    spireAgentSocketPath: /var/run/spire/sockets/workload.sock
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi
