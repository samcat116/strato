# Prometheus for the Strato single-host deployment.
#
# Storage for agent host telemetry: hypervisor nodes run Grafana Alloy, which
# remote-writes node metrics through the Envoy mTLS listener
# (/ingest/metrics -> /api/v1/write; see spiffe/envoy.yaml). Ingest happens via
# the remote-write receiver (--web.enable-remote-write-receiver in
# docker-compose.yml), so the only scrape here is Prometheus itself.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # SPIRE server telemetry (SVID-signing counters), scraped only when the
  # spiffe profile is up. Backs the control plane's Workload Identity
  # "Issuance" panel. Absent (profile down), the panel simply reports
  # unavailable. See spiffe/spire-server.conf telemetry block.
  - job_name: spire-server
    static_configs:
      - targets: ["spire-server:9988"]
