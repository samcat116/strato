# SPIRE Server for the single-host SPIFFE compose deployment.
#
# bind_port 8085 is the agent-facing node API (attestation); nodes dial it at
# SPIRE_SERVER_PUBLIC_ADDRESS. The local admin/registration API is served on a
# Unix socket under /tmp/spire-server/private (SPIRE's default), shared with the
# bootstrap one-shot and bridged to TCP for the control plane.
server {
    bind_address = "0.0.0.0"
    bind_port = "8085"
    trust_domain = "strato.local"
    data_dir = "/var/lib/spire/server"
    log_level = "INFO"

    ca_ttl = "168h"
    default_x509_svid_ttl = "1h"
    default_jwt_svid_ttl = "5m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/var/lib/spire/server/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {}

    KeyManager "disk" {
        plugin_data {
            keys_path = "/var/lib/spire/server/keys"
        }
    }
}

health_checks {
    listener_enabled = true
    bind_address = "0.0.0.0"
    bind_port = "8086"
    live_path = "/live"
    ready_path = "/ready"
}

# Expose SPIRE server telemetry (incl. the CA SVID-signing counters
# spire_server_server_ca_sign_x509_svid / _jwt_svid) for Prometheus to scrape.
# The control plane's Workload Identity view reads these over the compose
# Prometheus to populate the "Issuance" panel. Reachable only on the compose
# network (never published to the host).
telemetry {
    Prometheus {
        host = "0.0.0.0"
        port = 9988
    }
}
