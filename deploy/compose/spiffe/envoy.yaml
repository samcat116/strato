# Envoy mTLS front for the Strato control plane (compose SPIFFE deployment).
#
# Containerized topology: the upstream is the
# control-plane compose service (not 127.0.0.1) and SDS is served by the
# control-plane-side spire-agent over the shared workload socket. Terminates
# agent mTLS on :8443, re-forwards the client cert as XFCC so the control plane
# can re-verify the SPIFFE identity.
node:
  id: strato-control-plane
  cluster: strato-control-plane

static_resources:
  listeners:
    - name: agent_mtls_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_certificate_sds_secret_configs:
                  - name: "spiffe://strato.local/control-plane"
                    sds_config:
                      resource_api_version: V3
                      api_config_source:
                        api_type: GRPC
                        transport_api_version: V3
                        grpc_services:
                          - envoy_grpc:
                              cluster_name: spire_agent
                validation_context_sds_secret_config:
                  name: "spiffe://strato.local"
                  sds_config:
                    resource_api_version: V3
                    api_config_source:
                      api_type: GRPC
                      transport_api_version: V3
                      grpc_services:
                        - envoy_grpc:
                            cluster_name: spire_agent
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: agent_mtls
                codec_type: AUTO
                upgrade_configs:
                  - upgrade_type: websocket
                forward_client_cert_details: SANITIZE_SET
                set_current_client_cert_details:
                  uri: true
                  cert: true
                  chain: true
                  dns: false
                  subject: true
                route_config:
                  name: agent_route
                  virtual_hosts:
                    - name: control_plane
                      domains: ["*"]
                      routes:
                        # Telemetry ingest: Alloy on the hypervisor nodes pushes
                        # node metrics and journal logs here with its SPIFFE
                        # SVID as the client cert. The per-route RBAC override
                        # restricts these to agent identities — mTLS alone only
                        # proves trust-domain membership, and e.g. the
                        # control-plane identity must not be able to write
                        # telemetry. Exact-path matches, so they take priority
                        # over the prefix routes below.
                        - match:
                            path: "/ingest/metrics"
                          route:
                            cluster: prometheus
                            prefix_rewrite: "/api/v1/write"
                            timeout: 30s
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    agents-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - authenticated:
                                            principal_name:
                                              prefix: "spiffe://strato.local/agent/"
                        - match:
                            path: "/ingest/logs"
                          route:
                            cluster: loki
                            prefix_rewrite: "/loki/api/v1/push"
                            timeout: 30s
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    agents-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - authenticated:
                                            principal_name:
                                              prefix: "spiffe://strato.local/agent/"
                        # Image/artifact downloads (issue #493): agents fetch
                        # base-image bytes here with their SVID as the client
                        # cert; the control plane re-verifies the forwarded
                        # identity (XFCC) and serves the object. Same RBAC
                        # shape as /ingest/* — restricted to agent identities
                        # so e.g. a telemetry workload's SVID cannot pull
                        # tenant images. Timeout 0: image bodies are tens of
                        # GB and stream for longer than any fixed budget.
                        - match:
                            safe_regex:
                              regex: "^/api/projects/[^/]+/images/[^/]+/download$"
                          route:
                            cluster: control_plane_upstream
                            timeout: 0s
                          typed_per_filter_config:
                            envoy.filters.http.rbac:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                              rbac:
                                rules:
                                  action: ALLOW
                                  policies:
                                    agents-only:
                                      permissions:
                                        - any: true
                                      principals:
                                        - authenticated:
                                            principal_name:
                                              prefix: "spiffe://strato.local/agent/"
                        - match:
                            prefix: "/agent/"
                          route:
                            cluster: control_plane_upstream
                            timeout: 0s
                        - match:
                            prefix: "/"
                          route:
                            cluster: control_plane_upstream
                http_filters:
                  # No listener-level rules: everything is allowed unless a
                  # route overrides via typed_per_filter_config (the /ingest/*
                  # and image-download routes above). Control-plane routes keep
                  # their existing model — the control plane re-verifies the
                  # forwarded client cert (XFCC) itself.
                  #
                  # Note the shape: because the catch-all "/" route below
                  # carries no RBAC, a path that misses a guarded route's
                  # matcher is allowed through, not denied. For the image
                  # download that is deliberate but not load-bearing — the
                  # control plane independently re-verifies the XFCC identity
                  # and requires an agent SVID before serving bytes, so this
                  # RBAC is defense in depth, not the gate. Do not remove the
                  # in-handler check on the strength of this config.
                  - name: envoy.filters.http.rbac
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: health_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8444
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: health
                codec_type: AUTO
                route_config:
                  name: health_route
                  virtual_hosts:
                    - name: health
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/health"
                          route:
                            cluster: control_plane_upstream
                        - match:
                            prefix: "/ready"
                          direct_response:
                            status: 200
                            body:
                              inline_string: "OK"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Envoy runs as a sidecar sharing the control-plane container's network
    # namespace (network_mode: service:control-plane), so the upstream is
    # loopback. The control plane only trusts the forwarded client-cert (XFCC)
    # header from a loopback peer — proof the request passed through Envoy's
    # mTLS verification rather than being spoofed by a direct caller.
    - name: control_plane_upstream
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: control_plane_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8080

    # Telemetry ingest upstreams. Envoy shares the control-plane container's
    # network namespace, which still resolves compose service names through
    # Docker's embedded DNS — hence STRICT_DNS rather than STATIC.
    - name: prometheus
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: prometheus
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: prometheus
                      port_value: 9090

    - name: loki
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: loki
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: loki
                      port_value: 3100

    - name: spire_agent
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: spire_agent
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    pipe:
                      path: /run/spire/agent/sockets/workload.sock

# Admin binds loopback only. Envoy runs in the control-plane container's network
# namespace (network_mode: service:control-plane), so 0.0.0.0 here would expose
# admin on that container's compose-network interface to every other container.
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
