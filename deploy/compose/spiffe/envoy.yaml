# Envoy mTLS front for the Strato control plane (compose SPIFFE deployment).
#
# Adapted from envoy/standalone/envoy.yaml for containers: the upstream is the
# control-plane compose service (not 127.0.0.1) and SDS is served by the
# control-plane-side spire-agent over the shared workload socket. Terminates
# agent mTLS on :8443, re-forwards the client cert as XFCC so the control plane
# can re-verify the SPIFFE identity.
node:
  id: strato-control-plane
  cluster: strato-control-plane

static_resources:
  listeners:
    - name: agent_mtls_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_certificate_sds_secret_configs:
                  - name: "spiffe://strato.local/control-plane"
                    sds_config:
                      resource_api_version: V3
                      api_config_source:
                        api_type: GRPC
                        transport_api_version: V3
                        grpc_services:
                          - envoy_grpc:
                              cluster_name: spire_agent
                validation_context_sds_secret_config:
                  name: "spiffe://strato.local"
                  sds_config:
                    resource_api_version: V3
                    api_config_source:
                      api_type: GRPC
                      transport_api_version: V3
                      grpc_services:
                        - envoy_grpc:
                            cluster_name: spire_agent
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: agent_mtls
                codec_type: AUTO
                upgrade_configs:
                  - upgrade_type: websocket
                forward_client_cert_details: SANITIZE_SET
                set_current_client_cert_details:
                  uri: true
                  cert: true
                  chain: true
                  dns: false
                  subject: true
                route_config:
                  name: agent_route
                  virtual_hosts:
                    - name: control_plane
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/agent/"
                          route:
                            cluster: control_plane_upstream
                            timeout: 0s
                        - match:
                            prefix: "/"
                          route:
                            cluster: control_plane_upstream
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: health_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8444
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: health
                codec_type: AUTO
                route_config:
                  name: health_route
                  virtual_hosts:
                    - name: health
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/health"
                          route:
                            cluster: control_plane_upstream
                        - match:
                            prefix: "/ready"
                          direct_response:
                            status: 200
                            body:
                              inline_string: "OK"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Envoy runs as a sidecar sharing the control-plane container's network
    # namespace (network_mode: service:control-plane), so the upstream is
    # loopback. The control plane only trusts the forwarded client-cert (XFCC)
    # header from a loopback peer — proof the request passed through Envoy's
    # mTLS verification rather than being spoofed by a direct caller.
    - name: control_plane_upstream
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: control_plane_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8080

    - name: spire_agent
      connect_timeout: 5s
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: spire_agent
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    pipe:
                      path: /run/spire/agent/sockets/workload.sock

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
