# Strato single-host deployment.
#
# Quick start:
#   ./setup.sh                 # generates .env with strong secrets (idempotent)
#   docker compose up -d       # builds the small SPIRE helper image, pulls the rest
#   open http://localhost      # first registered user becomes system admin
#
# Agents authenticate with X.509 SVIDs over mTLS by default: a SPIRE server
# issues identities, an Envoy front terminates agent mTLS on :8443, and the
# control plane provisions SPIRE (join token + workload entry) whenever an admin
# creates a registration token. The emitted bootstrap command brings up a
# hypervisor node's spire-agent + strato-agent. See ./spiffe/ for the SPIRE and
# Envoy configuration and deploy/agent/strato-node-bootstrap.sh for the node side.
#
# All credentials come from .env (created by setup.sh, mode 0600); nothing is
# hardcoded here. The one-shot services (spicedb-migrate, spicedb-schema,
# image-storage-init, spire-bootstrap) exit 0 after doing their job — that is
# expected in `docker compose ps`.
#
# For local development from source, use the docker-compose.yml at the
# repository root instead.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor_username
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh to generate .env}
      POSTGRES_DB: vapor_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates the separate spicedb database on first initialization.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor_username -d vapor_database"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: bring the SpiceDB datastore schema up to date.
  spicedb-migrate:
    image: authzed/spicedb:v1.35.3
    command:
      - migrate
      - head
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://vapor_username:${POSTGRES_PASSWORD}@db:5432/spicedb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  spicedb:
    image: authzed/spicedb:v1.35.3
    command:
      - serve
      - --grpc-preshared-key=${SPICEDB_PRESHARED_KEY}
      - --http-enabled
      # Serve the HTTP gateway on 8080 to match the control plane's
      # SPICEDB_ENDPOINT (and the Helm chart). Without this flag SpiceDB
      # defaults HTTP to :8443, so the control plane's REST calls hit a dead
      # port. (Schema loading here still uses gRPC via the spicedb-schema job.)
      - --http-addr=:8080
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://vapor_username:${POSTGRES_PASSWORD}@db:5432/spicedb?sslmode=disable
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:50051"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: load the authorization schema. Safe to re-run on every `up`.
  spicedb-schema:
    image: authzed/zed:latest
    command:
      - schema
      - write
      - /schema/schema.zed
      - --endpoint
      - spicedb:50051
      - --token
      - ${SPICEDB_PRESHARED_KEY}
      - --insecure
    volumes:
      - ../../spicedb/schema.zed:/schema/schema.zed:ro
    depends_on:
      spicedb:
        condition: service_healthy
    restart: "no"

  valkey:
    image: valkey/valkey:8.0-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$VALKEY_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: make the image-storage volume writable by the non-root user the
  # control plane runs as. A fresh named volume is owned by root, but the
  # control-plane image runs as the system `vapor` user (uid 999), so without
  # this it can't write downloaded base images and URL imports fail with a
  # permission error. Runs on every `up`; the chown is idempotent.
  image-storage-init:
    image: alpine
    command: ["chown", "-R", "999:999", "/images"]
    volumes:
      - image_storage:/images
    restart: "no"

  # ---------------------------------------------------------------------------
  # SPIFFE/SPIRE + Envoy mTLS (default agent authentication)
  #
  # The helper image layers the SPIRE binaries onto a shell base (the official
  # ghcr.io/spiffe images are distroless), so the same image serves the server,
  # the one-shot bootstrap, and the control-plane-side agent. It is built
  # locally from ./spiffe/Dockerfile on first `up`.
  # ---------------------------------------------------------------------------
  spire-server:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["spire-server", "run", "-config", "/spiffe/spire-server.conf"]
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_server_data:/var/lib/spire/server
      - spire_server_api:/tmp/spire-server/private
    ports:
      # Node API: hypervisor agents dial this for attestation.
      - "${SPIRE_NODE_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: create the control-plane (Envoy) workload entry, mint the CP-side
  # agent join token, export the trust bundle. Exits 0.
  spire-bootstrap:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["bash", "/spiffe/bootstrap.sh"]
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_server_api:/tmp/spire-server/private
      - spire_handoff:/handoff
    depends_on:
      spire-server:
        condition: service_healthy
    restart: "no"

  # Bridges the SPIRE server admin socket to TCP so the control plane (a
  # different container, non-root uid) can reach the registration API without
  # Unix-socket permission juggling.
  spire-api-bridge:
    image: alpine/socat
    command: ["TCP-LISTEN:8081,fork,reuseaddr", "UNIX-CONNECT:/tmp/spire-server/private/api.sock"]
    volumes:
      - spire_server_api:/tmp/spire-server/private
    depends_on:
      spire-server:
        condition: service_healthy
    restart: unless-stopped

  # Control-plane-side SPIRE agent: serves Envoy's SDS (server SVID + trust
  # bundle). Attests Envoy by unix uid over the shared Workload API socket.
  # pid: host so the unix attestor can resolve the caller's /proc (Envoy runs
  # in its own PID namespace); without it attestation fails with "could not
  # resolve caller information".
  spire-agent-cp:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["bash", "/spiffe/agent-cp-entrypoint.sh"]
    pid: host
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_handoff:/handoff:ro
      - spire_agent_cp_data:/var/lib/spire/agent
      - spire_cp_sockets:/run/spire/agent/sockets
    depends_on:
      spire-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # mTLS front for agent connections. Terminates agent mTLS on :8443, validates
  # client SVIDs against the SPIRE trust bundle, and forwards the client cert
  # (XFCC) so the control plane re-verifies the SPIFFE identity.
  # Envoy runs as a sidecar in the control-plane container's network namespace
  # so it reaches the control plane over loopback — the control plane only
  # trusts the forwarded client-cert (XFCC) header from a loopback peer. Because
  # it shares that namespace, its listener ports (8443 mTLS, 9901 admin) are
  # published on the control-plane service, not here.
  envoy:
    image: envoyproxy/envoy:v1.31.0
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    network_mode: "service:control-plane"
    volumes:
      - ./spiffe/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - spire_cp_sockets:/run/spire/agent/sockets
    # No healthcheck: the distroless Envoy image ships no HTTP client to probe
    # its own /ready listener, and nothing gates on its health. Readiness is
    # observable via the admin interface on 127.0.0.1:9901.
    depends_on:
      - spire-agent-cp
      - control-plane
    restart: unless-stopped

  control-plane:
    image: ghcr.io/samcat116/strato-control-plane:${STRATO_VERSION:-latest}
    # To run from source instead of the published image, comment out `image:`
    # above and uncomment:
    # build:
    #   context: ../..
    #   dockerfile: control-plane/Dockerfile
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: vapor_database
      DATABASE_USERNAME: vapor_username
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      # Postgres runs in this compose network and never leaves the host, so
      # plaintext is acceptable. Override with DATABASE_TLS=require (and
      # DATABASE_TLS_CA_CERT_PATH) if you point this at an external database.
      DATABASE_TLS: ${DATABASE_TLS:-disable}
      SPICEDB_ENDPOINT: http://spicedb:8080
      SPICEDB_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
      WEBAUTHN_RELYING_PARTY_ID: ${WEBAUTHN_RELYING_PARTY_ID}
      WEBAUTHN_RELYING_PARTY_NAME: ${WEBAUTHN_RELYING_PARTY_NAME:-Strato}
      WEBAUTHN_RELYING_PARTY_ORIGIN: ${WEBAUTHN_RELYING_PARTY_ORIGIN}
      # Agent-facing host:port — the Envoy mTLS listener, NOT the browser proxy.
      # setup.sh sets this to <hostname>:<AGENT_MTLS_PORT>. The control plane
      # derives the SPIRE node address from it as <hostname>:8085.
      EXTERNAL_HOSTNAME: ${EXTERNAL_HOSTNAME:-${STRATO_HOSTNAME}}
      # Secure session cookie + HSTS; only when TLS is terminated in front of the
      # proxy (setup.sh sets this from the origin scheme). Defaults off so a
      # plaintext http:// deploy doesn't set a Secure cookie the browser drops.
      HTTP_TLS_ENABLED: ${HTTP_TLS_ENABLED:-false}
      # Base URL agents use to fetch signed image-download links. Must route to
      # the control plane from the agent's network — i.e. the published proxy
      # origin, NOT the in-container :8080 (which only exists on the internal
      # network). Set to the browser origin by setup.sh.
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL}
      # Where the control plane writes downloaded base images. Backed by the
      # image_storage volume, made vapor-writable by image-storage-init.
      IMAGE_STORAGE_PATH: /app/images
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_METRICS_ENABLED: "false"
      OTEL_LOGS_ENABLED: "false"
      OTEL_TRACES_ENABLED: "false"
      # SPIFFE/SPIRE: enable mTLS agent auth and SPIRE provisioning. The server
      # API is reached over the socat bridge; the trust bundle (exported by
      # spire-bootstrap) lets the control plane re-verify forwarded client
      # certs. Trust domain defaults to strato.local (see ./spiffe/*.conf).
      SPIRE_ENABLED: "true"
      SPIRE_SERVER_API_ADDRESS: spire-api-bridge:8081
      SPIRE_TRUST_BUNDLE_PATH: /run/spire/handoff/bundle.pem
    ports:
      # Published on behalf of the Envoy sidecar (network_mode: service:
      # control-plane). Agents dial wss://<host>:<AGENT_MTLS_PORT>/agent/ws;
      # 9901 is Envoy's admin, loopback only. The control plane's own :8080 is
      # not published — it stays on the internal network behind the proxy.
      - "${AGENT_MTLS_PORT:-8443}:8443"
      - "127.0.0.1:9901:9901"
    volumes:
      - image_storage:/app/images
      - spire_handoff:/run/spire/handoff:ro
    depends_on:
      db:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      spicedb-schema:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      image-storage-init:
        condition: service_completed_successfully
      spire-bootstrap:
        condition: service_completed_successfully
      spire-api-bridge:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ghcr.io/samcat116/strato-frontend:${STRATO_VERSION:-latest}
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - control-plane
    restart: unless-stopped

  # Only the proxy publishes a port; everything else stays on the internal
  # network. Routes /api, /auth, /agent, /health, /organizations to the
  # control plane and everything else to the frontend.
  proxy:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - control-plane
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  image_storage:
  spire_server_data:
  spire_server_api:
  spire_handoff:
  spire_agent_cp_data:
  spire_cp_sockets:
