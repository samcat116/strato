# Strato single-host deployment.
#
# Quick start:
#   ./setup.sh                 # generates .env with strong secrets (idempotent)
#   docker compose up -d       # builds the small SPIRE helper image, pulls the rest
#   open http://localhost      # first registered user becomes system admin
#
# Agents authenticate only with X.509 SVIDs over mTLS: a SPIRE server issues
# identities, an Envoy front terminates agent mTLS on :8443, and the control
# plane provisions SPIRE (join token + workload entry) whenever an admin
# enrolls a node. The emitted bootstrap command brings up a
# hypervisor node's spire-agent + strato-agent (plus Alloy host telemetry). See
# ./spiffe/ for the SPIRE and Envoy configuration and deploy/agent/install.sh
# for the node side.
#
# All credentials come from .env (created by setup.sh, mode 0600); nothing is
# hardcoded here. The one-shot services (image-storage-init, spire-bootstrap)
# exit 0 after doing their job — that is expected in `docker compose ps`.
#
# For local development from source, use the docker-compose.yml at the
# repository root instead.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor_username
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./setup.sh to generate .env}
      POSTGRES_DB: vapor_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor_username -d vapor_database"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8.0-alpine
    command: ["valkey-server", "--requirepass", "${VALKEY_PASSWORD}"]
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$$VALKEY_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: make the image-storage volume writable by the non-root user the
  # control plane runs as. A fresh named volume is owned by root, but the
  # control-plane image runs as the system `vapor` user (uid 999), so without
  # this it can't write downloaded base images and URL imports fail with a
  # permission error. Runs on every `up`; the chown is idempotent.
  image-storage-init:
    image: alpine
    command: ["chown", "-R", "999:999", "/images"]
    volumes:
      - image_storage:/images
    restart: "no"

  # ---------------------------------------------------------------------------
  # Observability: agent host telemetry + VM logs.
  #
  # Hypervisor nodes run Grafana Alloy (installed by deploy/agent/install.sh),
  # which pushes node metrics and journal logs through the Envoy mTLS listener
  # (/ingest/metrics and /ingest/logs, client-cert authenticated — see
  # spiffe/envoy.yaml). Neither service publishes a port: the only way in from
  # outside is through Envoy. Loki also stores VM console logs, which arrive
  # via the control plane (LOKI_ENDPOINT below).
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      # Alloy on the hypervisor nodes pushes via Prometheus remote write.
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SPIFFE/SPIRE + Envoy mTLS (default agent authentication)
  #
  # The helper image layers the SPIRE binaries onto a shell base (the official
  # ghcr.io/spiffe images are distroless), so the same image serves the server,
  # the one-shot bootstrap, and the control-plane-side agent. It is built
  # locally from ./spiffe/Dockerfile on first `up`.
  # ---------------------------------------------------------------------------
  spire-server:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["spire-server", "run", "-config", "/spiffe/spire-server.conf"]
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_server_data:/var/lib/spire/server
      - spire_server_api:/tmp/spire-server/private
    ports:
      # Node API: hypervisor agents dial this for attestation.
      - "${SPIRE_NODE_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8086/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: create the control-plane (Envoy) workload entry, mint the CP-side
  # agent join token, export the trust bundle. Exits 0.
  spire-bootstrap:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["bash", "/spiffe/bootstrap.sh"]
    environment:
      # DNS SAN for Envoy's server SVID. Go TLS clients (Alloy on the nodes)
      # cannot verify a URI-SAN-only certificate, so the control-plane entry
      # carries the hostname agents dial as a DNS SAN.
      STRATO_HOSTNAME: ${STRATO_HOSTNAME:-localhost}
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_server_api:/tmp/spire-server/private
      - spire_handoff:/handoff
    depends_on:
      spire-server:
        condition: service_healthy
    restart: "no"

  # Bridges the SPIRE server admin socket to TCP so the control plane (a
  # different container, non-root uid) can reach the registration API without
  # Unix-socket permission juggling. The registration API is unauthenticated, so
  # this runs in the control-plane's network namespace and binds loopback only —
  # reachable by the control plane (and its Envoy sidecar), never by other
  # containers on the compose network.
  spire-api-bridge:
    image: alpine/socat
    command: ["TCP-LISTEN:8081,fork,reuseaddr,bind=127.0.0.1", "UNIX-CONNECT:/tmp/spire-server/private/api.sock"]
    network_mode: "service:control-plane"
    volumes:
      - spire_server_api:/tmp/spire-server/private
    depends_on:
      spire-server:
        condition: service_healthy
    restart: unless-stopped

  # Keeps the exported trust bundle fresh. SPIRE rotates its CA within ca_ttl,
  # and the control plane re-verifies forwarded client certs against this file,
  # so a one-time export would go stale and reject valid agent certs after
  # rotation. Re-exports on an interval (atomic rename); the control plane
  # reloads it via SPIRE_BUNDLE_REFRESH_INTERVAL.
  spire-bundle-refresher:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command:
      - bash
      - -c
      - |
        while true; do
          spire-server bundle show -socketPath /tmp/spire-server/private/api.sock -format pem \
            > /handoff/bundle.pem.tmp 2>/dev/null \
            && mv /handoff/bundle.pem.tmp /handoff/bundle.pem
          sleep 3600
        done
    volumes:
      - spire_server_api:/tmp/spire-server/private
      - spire_handoff:/handoff
    depends_on:
      spire-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # Control-plane-side SPIRE agent: serves Envoy's SDS (server SVID + trust
  # bundle). Attests Envoy by unix uid over the shared Workload API socket.
  # pid: host so the unix attestor can resolve the caller's /proc (Envoy runs
  # in its own PID namespace); without it attestation fails with "could not
  # resolve caller information".
  spire-agent-cp:
    build:
      context: ./spiffe
    image: strato-spire-helper:local
    command: ["bash", "/spiffe/agent-cp-entrypoint.sh"]
    pid: host
    volumes:
      - ./spiffe:/spiffe:ro
      - spire_handoff:/handoff:ro
      - spire_agent_cp_data:/var/lib/spire/agent
      - spire_cp_sockets:/run/spire/agent/sockets
    depends_on:
      spire-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  # mTLS front for agent connections. Terminates agent mTLS on :8443, validates
  # client SVIDs against the SPIRE trust bundle, and forwards the client cert
  # (XFCC) so the control plane re-verifies the SPIFFE identity.
  # Envoy runs as a sidecar in the control-plane container's network namespace
  # so it reaches the control plane over loopback — the control plane only
  # trusts the forwarded client-cert (XFCC) header from a loopback peer. Because
  # it shares that namespace, its listener ports (8443 mTLS, 9901 admin) are
  # published on the control-plane service, not here.
  envoy:
    image: envoyproxy/envoy:v1.31.0
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    network_mode: "service:control-plane"
    volumes:
      - ./spiffe/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - spire_cp_sockets:/run/spire/agent/sockets
    # No healthcheck: the distroless Envoy image ships no HTTP client to probe
    # its own /ready listener, and nothing gates on its health. Readiness is
    # observable via the admin interface on 127.0.0.1:9901.
    depends_on:
      - spire-agent-cp
      - control-plane
      # Ingest upstreams (STRICT_DNS clusters): not required at startup, but
      # ordering them first avoids a 503 window for early agent pushes.
      - prometheus
      - loki
    restart: unless-stopped

  control-plane:
    # `main` is the moving tag CI publishes on every main-branch build; no
    # `latest` tag exists on GHCR until a versioned release is published.
    image: ghcr.io/samcat116/strato-control-plane:${STRATO_VERSION:-main}
    # To run from source instead of the published image, comment out `image:`
    # above and uncomment:
    # build:
    #   context: ../..
    #   dockerfile: control-plane/Dockerfile
    environment: &control-plane-env
      # Report the exact tag the operator pinned on /health/* (see
      # BuildInfo.swift), overriding the image's baked default so the running
      # process names what was actually deployed. STRATO_GIT_SHA is deliberately
      # left unset here: the image bakes in the real commit, which is more precise
      # than this tag string.
      STRATO_VERSION: ${STRATO_VERSION:-main}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: vapor_database
      DATABASE_USERNAME: vapor_username
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      # Postgres runs in this compose network and never leaves the host, so
      # plaintext is acceptable. Override with DATABASE_TLS=require (and
      # DATABASE_TLS_CA_CERT_PATH) if you point this at an external database.
      DATABASE_TLS: ${DATABASE_TLS:-disable}
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
      # At-rest encryption key for stored secrets (OIDC client secrets).
      # Optional so .env files generated before it existed keep working — the
      # control plane warns and stores plaintext when it's unset.
      STRATO_SECRET_ENCRYPTION_KEY: ${STRATO_SECRET_ENCRYPTION_KEY:-}
      WEBAUTHN_RELYING_PARTY_ID: ${WEBAUTHN_RELYING_PARTY_ID}
      WEBAUTHN_RELYING_PARTY_NAME: ${WEBAUTHN_RELYING_PARTY_NAME:-Strato}
      WEBAUTHN_RELYING_PARTY_ORIGIN: ${WEBAUTHN_RELYING_PARTY_ORIGIN}
      # Agent-facing host:port — the Envoy mTLS listener, NOT the browser proxy.
      # setup.sh sets this to <hostname>:<AGENT_MTLS_PORT>. The control plane
      # derives the SPIRE node address from it as <hostname>:8085.
      EXTERNAL_HOSTNAME: ${EXTERNAL_HOSTNAME:-${STRATO_HOSTNAME}}
      # Secure session cookie + HSTS; only when TLS is terminated in front of the
      # proxy (setup.sh sets this from the origin scheme). Defaults off so a
      # plaintext http:// deploy doesn't set a Secure cookie the browser drops.
      HTTP_TLS_ENABLED: ${HTTP_TLS_ENABLED:-false}
      # Trusted proxy hops in front of the control plane, used to read the real
      # client IP for rate limiting. 1 = nginx alone; 2 = an upstream TLS
      # terminator in front of nginx (the HTTPS topology). setup.sh sets it from
      # the origin scheme; too low buckets every client behind the outer proxy.
      RATE_LIMIT_TRUSTED_PROXY_HOPS: ${RATE_LIMIT_TRUSTED_PROXY_HOPS:-1}
      # Public browser origin used to build OIDC redirect URIs (SSO login
      # callback, post-logout redirect). OIDC login refuses to start without it
      # in production. Set by setup.sh; defaults to CONTROL_PLANE_URL (the
      # published proxy origin from .env), which is also the browser origin in
      # this topology. Agents no longer need a URL from the control plane at
      # all — image downloads are relative paths fetched over the SPIFFE mTLS
      # listener the agent already dials (issue #493).
      BASE_URL: ${BASE_URL:-${CONTROL_PLANE_URL}}
      # Where the control plane keeps image bytes. `filesystem` (the default)
      # writes to IMAGE_STORAGE_PATH, backed by the image_storage volume and
      # made vapor-writable by image-storage-init — right for this single-host
      # topology. Set IMAGE_STORAGE_BACKEND=s3 in an override file to use an
      # S3-compatible bucket instead (MinIO, Garage, Ceph RGW, R2, AWS); see
      # docs/architecture/storage.md for the IMAGE_S3_* variables. No object
      # store is bundled here — you supply the bucket.
      IMAGE_STORAGE_BACKEND: ${IMAGE_STORAGE_BACKEND:-filesystem}
      IMAGE_STORAGE_PATH: /app/images
      # Only read when IMAGE_STORAGE_BACKEND=s3. Compose's map form always sets
      # these, so an unset variable arrives as an empty string — the control
      # plane treats empty as absent, which is what makes "leave the endpoint
      # blank for AWS" and "leave the keys blank for IRSA / instance roles"
      # behave as documented.
      IMAGE_S3_ENDPOINT: ${IMAGE_S3_ENDPOINT:-}
      IMAGE_S3_BUCKET: ${IMAGE_S3_BUCKET:-}
      IMAGE_S3_REGION: ${IMAGE_S3_REGION:-us-east-1}
      IMAGE_S3_VIRTUAL_HOST_STYLE: ${IMAGE_S3_VIRTUAL_HOST_STYLE:-}
      IMAGE_S3_ACCESS_KEY_ID: ${IMAGE_S3_ACCESS_KEY_ID:-}
      IMAGE_S3_SECRET_ACCESS_KEY: ${IMAGE_S3_SECRET_ACCESS_KEY:-}
      IMAGE_S3_SESSION_TOKEN: ${IMAGE_S3_SESSION_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_METRICS_ENABLED: "false"
      OTEL_LOGS_ENABLED: "false"
      OTEL_TRACES_ENABLED: "false"
      # SPIFFE/SPIRE: enable mTLS agent auth and SPIRE provisioning. The server
      # API is reached over the socat bridge; the trust bundle (exported by
      # spire-bootstrap) lets the control plane re-verify forwarded client
      # certs. Trust domain defaults to strato.local (see ./spiffe/*.conf).
      # VM console logs and log queries for the UI. Loki never leaves the
      # compose network; the control plane is its only client here (agent
      # journal logs arrive separately through Envoy's /ingest/logs route).
      LOKI_ENDPOINT: http://loki:3100
      SPIRE_ENABLED: "true"
      # The socat bridge shares this container's network namespace, so it is on
      # loopback (never exposed to the compose network).
      SPIRE_SERVER_API_ADDRESS: 127.0.0.1:8081
      SPIRE_TRUST_BUNDLE_PATH: /run/spire/handoff/bundle.pem
      # Workload Identity "Issuance" panel: read SPIRE's SVID-signing counters
      # from the compose Prometheus over a rolling 24h window. Unset this to
      # leave the panel unavailable. Metric names default to SPIRE's server CA
      # counters and can be overridden with SPIRE_METRICS_X509_SVID_METRIC /
      # SPIRE_METRICS_JWT_SVID_METRIC if a SPIRE version renames them.
      SPIRE_METRICS_PROMETHEUS_URL: http://prometheus:9090
    ports:
      # Published on behalf of the Envoy sidecar (network_mode: service:
      # control-plane): agents dial wss://<host>:<AGENT_MTLS_PORT>/agent/ws. The
      # control plane's own :8080 is not published — it stays on the internal
      # network behind the proxy. Envoy's admin is not published either; it binds
      # loopback inside this namespace (docker exec to reach it).
      - "${AGENT_MTLS_PORT:-8443}:8443"
    volumes:
      - image_storage:/app/images
      - spire_handoff:/run/spire/handoff:ro
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
      image-storage-init:
        condition: service_completed_successfully
      spire-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      # Readiness, not liveness: this is what `depends_on: service_healthy` and
      # `docker compose ps` report, and a control plane that cannot reach
      # Postgres should not read as healthy. `start_period` covers
      # migrations and boot-time backfills, during which :8080 is not yet bound.
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
    # Drain window: on `docker compose down`/`up -d` the control plane reports
    # itself unready on SIGTERM and finishes in-flight requests and agent
    # WebSockets. Docker's 10s default would SIGKILL through that.
    stop_grace_period: 60s
    restart: unless-stopped

  # One-shot, manual: seed a first admin user + organization + project and
  # print an admin-scoped API key once, so the deployment can be driven
  # programmatically (CI, end-to-end tests) without the browser WebAuthn flow.
  # Hard-refuses when any user already exists. Never started by
  # `docker compose up` (profile-gated) — run it explicitly:
  #
  #   docker compose run --rm bootstrap
  #   # key only on stdout (for scripting; startup logs go to stdout too,
  #   # hence the lowered log level):
  #   docker compose run --rm -e LOG_LEVEL=warning bootstrap bootstrap --quiet --env production
  #
  # (The second form overrides the command; the first `bootstrap` is the
  # service, the rest is the container command.)
  bootstrap:
    image: ghcr.io/samcat116/strato-control-plane:${STRATO_VERSION:-main}
    profiles: ["bootstrap"]
    command: ["bootstrap", "--env", "production"]
    environment:
      <<: *control-plane-env
      # This container is not in the control-plane's network namespace, so the
      # SPIRE socat bridge (127.0.0.1:8081) and trust-bundle volume are out of
      # reach — and seeding users needs neither.
      SPIRE_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      # The command boots the full Vapor app, whose production startup requires
      # Valkey (sessions + coordination, pinged at didBoot) — without this the
      # standalone `docker compose run --rm bootstrap` on a fresh project would
      # exit before seeding.
      valkey:
        condition: service_healthy
    restart: "no"

  frontend:
    image: ghcr.io/samcat116/strato-frontend:${STRATO_VERSION:-main}
    environment:
      NODE_ENV: production
      PORT: 3000
      # Gravatar profile pictures. Enabled here sends a hash of each user's email
      # to gravatar.com; set STRATO_GRAVATAR_ENABLED=false in .env to keep the UI
      # free of third-party requests and show initials instead.
      STRATO_GRAVATAR_ENABLED: ${STRATO_GRAVATAR_ENABLED:-true}
    depends_on:
      - control-plane
    restart: unless-stopped

  # Only the proxy publishes a port; everything else stays on the internal
  # network. Routes /api, /auth, /agent, /health, /organizations to the
  # control plane and everything else to the frontend.
  proxy:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - control-plane
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
  image_storage:
  prometheus_data:
  loki_data:
  spire_server_data:
  spire_server_api:
  spire_handoff:
  spire_agent_cp_data:
  spire_cp_sockets:
