events {
    worker_connections 1024;
}

http {
    upstream control-plane {
        server control-plane:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Preserve X-Forwarded-Proto from an upstream TLS terminator: in the HTTPS
    # topology this nginx listens on plain :80 behind the terminator, so
    # blindly setting $scheme would clobber "https" and the control plane
    # would generate plaintext ws:// agent join URLs for an HTTPS deployment.
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # HSTS only when the client-facing connection is HTTPS. This proxy listens on
    # plain :80 behind the TLS terminator, so the request scheme alone can't tell
    # us — key off the forwarded proto instead. Empty value = nginx omits the
    # header, so plaintext (e.g. localhost) never gets pinned to https://. This is
    # where the frontend's HSTS comes from, since Next.js bakes headers() at build
    # time and can't gate on runtime TLS state.
    map $fwd_proto $hsts_header {
        default "";
        "https" "max-age=31536000; includeSubDomains";
    }

    server {
        listen 80;

        # Own HSTS at the proxy for every route: drop any upstream copy (the
        # control plane sets its own) so responses carry exactly one, gated above.
        proxy_hide_header Strict-Transport-Security;
        add_header Strict-Transport-Security $hsts_header always;

        # WebSocket support (agent connections and console streams)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;

        # API routes to control plane
        location /api/ {
            proxy_pass http://control-plane;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /auth/ {
            proxy_pass http://control-plane;
        }

        location /agent/ {
            proxy_pass http://control-plane;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Exact match for the bare route; the prefix below only covers
        # /health/ready, /health/live, etc.
        location = /health {
            proxy_pass http://control-plane;
        }

        location /health/ {
            proxy_pass http://control-plane;
        }

        location /organizations/ {
            proxy_pass http://control-plane;
        }

        # Frontend catch-all
        location / {
            proxy_pass http://frontend;
        }
    }
}
