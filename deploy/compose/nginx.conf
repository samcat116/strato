events {
    worker_connections 1024;
}

http {
    # Resolve service names through Docker's embedded DNS at request time
    # instead of once at startup. With static `upstream` blocks nginx pins the
    # container IP it saw when it launched, so recreating control-plane or
    # frontend (redeploy.sh, `docker compose up -d` after a pull) left the
    # proxy returning 502 until it was restarted. Using variables in
    # proxy_pass forces per-request resolution, honoring `valid=10s`.
    # ipv6=off: the compose network is IPv4-only, so AAAA lookups would fail.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Preserve X-Forwarded-Proto from an upstream TLS terminator: in the HTTPS
    # topology this nginx listens on plain :80 behind the terminator, so
    # blindly setting $scheme would clobber "https" and the control plane
    # would generate plaintext ws:// agent join URLs for an HTTPS deployment.
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    server {
        listen 80;

        # Targets for the variable proxy_pass below. With no URI part in the
        # proxy_pass value, nginx forwards the original request URI unchanged
        # (same behavior as the former upstream blocks).
        set $control_plane http://control-plane:8080;
        set $frontend http://frontend:3000;

        # Image artifact uploads (disk images, kernels, rootfs) are posted
        # through /api and are large, so nginx's 1 MB default would 413 them.
        # Raise it, but keep it finite: the control plane buffers the whole
        # multipart body in memory, so an unbounded cap risks OOM. Keep this in
        # sync with ImageController.maxUploadBytes.
        client_max_body_size 4g;

        # WebSocket support (agent connections and console streams)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # nginx appends its peer to X-Forwarded-For. With an upstream TLS
        # terminator in front (the HTTPS topology above), the real client is the
        # second-from-last XFF entry, so set RATE_LIMIT_TRUSTED_PROXY_HOPS=2 on the
        # control plane; with nginx facing clients directly, leave it at 1.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;

        # API routes to control plane
        location /api/ {
            proxy_pass $control_plane;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /auth/ {
            proxy_pass $control_plane;
        }

        # OAuth device grant for the CLI (/oauth/device_authorization,
        # /oauth/token, /oauth/revoke). Bare control-plane routes, so they
        # must bypass the frontend catch-all below.
        location /oauth/ {
            proxy_pass $control_plane;
        }

        location /agent/ {
            proxy_pass $control_plane;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Exact match for the bare route; the prefix below only covers
        # /health/ready, /health/live, etc.
        location = /health {
            proxy_pass $control_plane;
        }

        location /health/ {
            proxy_pass $control_plane;
        }

        # SCIM protocol + SCIM token management live under the bare
        # /organizations/ prefix on the control plane. Because this whole
        # prefix bypasses the frontend, Next.js pages must not be routed
        # under /organizations (see components/layout/nav.ts).
        location /organizations/ {
            proxy_pass $control_plane;
        }

        # RFC 8935 SSF push-delivery callback (POST /ssf/events/:streamID) that
        # external SSF transmitters POST to. Bare control-plane route, so it must
        # bypass the frontend catch-all below.
        location /ssf/ {
            proxy_pass $control_plane;
        }

        # Frontend catch-all
        location / {
            proxy_pass $frontend;
        }
    }
}
